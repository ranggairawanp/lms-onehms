<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>One HCMS, Learning (Module 09)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#ffffff;--ink:#1F242C;--ink-2:#525a67;--ink-3:#8a93a0;--border:#e4e8ee;--border-strong:#cfd5de;--surface-2:#f7f8fa;--surface-3:#eef1f5;--role:#E1231B;--role-tint:#fdeceb;--role-tint2:#f9dad7;--green:#1f9d57;--green-t:#e7f5ec;--amber:#c47d10;--amber-t:#faeed4;--info:#2563c9;--info-t:#e7effb;--purple:#6d4aa8;--font-display:"Schibsted Grotesk",system-ui,sans-serif;--font-ui:"Geist",system-ui,sans-serif;--font-num:"Geist Mono","JetBrains Mono",ui-monospace,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;margin:0}
.dim{color:var(--ink-3)}.muted{color:var(--ink-2)}
.topbar{height:3px;background:var(--role);width:100%}
.lang{position:fixed;top:16px;right:20px;z-index:30;display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.lang button{border:0;background:#fff;padding:5px 11px;font-family:var(--font-ui);font-size:12.5px;color:var(--ink-2);cursor:pointer}
.lang button.active{background:var(--ink);color:#fff}
.split{display:flex;min-height:calc(100vh - 3px)}
.pane{padding:56px 60px}
.left{flex:0 0 47%;max-width:620px;background:var(--surface-2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.right{flex:1;background:#fff;display:flex;align-items:center;justify-content:center}
.rwrap{width:100%;max-width:480px}
.logo{width:76px;height:46px;background-repeat:no-repeat;background-position:left center;background-size:contain;display:block;align-self:flex-start;margin-bottom:26px}
.ltitle{font-size:46px;letter-spacing:-.03em;font-weight:700;line-height:1}
.kicker{margin-top:18px;font-size:15px;color:var(--ink-2)}
.kicker strong{color:var(--ink);font-weight:600}
.lsub{margin-top:2px;font-size:15px;color:var(--ink-3)}
.seclabel{margin-top:40px;font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--ink)}
.rolelist{list-style:none;margin:16px 0 0;padding:0;display:flex;flex-direction:column;gap:15px}
.rolelist li{display:flex;gap:13px;align-items:flex-start}
.dot{width:11px;height:11px;border-radius:50%;margin-top:5px;flex:0 0 auto}
.rolelist .rn{font-weight:600;font-size:14.5px}
.rolelist .rd{color:var(--ink-2);font-size:13.5px}
.hr{height:1px;background:var(--border);margin:34px 0 0}
.lfoot{margin-top:24px;font-size:12.5px;color:var(--ink-3);line-height:1.65;max-width:460px}
.rhead h2{font-size:30px;letter-spacing:-.02em}
.rhead .rsub{margin-top:6px;color:var(--ink-3);font-size:14.5px}
.fld{margin-top:18px}
.fld label{display:block;font-size:12.5px;color:var(--ink-2);margin-bottom:6px}
.fld input{width:100%;border:1px solid var(--border-strong);border-radius:10px;padding:11px 13px;font-family:var(--font-ui);font-size:14px}
.fld input:focus{outline:none;border-color:var(--role);box-shadow:0 0 0 3px var(--role-tint)}
.gbtn{width:100%;margin-top:22px;border:0;background:var(--role);color:#fff;padding:13px;border-radius:10px;font-family:var(--font-ui);font-size:14.5px;font-weight:600;cursor:pointer}
.gbtn:hover{background:#c01d16}
.gerr{display:none;color:var(--role);font-size:12.5px;margin-top:12px}
.hint{font-size:11.5px;color:var(--ink-3);margin-top:16px}
.rfoot{margin-top:26px;padding-top:20px;border-top:1px solid var(--border);font-size:11.5px;color:var(--ink-3);line-height:1.6}
.rfoot .reset{color:var(--role);font-weight:600;cursor:pointer;text-decoration:underline}
.demobar{display:flex;align-items:flex-start;gap:14px;justify-content:space-between;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.demobar span{font-size:13.5px;color:var(--ink-2)}
.demobar span b{color:var(--ink)}
.outbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border-strong);background:#fff;border-radius:9px;padding:9px 15px;font-family:var(--font-ui);font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;white-space:nowrap}
.outbtn:hover{border-color:var(--ink-3)}
.pickdiv{margin:26px 0 16px;display:flex;align-items:center;gap:14px;font-size:11.5px;font-weight:600;letter-spacing:.08em;color:var(--ink-3)}
.pickdiv:before,.pickdiv:after{content:"";flex:1;height:1px;background:var(--border)}
.resume{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--role-tint);border:1px solid var(--role-tint2);border-radius:13px;padding:16px 18px;text-decoration:none;color:inherit;margin-bottom:14px}
.resume .rm{font-size:14px;color:var(--ink)}
.resume .rm b{font-weight:600;color:var(--role)}
.resume .rbtn{background:var(--role);color:#fff;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;white-space:nowrap}
.pfull{display:flex;align-items:center;gap:15px;border:1px solid var(--border);border-radius:13px;padding:17px;text-decoration:none;color:inherit;transition:.15s;margin-bottom:14px}
.pfull:hover{border-color:var(--role);box-shadow:0 8px 24px rgba(225,35,27,.08)}
.pgrid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pmini{border:1px solid var(--border);border-radius:13px;padding:16px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:14px;transition:.15s}
.pmini:hover{border-color:var(--role);box-shadow:0 8px 24px rgba(225,35,27,.08)}
.ptile{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.ptile svg{width:23px;height:23px}
.pname{font-family:var(--font-display);font-weight:600;font-size:15px}
.pdesc{font-size:12.5px;color:var(--ink-2);line-height:1.45}
@media(max-width:880px){.split{flex-direction:column}.left{flex:none;max-width:none;border-right:0;border-bottom:1px solid var(--border)}.pane{padding:40px 28px}.ltitle{font-size:38px}.pgrid2{grid-template-columns:1fr}}
</style>
</head>

var IC_ARR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" style="vertical-align:-2px;margin-left:5px"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>';
var IC={
 learner:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M21 7v5"/><path d="M7 9.5V14c0 1.5 2.4 3 5 3s5-1.5 5-3V9.5"/></svg>',
 manager:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M16 6a3 3 0 010 5"/><path d="M19 20c0-2.5-1.5-4-3-4.5"/></svg>',
 instructor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="12" rx="1"/><path d="M3 20h18"/><path d="M9 16v4M15 16v4"/></svg>',
 admin:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 3l8 4v5c0 4-3.5 7-8 9-4.5-2-8-5-8-9V7l8-4z"/><path d="M9 12l2 2 4-4"/></svg>',
 hcbp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/><path d="M16 6a3 3 0 010 5"/><path d="M19 20c0-2.5-1.5-4-3-4.5"/></svg>',
 exec:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/></svg>'
};
var PERSONAS=[
 {href:'lms_p_learner.html', icon:IC.learner, color:'#E1231B', tint:'#fdeceb', name:{id:'Learner',en:'Learner'}, short:{id:'Belajar mandiri, jalur belajar, dan kepatuhan pribadi',en:'Self learning, learning paths, and personal compliance'}},
 {href:'lms_p_linemanager.html', icon:IC.manager, color:'#2563c9', tint:'#e7effb', name:{id:'Line Manager',en:'Line Manager'}, short:{id:'Belajar tim, penugasan, dan approval pelatihan',en:'Team learning, assignment, and training approval'}},
 {href:'lms_p_instructor.html', icon:IC.instructor, color:'#1f9d57', tint:'#e7f5ec', name:{id:'Instructor',en:'Instructor'}, short:{id:'Studio konten, kelas, dan penilaian',en:'Content studio, classes, and assessment'}},
 {href:'lms_p_ldadmin.html', icon:IC.admin, color:'#c47d10', tint:'#faeed4', name:{id:'L&D Admin',en:'L&D Admin'}, short:{id:'Katalog, enrollment, compliance, dan budget',en:'Catalog, enrollment, compliance, and budget'}},
 {href:'lms_p_hcbp.html', icon:IC.hcbp, color:'#6d4aa8', tint:'#efeaf6', name:{id:'HR Business Partner',en:'HR Business Partner'}, short:{id:'Learning health se-BU dan kesiapan suksesi',en:'BU wide learning health and succession readiness'}},
 {href:'lms_p_exec.html', icon:IC.exec, color:'#1F242C', tint:'#eef1f5', name:{id:'L&D Executive',en:'L&D Executive'}, short:{id:'Kapabilitas tenaga kerja, ROI, dan tren agregat',en:'Workforce capability, ROI, and aggregate trend'}}
];
function readLast(){ try{ var v=localStorage.getItem(STORE); if(v===null) return -1; var n=parseInt(v,10); return (n>=0&&n<PERSONAS.length)?n:-1; }catch(e){ return -1; } }
function writeLast(i){ try{ localStorage.setItem(STORE,String(i)); }catch(e){} }
function clearLast(){ try{ localStorage.removeItem(STORE); }catch(e){} }
function tile(p){ return '<span class="ptile" style="background:'+p.color+';color:#fff">'+p.icon+'</span>'; }
function renderRoleList(){
 var el=document.getElementById('roleList'); if(!el) return;
 el.innerHTML=PERSONAS.map(function(p){
  return '<li><span class="dot" style="background:'+p.color+'"></span><div><span class="rn">'+nm(p.name)+'</span> <span class="rd">'+nm(p.short)+'</span></div></li>';
 }).join('');
}
function renderPicker(){
 var g=document.getElementById('pgrid'); if(!g) return;
 var cards=PERSONAS.map(function(p,i){
  return '<a class="pmini" href="'+p.href+'" data-i="'+i+'">'+tile(p)+'<div><div class="pname">'+nm(p.name)+'</div><div class="pdesc">'+nm(p.short)+'</div></div></a>';
 }).join('');
 g.innerHTML='<div class="pgrid2">'+cards+'</div>';
 var li=readLast(); var rc=document.getElementById('resumeCard');
 if(li>=0){ var p=PERSONAS[li];
  document.getElementById('resumeMsg').innerHTML=tr('resumeMsg')+' <b>'+nm(p.name)+'</b>.';
  document.getElementById('resumeBtn').innerHTML=tr('resumeBtn')+IC_ARR;
  rc.setAttribute('href',p.href); rc.setAttribute('data-i',String(li)); rc.style.display='flex';
 } else { rc.style.display='none'; }
}
function paint(){
 document.getElementById('hcmsLine').textContent=tr('hcmsLine');
 document.getElementById('grpLine').textContent=tr('grpLine');
 document.getElementById('leftSub').textContent=tr('leftSub');
 document.getElementById('personaSecTitle').textContent=tr('personaSecTitle');
 document.getElementById('leftFoot').textContent=tr('leftFoot');
 document.getElementById('signinTitle').textContent=tr('signinTitle');
 document.getElementById('signinSub').textContent=tr('signinSub');
 document.getElementById('luser').textContent=tr('user');
 document.getElementById('lpass').textContent=tr('pass');
 document.getElementById('gbtn').textContent=tr('signin');
 document.getElementById('gerr').textContent=tr('err');
 document.getElementById('ghint').textContent=tr('hint');
 document.getElementById('demoMsg').innerHTML=tr('demoMsg');
 document.getElementById('btnOut').innerHTML=IC_OUT+'<span>'+tr('btnOut')+'</span>';
 document.getElementById('pickLabel').textContent=tr('pickLabel');
 document.getElementById('rightFoot').textContent=tr('rightFoot');
 document.getElementById('resetBtn').textContent=tr('reset');
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-lang')===L); });
 renderRoleList();
 if(document.getElementById('pickState').style.display!=='none'){ renderPicker(); }
}
function setLang(l){ L=l; paint(); }
function showPicker(){ document.getElementById('formState').style.display='none'; document.getElementById('pickState').style.display='block'; renderPicker(); }
function showForm(){ document.getElementById('pickState').style.display='none'; document.getElementById('formState').style.display='block'; }
function doLogin(){
 var u=document.getElementById('gu').value, p=document.getElementById('gp').value;
 if((u==='lms_onehcms'||u==='onehcms')&&p==='nabatiHC-123!'){ document.getElementById('gerr').style.display='none'; showPicker(); }
 else { document.getElementById('gerr').style.display='block'; }
}
if(typeof document!=='undefined' && document.getElementById('app')){
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.addEventListener('click',function(){ setLang(b.getAttribute('data-lang')); }); });
 document.getElementById('gbtn').addEventListener('click',doLogin);
 document.getElementById('gp').addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
 document.getElementById('btnOut').addEventListener('click',showForm);
 document.getElementById('pgrid').addEventListener('click',function(e){ var a=e.target.closest('a[data-i]'); if(a){ writeLast(parseInt(a.getAttribute('data-i'),10)); } });
 document.getElementById('resumeCard').addEventListener('click',function(e){ var i=this.getAttribute('data-i'); if(i!==null){ writeLast(parseInt(i,10)); } });
 document.getElementById('resetBtn').addEventListener('click',function(){ clearLast(); renderPicker(); });
 setLang('id');
 showPicker();
}
</script>
</body>
