<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kamus Kompetensi KSNI</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#ffffff;--ink:#1F242C;--ink-2:#525a67;--ink-3:#8a93a0;--border:#e4e8ee;--border-strong:#cfd5de;--surface-2:#f7f8fa;--surface-3:#eef1f5;--role:#E1231B;--role-tint:#fdeceb;--role-tint2:#f9dad7;--green:#1f9d57;--green-t:#e7f5ec;--amber:#c47d10;--amber-t:#faeed4;--info:#2563c9;--info-t:#e7effb;--slate:#64748b;--slate-t:#eef1f5;--font-display:"Schibsted Grotesk",system-ui,sans-serif;--font-ui:"Geist",system-ui,sans-serif;--font-num:"Geist Mono","JetBrains Mono",ui-monospace,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--surface-2);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;margin:0}
.dim{color:var(--ink-3)}.muted{color:var(--ink-2)}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}


body{background:var(--surface-2)}
.kbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;gap:16px}
.kbar::before{content:"";position:absolute;left:0;top:0;right:0;height:3px;background:var(--role)}
.kbar .brand{display:flex;align-items:center;gap:10px}.kbar img{height:24px}
.kbar .ptl{font-family:var(--font-display);font-weight:600;font-size:13.5px;border-left:1px solid var(--border);padding-left:12px;line-height:1.2}
.kbar .ptl small{display:block;font-size:10px;color:var(--ink-3);font-weight:400;font-family:var(--font-ui)}
.kbar .sp{flex:1}
.ksearch{display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:99px;padding:8px 14px;min-width:240px}
.ksearch svg{color:var(--ink-3)}.ksearch input{border:0;background:none;outline:none;font-family:var(--font-ui);font-size:13px;width:100%;color:var(--ink)}
.langtog{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.langtog button{border:0;background:#fff;padding:5px 10px;font-size:12px;color:var(--ink-2);cursor:pointer;font-family:var(--font-ui)}
.langtog button.active{background:var(--ink);color:#fff}
.klayout{display:flex;min-height:calc(100vh - 49px)}
.kside{width:262px;flex:0 0 auto;border-right:1px solid var(--border);background:#fff;overflow-y:auto;max-height:calc(100vh - 49px);position:sticky;top:49px}
.kgrouphd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);padding:14px 16px 6px}
.fnbtn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:0;background:none;padding:8px 16px;font-family:var(--font-ui);font-size:12.5px;color:var(--ink-2);cursor:pointer}
.fnbtn:hover{background:var(--surface-2)}
.fnbtn.active{background:var(--role-tint);color:var(--role);font-weight:600;box-shadow:inset 3px 0 0 var(--role)}
.fnbtn .ct{margin-left:auto;font-family:var(--font-num);font-size:11px;color:var(--ink-3);background:var(--surface-3);border-radius:99px;padding:1px 8px}
.fnbtn.active .ct{background:#fff;color:var(--role)}
.kmain{flex:1;min-width:0;padding:24px 30px 70px;max-width:980px}
.khead{margin-bottom:8px}
.khead h1{font-family:var(--font-display);font-size:24px;font-weight:600;letter-spacing:-.02em}
.khead .meta{font-size:12.5px;color:var(--ink-3);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.kpill{font-size:11px;font-weight:600;padding:2px 10px;border-radius:99px;background:var(--role-tint);color:var(--role)}
.kpill.mfg{background:var(--info-t);color:var(--info)}
.knote{font-size:12px;color:var(--ink-2);background:#fff;border:1px solid var(--border);border-left:3px solid var(--role);border-radius:10px;padding:11px 14px;margin:14px 0 18px}
.ccard{background:#fff;border:1px solid var(--border);border-radius:13px;margin-bottom:11px;overflow:hidden}
.cchead{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;cursor:pointer}
.cchead .cn{font-family:var(--font-display);font-weight:600;font-size:14.5px;line-height:1.3}
.cchead .cd{font-size:12px;color:var(--ink-3);margin-top:4px}
.cchead .cl{font-size:10px;font-weight:600;color:var(--ink-2);background:var(--surface-3);border-radius:6px;padding:2px 8px;white-space:nowrap;align-self:flex-start}
.cchead .chev{margin-left:auto;flex:0 0 auto;color:var(--ink-3);transition:transform .15s}
.ccard.open .chev{transform:rotate(180deg)}
.cclevels{display:none;padding:0 16px 14px;border-top:1px solid var(--surface-3)}
.ccard.open .cclevels{display:block}
.lrow{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--surface-3)}
.lrow:first-child{border-top:0}
.lrow .lk{flex:0 0 auto;font-family:var(--font-num);font-size:11px;font-weight:700;color:var(--role);background:var(--role-tint);border-radius:7px;padding:3px 9px;height:fit-content}
.lrow .lt{font-size:12px;color:var(--ink-2);line-height:1.5}
.empty{color:var(--ink-3);font-size:13px;padding:30px 0}
@media(max-width:760px){.kside{display:none}.kmain{padding:18px}}

</style>
</head>

<script>
var MASTER=[{"fn": "Genba", "grp": "Manufacture", "comps": [{"c": "Bad Stock Management", "d": "Kemampuan mengidentifikasi, megnendalikan, dan mengelola produk tidak sesuai standar agar tidak menjadi waste", "cl": "Genba", "L": ["Mengetahui kategori produk reject atau rusak (bad stock) dan aturan dasar penanganannya", "Mampu melaporkan kondisi produk yang tidak sesuai standar serta melakukan pemisahan produk sesuai prosedur", "Mampu menganalisis penyebab terjadinya produk yang tidak sesuai standar serta melakukan penanganan sesuai ketentuan", "Mampu mengembangkan dan melakukan koordinasi prosedur penanganan produk tidak sesuai standar lintas departemen", "Mampu merancang strategi pengelolaan produk tidak sesuai standar di tingkat perusahaan untuk meminimalisir potensi waste"]}, {"c": "Continuous Improvement", "d": "Kemampuan beradaptasi terhadap perubahan/hal-hal baru dan mengembangkan ide/inovasi baru untuk meningkatkan mutu produk, kualitas layanan dan efektvitias serta efisiensi proses/metode kerja dari waktu ke waktu.", "cl": "Genba", "L": ["Mengidentifikasi ide yang berhubungan dengan program/proses kerja pribadi sebagai dasar dalam membuat program/proses kerja baru", "Menerapkan best practice dari tempat lain untuk mengatasi masalah sehari-hari (adaptasi)", "Melakukan improvement dengan modifikasi internal dari hasil benchmarking yang telah dilakukan sehingga didapatkan solusi baru yang bernilai tambah", "Menciptakan inovasi dengan membuat solusi-solusi baru yang kreatif dan orisinil untuk mengatasi permasalahan yang muncul dalam pekerjaannya.", "Mendorong budaya improvement untuk memperbaharui program/proses kerja baru/mutakhir agar selaras dengan strategi perusahaan (faktor internal dan eksternal) dalam rangka meningkatkan mutu produk, kuali"]}, {"c": "Cost Structure / COGM", "d": "Kemampuan untuk menghitung, menganalisis, dan mengendalikan biaya produksi (bahan baku, tenaga kerja langsung, dan overhead)", "cl": "Genba", "L": ["Mengetahui komponen dari COGM", "Memahami kontribusi RMPM dalam COGM", "Membuat RMPM cost effective dalam COGM dan kalkulasi COGM dari produk", "Menganalisa Cost Trend Effect dalam COGM dan melakukan kalkulasi analiisa COGM yang memengeruhi GP1", "Membuat standard RMPM Cost Trend Effect pada top management level"]}, {"c": "Genba Business Process Standardization", "d": "Kemampuan untuk memahami, menerapkan, dan menjaga standar proses kerja di area genba secara konsisten dan efisien, termasuk penguasaan prosedur, ketelitian dalam pelaksanaan, serta komitmen terhadap perbaikan berkelanjutan.", "cl": "Genba", "L": ["Mengetahui adanya SOP dan standar proses, namun belum mampu menerapkannya secara konsisten. - Membutuhkan arahan dan pengawasan intensif. - Ketelitian rendah, sering terjadi kesalahan prosedur.", "Mampu mengikuti SOP dengan bantuan atau pengingat. - Memahami langkah dasar proses kerja. Konsistensi mulai terbentuk, namun belum stabil.", "Menjalankan SOP secara mandiri dan konsisten. - Memahami alur proses dan tujuan standar. - Menunjukkan ketelitian dalam pelaksanaan dan mulai mengidentifikasi potensi perbaikan.", "Menjadi contoh penerapan standar proses yang baik. - Aktif memberikan masukan untuk penyempurnaan SOP. - Membimbing rekan kerja agar menjaga konsistensi dan efisiensi.", "Mengembangkan, menyempurnakan, dan mengintegrasikan standar proses di area genba. - Memimpin inisiatif perbaikan berkelanjutan. - Mampu mengoptimalkan efisiensi dan kualitas sebagai bagian dari budaya"]}, {"c": "OEE (Overall Equipment Effectiveness) Management", "d": "Kemampuan menghitung, menganalisis, dan mengoptimalkan efektivitas peralatan produksi melalui aspek availability, performance, dan quality", "cl": "Genba", "L": ["Mengetahui konsep dasar OEE (Overall Equipment Effectiveness) dan komponennya (Availability, Performance, Quality)", "Mampu mengumpulkan dan mencatat data OEE (runtime, output, reject, downtime)", "Mampu menganalisis data OEE untuk menemukan penyebab kerugian utama", "Mampu menyusun rencana teknis dan operasional lintas departemen untuk meningkatkan OEE", "Mampu merancang strategi peningkatan efektivitas peralatan produksi berbasis OEE di tingkat perusahaan"]}, {"c": "OMC", "d": "Kemampuan memahami, memantau, dan mengendalikan biaya pendukung produksi (tidak langsung )", "cl": "Genba", "L": ["Mengetahui komponen biaya pendukung produksi serta memahami dampak pemborosan terhadap biaya operasional", "Menggunakan OMC sesuai instruksi dan standar operasional serta mampu melaporkan penggunaan berlebihan di area kerja", "Mampu mengusulkan inisiatif sederhana untuk efisiensi biaya OMC", "Mampu melakukan metode analisis biaya untuk menemukan akar pemborosan serta merancang rencana efisiensi lintas departemen", "Merancang strategi pengedalian OMC di tingkat perusahaan guna melakukan efisiensi OMC"]}, {"c": "Regulatory Compliance", "d": "Kemampuan untuk memastikan bahwa produk yang diproduksi dan didistribusikan mematuhi peraturan dan regulasi yang berlaku di pasar tempat produk tersebut dijual", "cl": "Genba", "L": ["Memahami prinsip dan konsep dasar peraturan dan regulasi yang telah ditetapkan", "Mampu mengimplementasikan peraturan dan regulasi yang berlaku", "Memastikan akurasi penerapan regulasi yang berlaku dalam proses bisnis perusahaan", "Mengembangkan rencana antisipasi proses bisnis perusahaan ketika ada perubahan regulasi yang berlaku", "Mengembangkan kebijakan internal yang dapat mendukung kepatuhan terhadap peraturan yang berlaku dalam pengembangan produk yang inovatif"]}, {"c": "Genba People Development", "d": "Kemampuan untuk menerapkan standar kerja secara konsisten dan efisien di lapangan, dengan memahami proses, menjalankan prosedur sesuai SOP, serta menunjukkan komitmen terhadap kualitas dan perbaikan berkelanjutan.", "cl": "Genba", "L": ["Memahami secara umum SOP dan standar kerja. - Membutuhkan arahan langsung untuk menjalankan prosedur. - Konsistensi belum terjaga, masih sering melakukan kesalahan.", "Mampu menjalankan prosedur sesuai SOP dengan pengawasan. - Mulai memahami alasan di balik standar kerja. - Konsistensi meningkat, namun masih perlu pengingat.", "Menjalankan SOP secara mandiri dan konsisten. - Memahami proses secara menyeluruh dan dapat menjelaskan kepada orang lain. - Mulai mengidentifikasi area perbaikan di lapangan.", "Menjadi role model dalam penerapan standar kerja. - Aktif memberikan masukan untuk perbaikan proses. - Membimbing rekan kerja agar konsisten dan efisien.", "Mengembangkan dan menyempurnakan standar kerja di area genba. - Memimpin inisiatif perbaikan berkelanjutan. - Mampu mengintegrasikan efisiensi dan kualitas ke dalam budaya kerja tim."]}, {"c": "System compliance (Genba, 5R, GMP, Safety, Halal)", "d": "Kemampuan memahami, menerapkan, dan memastikan kepatuhan terhadap System compliance untuk menjamin keamanan, kualitas, dan kepatuhan hukum", "cl": "Genba", "L": ["Mengetahui aturan dasar sistem dan standar yang berlaku", "Mematuhi aturan yang berlaku serta menerapkan prinsip standar dalam pekerjaan sehari-hari", "Mampu mengidentifikasi dan melaporkan kejadian yang tidak sesuai dengan standar dan mekanisme yang ada", "Mampu menyusun preventive action untuk menghindari kejadian yang sama terulang di kemudian hari", "Mampu merancang strategi system compliance jangka panjang sesuai dengan strategi perusahaan"]}]}, {"fn": "HSE", "grp": "Manufacture", "comps": [{"c": "Emergency Response Management", "d": "Kemampuan merespons, mengendalikan, dan meminimalisir risiko dari situasi darurat (kebakaran, ledakan, tumpahan bahan kimia, bencana alam) di lingkungan pabrik", "cl": "HSE", "L": ["Mengetahui jalur evakuasi, titik kumpul, dan peletakkan peralatan darurat", "Memahami prosedur penanggulangan keadaan darurat dan perannya dalam tim tanggap darurat.", "Mengikuti simulasi, mampu menggunakan peralatan darurat (APAR, hydrant, dll.) dengan benar.", "Mengkoordinasikan tim penanggulangan darurat, memastikan kesiapan personel & fasilitas, memastikan tindakan berjalan efektif.", "Merancang sistem penanggulangan darurat pabrik, memimpin pengambilan keputusan saat krisis besar."]}, {"c": "Environmental Waste Handling", "d": "Kemampuan mengelola limbah B3 dan non‑B3 dari pengumpulan, penyimpanan, transportasi, hingga pengelolaan (Pengolahan maupun Pemusnahan) sesuai standar.", "cl": "HSE", "L": ["Mengetahui jenis limbah (B3 & non-B3) serta dampaknya", "Memahami prosedur pengelolaan limbah sesuai regulasi", "Mampu melaksanakan pengelolaan limbah sesuai SOP (pengumpulan, penyimpanan, transportasi)", "Mampu mengawasi pengelolaan limbah serta memastikan dokumentasi & pelaporan sesuai standar", "Mampu mengembangkan sistem pengelolaan limbah berkelanjutan, berkoordinasi dengan regulator & pihak ketiga"]}, {"c": "Equipment Safety Management", "d": "Kemampuan memastikan peralatan kritis yang berhubungan dengan keselamatan kerja dipelihara dan diuji secara berkala sesuai standar HSE", "cl": "HSE", "L": ["Mengetahui peralatan kritis keselamatan kerja.", "Memahami prosedur pemeliharaan rutin peralatan berdampak K3", "Mampu melaksanakan pemeliharaan peralatan sesuai instruksi dan jadwal", "Mampu mengawasi kegiatan pemeliharaan peralatan, mengevaluasi hasil pemeliharaan, serta memastikan kepatuhan terhadap standar", "Mampu menyusun strategi pemeliharaan berbasis risiko (risk-based maintenance) untuk peralatan kritis"]}, {"c": "HSE Inspection & Audit", "d": "Kemampuan melakukan pemeriksaan sistematis terhadap fasilitas, aktivitas, dan proses untuk memastikan kepatuhan terhadap standar HSE", "cl": "HSE", "L": ["Mengetahui tujuan dan manfaat inspeksi HSE", "Memahami checklist inspeksi dan standar pemeriksaan HSE", "Mampu melaksanakan inspeksi dengan panduan standar serta mencatat temuan pada lapangan", "Mampu menganalisis hasil inspeksi, mengidentifikasi akar masalah, dan memberi rekomendasi perbaikan", "Mampu merancang sistem inspeksi/audit HSE terintegrasi, mengevaluasi tren hasil inspeksi, dan memberikan laporan strategis untuk tindakan preventif kedepannya"]}, {"c": "HSE Management System", "d": "Kemampuan memahami, menetapkan, dan mengembangkan sistem manajemen HSE sesuai standar untuk menjamin keselamatan kerja, kesehatan, serta kelestarian lingkungan di area pabrik", "cl": "HSE", "L": ["Mengetahui prinsip dasar HSE dan kebijakan perusahaan terkait sistem HSE yang digunakan", "Memahami elemen sistem manajemen HSE (ISO 45001, ISO 14001) dan peranannya", "Menerapkan prosedur HSE sesuai standar secara konsisten dalam aktivitas kerja", "Mampu mengelola penerapan sistem HSE di unit kerja, memantau kepatuhan HSE, dan memberikan rekomendasi perbaikan untuk sistem HSE yang diterapkan", "Mampu merancang, mengintegrasikan, dan mengembangkan sistem HSE lintas Business Unit sesuai standar global"]}, {"c": "HSE Regulatory Compliance", "d": "Kemampuan memahami dan memastikan penerapan regulasi K3 & lingkungan yang berlaku di area pabrik.", "cl": "HSE", "L": ["Mengetahui regulasi dasar K3 & lingkungan yang berlaku", "Memahami aplikasi regulasi terhadap aktivitas kerja sehari-hari", "Mampu menerapkan regulasi ke dalam prosedur kerja & memastikan kepatuhan pribadi", "Mampu mengawasi kepatuhan unit kerja, melaporkan ketidaksesuaian, serta memberi arahan perbaikan", "Mampu merancang regulasi baru yang lebih efektif dan efisien, menyusun kebijakan internal, dan menjadi penghubung utama dengan instansi penting yang terkait"]}, {"c": "HSE Risk Management & HIRADC", "d": "Kemampuan melakukan identifikasi bahaya, penilaian risiko, dan menetapkan pengendalian risiko berbasis HIRADC sesuai ISO 45001 & SMK3 untuk memastikan risiko operasional dapat dikendalikan secara efektif.", "cl": "HSE", "L": ["Mengetahui konsep dasar bahaya, risiko, hirarki pengendalian, serta format dasar HIRADC.", "Memahami metode identifikasi bahaya dan dapat melakukan HIRA sederhana pada aktivitas rutin, termasuk menentukan likelihood & severity.", "Mampu melakukan identifikasi bahaya dan penilaian risiko untuk aktivitas rutin & non-rutin, serta mengusulkan pengendalian sesuai hirarki ERCOIL (Eliminasi, Subtitusi, Engineering Control, Administrat", "Menganalisis tren risiko, memfasilitasi workshop HIRADC lintas departemen, mengevaluasi efektivitas pengendalian, serta integrasi dengan PTW & project safety.", "Merancang sistem manajemen risiko perusahaan, menyusun framework Risk Management, serta mengembangkan predictive risk analysis & menjadi SME HSE risk assessment."]}, {"c": "Incident Investigation", "d": "Kemampuan mengidentifikasi, menganalisis, dan menyelidiki insiden untuk menentukan akar penyebab dan tindakan pencegahan", "cl": "HSE", "L": ["Mengetahui pentingnya pelaporan insiden, termasuk near miss", "Memahami prosedur investigasi insiden dan alur pelaporan", "Mampu mengumpulkan data & bukti insiden, membuat laporan awal", "Mampu melakukan investigasi mendalam, analisis akar penyebab, dan rekomendasi tindakan pencegahan", "Mampu merancang sistem investigasi terintegrasi, mendorong budaya pelaporan proaktif, dan memberi rekomendasi strategis untuk tindakan preventif kedepannya"]}, {"c": "Industrial Hygiene", "d": "Kemampuan mengidentifikasi, mengukur, mengevaluasi, dan mengendalikan faktor bahaya fisik, kimia, biologi, ergonomi, dan psikososial pada lingkungan kerja untuk melindungi kesehatan pekerja sesuai standar ACGIH/NIOSH.", "cl": "HSE", "L": ["Mengetahui dasar bahaya IH: fisik, kimia, biologi, ergonomi, serta teori alat ukur.", "Memahami parameter IH (TLV-TWA, STEL), pengukuran sederhana kebisingan & pencahayaan, dan konsep sampling udara.", "Melakukan monitoring kebisingan, pencahayaan, heat stress, getaran, dust & gas; interpretasi data; verifikasi engineering control.", "Menyusun program IH tahunan berbasis risk exposure; analisis tren paparan; menentukan medical surveillance; evaluasi ventilasi teknis; menyusun laporan IH komprehensif.", "Merancang strategi pengendalian paparan jangka panjang; mengembangkan program pemantauan paparan terpadu; menjadi advisor desain fasilitas (IH in Design); membangun corporate anan, kualitas, dan kepatuhan hukum", "cl": "Manufacture", "L": ["Mengetahui aturan dasar sistem dan standar yang berlaku", "Mematuhi aturan yang berlaku serta menerapkan prinsip standar dalam pekerjaan sehari-hari", "Mampu mengidentifikasi dan melaporkan kejadian yang tidak sesuai dengan standar dan mekanisme yang ada", "Mampu menyusun preventive action untuk menghindari kejadian yang sama terulang di kemudian hari", "Mampu merancang strategi system compliance jangka panjang sesuai dengan strategi perusahaan"]}, {"c": "Equipment Operation", "d": "Kemampuan mengoperasikan, mengelola, dan memelihara peralatan yang digunakan dalam proses produksi, penelitian, atau pengujian", "cl": "Manufacture", "L": ["Memahami konsep dasar pengoperasian peralatan dan dapat mengikuti instruksi yang diberikan untuk mengoperasikan peralatan", "Mampu mengoperasikan peralatan yang ada sesuai dengan instruksi yang diberikan", "Mampu mengoperasikan peralatan yang ada secara mandiri", "Mampu melakukan pemeliharaan rutin terhadap peralatan yang digunakan", "Memastikan peralatan beroperasi dalam kondisi optimal sesuai standar kualitas yang ditetapkan"]}, {"c": "Variance", "d": "Kemampuan mengidentifikasi, menganalisis, dan mengelola selisih antar target produksi dengan hasil produksi", "cl": "Manufacture", "L": ["Memahami konsep dasar variance serta mengetahui adanya selisih antara target produksi dan hasil produksi", "Mampu melaporkan variance dasar seperti pemakaian material berlebih atau hasil produksi di bawah target", "Mampu melakukan analisis penyebab utama variance menggunakan laporan produksi", "Mampu mengembangkan program improvement untuk menurunkan variance dan meningkatkan GP1", "Mampu melakukan analisis tren variance jangka panjang sehingga dapat mengembangkan kebijakan variance control untuk meningkatkan GP1"]}, {"c": "Technical Troubleshooting", "d": "Kemampuan mengetahui kerusakan teknis dan melakukan perbaikan mesin untuk memastikan kelancaran operasional produksi", "cl": "Maintenance", "L": ["Mengetahui tanda-tanda masalah teknis dasar", "Mampu melakukan perbaikan mesin sederhana dengan instruksi", "Mampu mengidentifikasi penyebab kerusakan mesin dan melakukan perbaikan secara mandiri", "Mampu mengembangkan preventive action agar tidak terjadi kerusakan serupa di kemudian hari", "Mampu merancang sistem troubleshooting jangka panjang yang efektif dan efiesien serta mengembangkan kemampuan tim dalam troubleshooting"]}, {"c": "Raw & Packaging Material Analysis", "d": "Kemampuan menganalisis dan mengevaluasi raw material maupun packaging material yang digunakan dalam proses produksi untuk memastikan kualitas, keamanan, dan kesesuaiannya terhadap spesifikasi yang ditentukan", "cl": "QC Incoming", "L": ["Memahami spesifikasi utama kualitas RMPM yang telah ditentukan", "Mampu mengidentifikasi perbedaan kualitas RMPM yang sesuai dengan standar dan tidak sesuai", "Menganalisis potensi risiko yang mungkin muncul dari RMPM yang digunakan terhadap produk akhir", "Mengevaluasi kualitas RMPM terhadap produk akhir dan menganalisis standar RMPM yang berlaku", "Mengembangkan kebijakan standar RMPM yang digunakan perusahaan agar dapat meningkatkan kualitas produk yang dihasilkan"]}, {"c": "Maintenance Management", "d": "Kemampuan mengelola aktivitas perawatan mesin (preventive, predictive, corrective) untuk menjamin kesiapan mesin dan mengurangi downtime", "cl": "Maintenance", "L": ["Memahami fungsi dasar mesin dan pentingnya perawatan mesin", "Mampu melaksanakan kegiatan perawatan mesin dasar sesuai jadwal", "Mampu mengidentifikasi pola kerusakan berulang dan menganalisis penyebab utama kerusakan", "Mampu menyusun rencana perawatan mesin dan meminimalkan downtime dengan perbaikan tepat waktu", "Mampu merancang strategi perawatan mesin yang efektif dan efisien serta sejalan dengan strategi perusahaan"]}, {"c": "Regulatory Compliance", "d": "Kemampuan untuk memastikan bahwa produk yang diproduksi dan didistribusikan mematuhi peraturan dan regulasi yang b anan dan penanganan produk", "Mampu menyusun strategi warehouse management yang selaras dengan supply chain perusahaan"]}, {"c": "Quality Management", "d": "Kemampuan mengelola, mengendalikan, dan meningkatkan kualitas produk serta proses kerja secara konsistem untuk memastikan kepuasan pelanggan dan keberlanjutan operasional", "cl": "QC, Formulation", "L": ["Mengetahui standar kualitas dasar yang digunakan serta mampu menerapkan prosedur mutu tersebut dalam pekerjaan sehari-hari", "Mampu melaporkan ketidaksesuaian kualitas produk terhadap standar", "Mampu menganalisis penyebab ketidaksesuaian kualitas produk", "Mampu mengintegrasikan sistem mutu lintas department untuk mencegah defect & waste", "Mampu merancang strategi mutu yang selaras dengan tujuan strategis perusahaan"]}, {"c": "Bad Stock Management", "d": "Kemampuan mengidentifikasi, megnendalikan, dan mengelola produk tidak sesuai standar agar tidak menjadi waste", "cl": "Manufacture", "L": ["Mengetahui kategori produk reject atau rusak (bad stock) dan aturan dasar penanganannya", "Mampu melaporkan kondisi produk yang tidak sesuai standar serta melakukan pemisahan produk sesuai prosedur", "Mampu menganalisis penyebab terjadinya produk yang tidak sesuai standar serta melakukan penanganan sesuai ketentuan", "Mampu mengembangkan dan melakukan koordinasi prosedur penanganan produk tidak sesuai standar lintas departemen", "Mampu merancang strategi pengelolaan produk tidak sesuai standar di tingkat perusahaan untuk meminimalisir potensi waste"]}, {"c": "Continuous Improvement", "d": "Kemampuan beradaptasi terhadap perubahan/hal-hal baru dan mengembangkan ide/inovasi baru untuk meningkatkan mutu produk, kualitas layanan dan efektvitias serta efisiensi proses/metode kerja dari waktu ke waktu.", "cl": "Manufacture", "L": ["Mengidentifikasi ide yang berhubungan dengan program/proses kerja pribadi sebagai dasar dalam membuat program/proses kerja baru", "Menerapkan best practice dari tempat lain untuk mengatasi masalah s fisiensi investasi.", "cl": "Channel MT", "L": ["Mengetahui struktur dan karakteristik kanal Modern Trade (MT) dan E-Commerce.", "Memahami dinamika pasar MT, hubungan key account, dan perilaku konsumen digital.", "Mengelola strategi channel untuk brand/country, termasuk pricing dan promo alignment.", "Mengembangkan channel roadmap dan go-to-market strategy untuk mengoptimalkan revenue mix.", "Merancang dan memimpin strategi channel global MT & E-Commerce dengan integrasi antara offline dan online sales ecosystem."]}, {"c": "Strategic Partnership & Negotiation Management", "d": "Kemampuan membangun hubungan strategis dengan key accounts dan mitra bisnis untuk mencapai target volume, profit, dan brand visibility.", "cl": "Channel MT", "L": ["Mengetahui jenis-jenis mitra utama di MT & E-Commerce (hypermarket, minimarket, online platform).", "Memahami konsep joint business plan (JBP) dan trading term negotiation.", "Melakukan negosiasi kontrak dan pelaksanaan JBP dengan mitra retail utama.", "Memimpin strategic negotiation sessions lintas kategori dan memastikan ROI komersial optimal.", "Membangun strategic alliance framework jangka panjang untuk MT global & regional partners."]}, {"c": "Category & Assortment Management", "d": "Kemampuan mengelola portofolio kategori dan produk dalam rak MT/E-Commerce untuk meningkatkan visibilitas dan pertumbuhan penjualan.", "cl": "Channel MT", "L": ["Mengetahui struktur kategori dan prinsip penempatan produk (planogram basics).", "Memahami konsep assortment optimization, pricing tiering, dan shelf management.", "Mengelola product assortment dan planogram execution sesuai arah kategori dan strategi harga.", "Mengoptimalkan strategi kategori berdasarkan analisis shopper insight dan sales data analytics.", "Merancang category vision strategy lintas wilayah dan mengintegrasikan data konsumen, channel, dan profitabilitas."]}, {"c": "Commercial Planning, Revenue & P&L Management", "d": "Kemampuan merancang dan mengelola perencanaan komersial MT/E-Commerce untuk memastikan profitabilitas, efisiensi promosi, dan pencapaian target.", "cl": "Channel MT", "L": ["Mengetahui elemen dasar P&L dan struktur biaya channel modern.", "Memahami proses sales forecast, trade spend, dan ROI analysis.", "Menerapkan revenue plan per account, termasuk perhitungan Gross-to-Net (GTN) dan kontrol A&P (Advertising & Promotion).", "Mengembangkan Revenue Growth Management (RGM) strategy dan memastikan profitabilitas per channel.", "Merancang corporate commercial planning system lintas channel untuk mengintegrasikan pendapatan, margin, dan investasi promosi."]}, {"c": "Shopper & Market Insight Analytics", "d": "Kemampuan mengolah data perilaku konsumen modern, tren pasar, dan kompetitor untuk mendukung keputusan strategi bisnis.", "cl": "Channel MT", "L": ["Mengetahui konsep riset shopper dan indikator market share MT/E-Commerce.", "Memahami alat dan metrik analitik seperti basket analysis, penetration, dan trip frequency.", "Menggunakan shopper insight untuk mengembangkan promosi dan inovasi kategori.", "Mengintegrasikan data consumer panel, POS, dan digital analytics untuk optimasi keputusan bisnis.", "Merancang shopper insight ecosystem global dan memastikan data digunakan dalam setiap pengambilan keputusan strategis."]}, {"c": "Trade Activation & Promotion Effectiveness", "d": "Kemampuan merancang, mengimplementasikan, dan mengevaluasi efektivitas promosi dan activation program di channel MT & E-Commerce.", "cl": "Channel MT", "L": ["Mengetahui prinsip dasar in-store activation dan promotion mechanics.", "Memahami promotion calendar, price-off mechanics, dan display execution.", "Melaksanakan activation plan sesuai strategi channel dan memantau hasil ROI per campaign.", "Mengembangkan Trade Promotion Effectiveness System (TPE) untuk pengukuran hasil promosi.", "Mendesain Integrated Trade Activation Strategy lintas negara berbasis data ROI dan real-time campaign evaluation."]}, {"c": "Omnichannel Integration & Consumer Expe am negosiasi standar.", "Menggunakan CRM untuk mendukung proses negosiasi, mampu menganalisis data pelanggan untuk strategi dasar.", "Mengelola negosiasi kompleks dengan pendekatan berbasis data, memberikan rekomendasi solusi kepada manajemen.", "Memimpin strategi negosiasi tingkat tinggi, membangun hubungan jangka panjang, dan mengembangkan framework negosiasi perusahaan."]}, {"c": "AP (Web Application for Financial Budgeting and Promotions) Operations", "d": "Kemampuan untuk menguasai penggunaan aplikasi AP yang berfungsi untuk pengelolaan anggaran promosi, termasuk perencanaan (planning) dan implementasi budgeting sesuai kebijakan perusahaan. Kompetensi ini mencakup pemahaman alur persetujuan,", "cl": "Channel MT", "L": ["Memahami dasar penggunaan aplikasi AP untuk input data sederhana, bekerja sesuai SOP dengan pengawasan.", "Melakukan input data dan mengikuti alur persetujuan, mampu menyelesaikan tugas rutin secara mandiri.", "Mengelola perencanaan dan alokasi anggaran, memastikan kesesuaian dengan kebijakan perusahaan.", "Memantau realisasi anggaran, membuat laporan budgeting, dan memberikan insight untuk perbaikan proses.", "Mengintegrasikan AP dengan sistem lain, mengoptimalkan proses budgeting, dan memimpin inisiatif efisiensi lintas departemen."]}]}, {"fn": "Commercialization Category", "grp": "Non-Manufacture", "comps": [{"c": "Market Strategy & Share Growth", "d": "Kemampuan merancang strategi untuk meningkatkan pertumbuhan pangsa pasar lintas GT/MT/E-Commerce (General Trade/Modern Trade/Perdagangan Daring) dengan berbasis kebutuhan consumer, market analisis, market trend dan kompetitor analisis.", "cl": "Strategic & Planning", "L": ["Memahami dan Mampu menjelaskan concept dari catageory sizing, melalu market share, ND, WD, SPPD. Familiar dengan external data (Nielsen retail panel, Kantar world panel etc)", "Mampu membaca dan memahi tren share, ND, WD, SPPD by channel, area, packtype product, price point dan selanjutnya menghubungkan dengan data performance internal seperti baseline vs promo, impact penur", "Menyusun hipotesis/strategi untuk growth & menurunkan nya menjadi detail-detail berdasarkan category, channel, eceran/price point, trade aktivitas.", "Mendesain strategi portofolio secara short (2-5 tahun) & role dari masing-masing caetgory/product yang berbasis pada market-consumer opportunity dan internal profitability.", "Menetapkan playbook pertumbuhan kategori; mengarahkan investasi pada category-category yang memiliki potensi berbasis data-data internal dan eksternal."]}, {"c": "Sales Planning & Forecasting", "d": "Kemampuan untuk menerjemahkan strategi ke target penjualan pada setiap kategori/brand/region serta memantau eksekusi.", "cl": "", "L": ["Menjelaskan forecast, seasonality, dasar S&OP (Sales & Operations Planning); membedakan sell-in vs sell-out, memantau OOS di setiap titiknya", "Membaca dashboard penjualan; memetakan gap-to-target; memahami dampak promo calendar pada forecast.", "Membangun forecast operasional; menyusun target cascade; membuat recovery plan berdasarkan kinerja mingguan.", "Menerapkan kolaborasi/kordinasi antara divisi, meningkatkan akurasi forecast yang berbasi dari promo plan, baseline, SKU focus dan OOS-Overstock.", "Merancang strategi penjualan melalui promo plan/SKU Focus, memahami/menetapkan alarm warning untuk overstock/OOS dan menurunkan k portfolio strategi."]}, {"c": "Channel Strategy", "d": "Kemampuan untuk merancang strategi channel dan campaign 360° (ATL/BTL, Digital, Retail Media, Affiliate) selaras target komersial.", "cl": "", "L": ["Memahami konsep dasar channel marketing, funnel konsumen, serta peran masing-masing channel dalam membangun awareness, consideration, dan conversion.", "Menyusun rencana channel, memetakan peran channel terhadap funnel, memahami syarat kreatif per channel.", "Menjalankan kampanye 360°: set UTM, koordinasi influencer/affiliate, aktivasi retail media; melakukan incrementality test dasar & post-mortem.", "Mengalokasikan budget berbasis insight MMM/MTA; mengoptimalkan retail media (audience, bid, placement); menyatukan hasil ke learning agenda lintas brand.", "Menetapkan strategi portofolio & guideline media organisasi; menegosiasikan JBP/MDF strategis; menskalakan framework orkestrasi lintas brand"]}, {"c": "Strategic Portfolio Design", "d": "Kemampuan merancang, mengelola, dan mengoptimalkan portofolio produk secara end-to-end-meliputi kategori, brand, SKU, dan lifecycle produk-berdasarkan insight pasar, strategi bisnis, dan kinerja finansial untuk mendorong pertumbuhan berkela", "cl": "", "L": ["Memahami konsep dasar portofolio produk, lifecycle produk, peran kategori/brand/SKU, serta metrik kinerja utama seperti sales, margin, dan kontribusi portofolio.", "Menjelaskan hubungan antara strategi bisnis, strategi kategori, dan portofolio produk serta memahami dampak keputusan portofolio terhadap performa pasar dan finansial.", "Mengelola dan mengeksekusi portofolio produk pada scope tertentu dengan menganalisis performa SKU/brand, mengusulkan pengembangan, penyesuaian, atau rasionalisasi berdasarkan data pasar dan kinerja.", "Merancang strategi portofolio lintas dengan menyeimbangkan growth, profitability, dan resource allocation serta mengintegrasikan insight pasar, keuangan, dan channel.", "Menentukan arah strategis portofolio perusahaan secara menyeluruh, menetapkan prioritas investasi jangka panjang, dan memastikan portofolio menjadi penggerak utama keunggulan kompetitif dan pertumbuha"]}, {"c": "Pricing, Trade Terms & GP Margin", "d": "Kemampuan untuk menjaga competitiveness harga dengan competitor, ratio promo, dan internal margin agar bisa mendapatkan profit yang bagus di category/channel/sku.", "cl": "Financial Accumen", "L": ["Memahami definisi COGS (Cost of Goods Sold), GP, discount (outlet and consumer), dasar price elasticity & mix.", "Menganalisis korelasi dampak dari promo terhadap volume and profitability.", "menentukan standar pricing setiap sku dan promo yang dilakukan dengan memperhatikan impact terhadap volume, dan profitability masing-masing SKU/channel", "membuat min-max (pricing elasticity) untuk setiap SKU dan breakdown by channel", "mengarahkan all pricing sku/category menjadi profitability dengan mempertimbangkan promo and competition."]}, {"c": "A&P Investment & ROMI Analytics", "d": "Kemampuan untuk merencanakan, mengalokasikan, dan mengevaluasi investasi A&P (Advertising & Promotion) agar efisien & berdampak pada ROMI (Return on Marketing Investment).", "cl": "", "L": ["Menjelaskan A&P % of Net Sales, ROMI, konsep MMM/MTA (Marketing Mix Modeling/Multi-Touch Attribution), workflow PR/PO/GR (Purchase Requisition/Purchase Order/Goods Receipt).", "Menganalisis variance Plan vs Actual; memahami guardrail metrics; menilai hasil post-event sederhana.", "Membuat budget phasing; menjalankan evaluasi uplift/holdout; membangun dashboard ROMI", "Mendesain measurement framework & KPI tree (Key Performance Indicator); menggabungkan insight MMM/MTA untuk menentukan kegiatan yang dilakukan efektif/tidak", "Menetapkan standar investasi & governance organisasi; mengoptimalkan portofolio A&P secara struktural untuk pertumbuhan & profit."]}, {"c": "Project Management", "d": "Kemampuan untuk memimpin dan melaksanakan sebuah project dengan efektif, termasuk di dalamnya merencanakan project, menjalankan project, mengawasi project, dan menyelesaikannya sesuai dengan target yang telah ditentukan.", "cl": "Operation & Execution", "L": ["Melaksanakan project sesuai dengan timeline yang diberikan", "Membuat inisiasi project dan memaksimalkan semua sumber daya yang ada untuk memastikan project berjalan dengan efektif", "Memimpin sebuah project. Membuat perencanaan strategis untuk implementasi project berdasarkan data pendukung, strategi/ action plan ketika terjadi hal diluar perencanaan", "Memonitor dan melakukan controlling terhadap komponen project (Cost, Timeline, Resources, Project Quality) dan eksekusi project", "Memberikan inovasi project baru yang dapat meningkatkan efektivitas bisnis sesuai dengan strategi bisnis perusahaan dan memahami bagaimana project yang dilakukan memiliki efek pada business objectives"]}, {"c": "End-to-End Supply Operations & Monitoring", "d": "Kemampuan memantau, menganalisis, dan mengelola ketersediaan stok di setiap titik distribusi serta memastikan proses replenishment berjalan optimal untuk mencegah OOS dan menjaga tingkat layanan.", "cl": "", "L": ["Memahami data stok di tiap titik distribusi serta dapat mengidentifikasi potensi OOS/overstock berdasarkan indikator dasar.", "Melakukan penyesuaian RPH & replenishment sederhana berdasarkan pola permintaan, stok, dan kapasitas distribusi.", "Mengelola ritme replenishment end-to-end, menyusun early warning dan melakukan tindakan preventif untuk memastikan ketersediaan stok stabil di seluruh titik.", "Menganalisis pola supply-demand secara mendalam, mengidentifikasi root cause, dan menjalankan improvement untuk menekan OOS/overstock secara berkelanjutan.", "Merancang sistem monitoring, forecasting, dan replenishment yang terstandardisasi; mengoptimalkan model supply & availability untuk meningkatkan service level secara strategis di seluruh jaringan dist"]}, {"c": "Data Interpretation for Commercial Operations", "d": "Kemampuan memahami, mengolah, dan menginterpretasi data terkait stok, penjualan, RPH, dan distribusi untuk mendukung pengambilan keputusan operasional dan project commercialization.", "cl": "", "L": ["Memahami dashboard dan membaca indikator dasar seperti stok, sell-out, OOS.", "Memberikan insight sederhana dari data monitoring.", "Menghasilkan rekomendasi operasional berdasarkan analisis data.", "Melakukan analisis mendalam untuk improvement proses dan koordinasi lintas fungsi.", "Mendesain ritme laporan & sistem analisis operasional terintegrasi untuk mendukung strategic decision-making."]}, {"c": "Consumer Behavior Analysis", "d": "Kemampuan memahami dan menganalisis pola perilaku dan proses pengambilan keputusan konsumen L": ["Memahami prinsip dasar riset kualitatif dan kuantitatif serta mengenali berbagai metode riset yang umum digunakan", "Mampu melaksanakan riset, mengelola data riset, serta menyusun laporan hasil riset sesuai arahan", "Mampu merancang dan menentukan metode riset yang sesuai secara mandiri serta melakukan analisis data yang lebih mendalam", "Mampu mengembangkan kerangka riset strategis perusahaan dan terintegrasi dengan bisnis perusahaan", "Mampu menjadi expert dalam proses riset konsumen dan mengembangkan kemampuan tim dalam riset konsumen"]}, {"c": "Market Trend Analytics", "d": "Kemampuan menganalisis, memahami, mengumpulkan dan mensintesis data dari berbagai sumber dan memprediksi tren pasar saat ini dan yang akan datang", "cl": "Consumer & Market Knowledge", "L": ["Mengetahui konsep dasar analisis tren pasar, serta syarat yang harus diperlukan untuk melakukan analisis tren pasar", "Mampu mengumpulkan dan mengolah data yang relevan untuk mendukung analisis tren pasar", "Mampu melakukan analisis tren pasar, perkembangan industri, serta temuan dan laporan yang berkaitan dengan strategi bisnis", "Menganalisis tren pasar yang dapat berdampak pada aktivitas marketing, serta membuat perkiraan kebutuhan pasar di masa depan", "Membuat standar prosedur (alat penelitian, metodologi) untuk mengadakan analisis tren pasar kedepannya"]}, {"c": "Consumer Needs & Behavior Understanding", "d": "Kemampuan memahami dan menganalisis preferensi, pola perilaku, penggunaan, persepsi dan motivasi atau proses pengambilan keputusan konsumen berdasarkan data riset", "cl": "Consumer & Market Knowledge", "L": ["Memahami konsep dasar perilaku konsumen dan mengenali faktor-faktor yang memengaruhi perilaku konsumen", "Mampu menyusun dan melaksanakan riset untuk mendapatkan data perilaku konsumen sesuai rencana", "Mampu melakukan analisis & memberikan rekomendasi analisa paling tepat untuk menjawab key business questions perusahaan", "Mampu menghubungkan perilaku konsumen dengan tren pasar dan berbagai temuan dari sumber lainnya dan memberikan rekomendasi yang actionable yang sesuai dengan kebutuhan dan strategi perusahaan", "Mampu menentukan strategi perusahaan dalam memahami perilaku konsumen serta menerapkan budaya consumer-centric strategy"]}, {"c": "Social Listening & Digital Insight", "d": "Kemampuan memonitor, menganalisis, dan menginterpretasikan percakapan digital (media sosial, e-commerce) untuk memahami persepsi konsumen dan tren pasar", "cl": "Consumer & Market Knowledge", "L": ["Mengetahui cara kerja platform social listening serta indikator dasar percakapan digital (volume, topik, sentimen, engagement).", "Mampu melakukan analisis dasar percakapan digital dan menyusun temuan awal yang faktual dan relevan untuk kebutuhan brand.", "Mampu mengidentifikasi pola, isu, dan insight utama dari percakapan konsumen untuk menyusun rekomendasi komunikasi atau keputusan brand.", "Mampu mengintegrasikan data social listening dengan sumber data lain (FGD, survey, e-commerce, internal data) untuk memperkuat dan memperkaya insight.", "Mampu mengubah temuan social listening menjadi rekomendasi aksi brand yang strategis dan tepat waktu, termasuk mengantisipasi peluang atau potensi isu secara proaktif."]}, {"c": "Data Analysis, Interpretation & Communication", "d": "Kemampuan mengolah, menganalisis, menginterpretasikan, dan mengkomunikasikan data secara jelas, akurat, dan relevan", "cl": "Consumer & Market Knowledge", "L": ["Memahami konsep dasar data, informasi, dan insight.", "Bisa mengumpulkan data dari sumber internal/eksternal dan memeriksa kualitasnya.", "Mampu mengamati tren dan pola serta menarik insight dari data yang ada", "Mampu mengubah hasil analisis menjadi langkah strategis yang berdampak pada keputusan bisnis", "Mampu menyampaikan insight dengan jelas ke stakeholder dan mendukung pengambilan keputusan."]}, {"c": "Project Management", "d": "Kemampuan untuk memimpin dan melaksanakan sebuah project dengan efektif, termasuk di dalamnya merencanakan project, menjalankan project, mengawasi project, dan menyelesaikannya sesuai dengan target yang telah ditentukan, spesifik untuk proy", "cl": "Consumer & Market Knowledge", "L": ["Melaksanakan project sesuai dengan timeline yang diberikan", "Mampu menginisiasi project sederhana dan mengoordinasikan sumber daya serta stakeholder untuk memastikan project berjalan sesuai rencana awal.", "Memimpin sebuah project end-to-end: membuat rencana kerja, menetapkan prioritas & timeline, mengelola risiko/issue, serta memastikan deliverable terpenuhi sesuai tujuan.", "Memantau dan mengendalikan aspek-aspek utama project (biaya, timeline, kualitas, risiko, resource) serta melakukan penyesuaian saat terjadi deviasi untuk menjaga kualitas hasil project.", "Mengembangkan standar, metodologi, dan praktik terbaik project management (SOP, framework, template), serta memberikan coaching kepada tim untuk meningkatkan kualitas pelaksanaan riset ke depan."]}, {"c": "AI-Enabled Research & Insight Capability", "d": "Kemampuan untuk memanfaatkan, mengombinasikan, dan mengintegrasikan berbagai tools berbasis AI untuk mempercepat desk research, membangun initial understanding, menghasilkan first-cut insight, serta meningkatkan kualitas analisa sebelum dee", "cl": "Consumer & Market Knowledge", "L": ["Menggunakan AI sebagai supporting tool untuk mencari informasi umum dan memperkaya pengetahuan dasar.", "Mampu memanfaatkan AI untuk mempercepat pekerjaan dasar riset seperti desk research, data scan, dan draft awal insight.", "Secara konsisten menggunakan AI dalam berbagai tahapan riset untuk menghasilkan first-cut insight yang akurat dan dapat diolah lebih lanjut oleh CMK.", "Menggunakan AI secara sistematis dalam proses kerja tim atau fungsi tertentu serta mampu menggabungkan beberapa tool AI dalam satu alur kerja riset dan in", "Mampu mengombinasikan hasil AI dengan data nyata, mengembangkan workflow/prompt yang efektif, melakukan validasi berbasis prinsip riset, dan menjadi rujukan tim dalam pemanfaatan AI untuk research & i"]}, {"c": "Consumer Trend Insight & Foresight", "d": "Kemampuan untuk mengidentifikasi dan menganalisis perkembangan tren konsumen serta menilai implikasinya terhadap kategori, perilaku konsumen, dan potensi inovasi.", "cl": "Consumer & Market Knowledge", "L": ["Mampu mengenali tren dan sinyal awal dari sumber sederhana (misal: media sosial, artikel populer) tanpa melakukan pengumpulan data secara sistematis.", "Mampu mengumpulkan dan mengorganisir data tren dari berbagai sumber secara lebih terstruktur (media, social listening, laporan industri, inovasi kategori).", "Mampu menganalisis data untuk mengidentifikasi pola perubahan perilaku, sinyal awal, dan kebutuhan baru konsumen.", "Mampu menginterpretasikan arah pergerakan tren dan menerjemahkannya menjadi dampak bagi kategori, konsumen, maupun channel.", "Mampu mengintegrasikan analisis tren dengan strategi inovasi dan pertumbuhan bisnis perusahaan, serta mengkomunikasikannya secara jelas kepada pemangku kepentingan."]}]}, {"fn": "Corporate HC", "grp": "Non-Manufacture", "comps": [{"c": "Employer Branding", "d": "Membangun citra perusahaan yang positif untuk menarik kandidat berkualitas dan memperkuat daya saing perusahaan di pasar kerja.", "cl": "Talent Acquisition", "L": ["Memahami konsep dasar employer branding dan pentingnya citra perusahaan.", "Mampu melakukan aktivitas sederhana employer branding (misalnya posting lowongan) sesuai arahan.", "Mandiri dalam mengelola aktivitas branding (career fair, kampanye media sosial) serta memonitor efektivitasnya.", "Mengembangkan strategi employer branding lintas channel, melatih tim lain, dan menganalisis positioning perusahaan di talent market.", "Menciptakan strategi employer branding jangka panjang yang inovatif, menjadi representasi utama perusahaan di talent market, serta memengaruhi reputasi industri."]}, {"c": "Needs Assessment", "d": "Mengidentifikasi kesenjangan kompetensi & kebutuhan pelatihan berdasarkan tujuan bisnis dan i taxonomy dengan HRIS/ATS/LMS dan workforce planning a", "Mendesain arsitektur kompetensi global dan mengaitkannya dengan strategi korporat, EVP, serta change & transformation agenda. - Menetapkan enterprise competency mapping lintas region dan fungsi serta"]}, {"c": "Talent Identification & succession Planning", "d": "Menentukan karyawan berpotensi tinggi berdasarkan kriteria objektif & strategi organisasi serta menyusun jalur suksesi", "cl": "", "L": ["Mengetahui konsep dasar identifikasi talent dan pentingnya rencana suksesi", "Mampu melakukan pemetaan talent dengan alat sederhana (mis. 9-Box Grid).", "Menggunakan berbagai metode dan alat (mis. talent review) untuk identifikasi HiPo secara konsisten. Menyusun jalur suksesi dan memonitor kesiapan successor.", "Mengintegrasikan proses identifikasi HiPo ke dalam sistem manajemen SDM organisasi dan mengimplementasikan readiness tracking untuk suksesi", "Mendesain sistem suksesi terintegrasi dan berkelanjutan untuk memastikan kesinambungan kepemimpinan lintas divisi dan business unit"]}, {"c": "Development Planning", "d": "Membuat program pengembangan individu untuk calon successor/HiPo.", "cl": "", "L": ["Mengetahui pentingnya rencana pengembangan individu (IDP).", "Mampu membantu menyusun IDP sederhana untuk HiPo.", "Mengelola dan memonitor implementasi IDP untuk talent utama.", "Mendesain dan mengevaluasi efektivitas program pengembangan (mentoring, job rotation, dll.).", "Mengintegrasikan development planning dengan strategi suksesi dan pipeline kepemimpinan organisasi."]}, {"c": "People Movement Process", "d": "Mengatur proses mutasi, promosi, rotasi, dan demosi sesuai kebijakan & kebutuhan organisasi.", "cl": "", "L": ["Mengetahui kebijakan dasar terkait mutasi, promosi, dan rotasi.", "Mampu melakukan proses mutasi/demosi sesuai prosedur standar.", "Mengelola proses mutasi, promosi, dan rotasi untuk beberapa unit kerja.", "Mendesain dan mengimplementasikan sistem pergerakan karyawan berbasis kompetensi dan kebutuhan organisasi.", "Mengarahkan strategi pergerakan karyawan lintas fungsi dan negara untuk mendukung mobilitas dan pertumbuhan bisnis."]}, {"c": "KPI Cascading & Alignment", "d": "Menyusun struktur KPI yang terhubung dari level organisasi hingga individu agar selaras dengan strategi perusahaan.", "cl": "Performance Management", "L": ["Mengidentifikasi konsep KPI tree, OKR (Objective-Key Results), SMART, baseline/target, dan threshold (minimum-target-stretch).", "Menyusun hubungan antara sasaran perusahaan-unit-individu; membedakan leading vs lagging KPI; memilih unit of measure & rumus perhitungan; menulis Key Result terukur.", "Mengonfigurasi form KPI/OKR di HRIS (field, weight, anchor); menautkan evidence/link pendukung; menjalankan validasi formula & auto-score; memastikan traceability dan audit trail.", "Melakukan quality check KPI lintas fungsi (duplikasi, gaming risk, relevansi outcome); menormalisasi antar-unit (z-score/index); memimpin pilot & UAT; menerbitkan Quick Reference Guide.", "Mendesain arsitektur KPI/OKR organisasi; mengintegrasikan ke sistem reward & Individual Development Plan; melakukan analisis validitas (korelasi skor ⇄ hasil bisnis); menghapus atau mengganti metrik u"]}, {"c": "Performance Analytics & Monitoring", "d": "Melakukan pemantauan karyawan secara berkala dan berkesinambungan.", "cl": "", "L": ["Mengenali indikator kinerja dan fungsi dasar HRIS/performance dashboard.", "Mampu melakukan pemantauan data kinerja rutin & laporan sederhana dengan arahan.", "Melakukan analisis kinerja mandiri, mengidentifikasi tren di unit kerja.", "Mendesain sistem monitoring lintas fungsi dengan data analitik & reporting advanced.", "Menjadi penentu arah strategi monitoring kinerja perusahaan berbasis data & teknologi."]}, {"c": "Performance Calibration", "d": "Kemampuan meninjau, membandingkan, dan menyelaraskan hasil penilaian kinerja lintas unit atau fungsi agar konsisten dengan standar organisasi dan mengurangi bias penilai.", "cl": "", "L": ["Mengidentifikasi tujuan calibration dan bias umum (halo, leniency, recency, central tendency); memahami istilah anchor rating dan inter-rater reliability.", "Menyiapkan sesi pre-read dan rating distribution; membuat decision log & draft notulen debrief.", "Memfasilitasi sesi kalibrasi: mereview scorecard, menegakkan anchor, mencatat keputusan rating/finalisasi; menegur bias yang tampak; menjalankan rater training singkat.", "Menganalisis data variance antar-rater & rater drift; menyiapkan guideline moderation & bar-raising; memantau adverse impact antar kelompok; menjaga time-to-complete dan completion rate.", "Mendesain framework calibration perusahaan (tier panel, quorum, two-hand rule); menghubungkan hasil ke reward & succession planning; mengaudit fairness & compliance; mengembangkan rater academy dan co"]}, {"c": "Constructive Feedback", "d": "Memberikan umpan balik kinerja secara objektif, membangun, dan berorientasi pada pengembangan.", "cl": "", "L": ["Mengenali prinsip dasar feedback (objektif, membangun).", "Mampu melakukan penyampaian feedback sederhana dengan arahan.", "Memberikan umpan balik mandiri yang konstruktif, berfokus pada pengembangan karyawan.", "Mengelola proses feedback formal lintas unit, termasuk situasi konflik & perbedaan individu.", "Menjadi role model komunikasi strategis, membangun budaya feedback positif & berkelanjutan di organisasi."]}, {"c": "Performance Reporting", "d": "Kemampuan mengolah, menganalisis, dan menyajikan data kinerja individu, tim, dan organisasi dalam bentuk laporan atau dashboard untuk mendukung pengambilan keputusan manajerial.", "cl": "", "L": ["Menyusun laporan dasar dengan menggunakan alat analisis seperti Excel atau Google Analytics.", "Menyusun laporan kinerja mingguan/bulanan dengan menggunakan berbagai alat seperti Power BI atau Tableau untuk visualisasi data.", "Membuat laporan kinerja yang mendalam dengan analisis varians dan menyarankan tindakan korektif berdasarkan hasil analisis.", "Menyusun laporan kinerja yang komprehensif dan memberikan insight yang lebih strategis mengenai kekuatan dan area yang perlu diperbaiki.", "Mengelola penyusunan laporan kinerja yang mencakup seluruh organisasi, melibatkan berbagai unit untuk mengembangkan wawasan dan rekomendasi bagi pengambilan keputusan eksekutif"]}, {"c": "Performance Review & Improvement", "d": "Kemampuan mengevaluasi hasil kinerja terhadap target yang ditetapkan, mengidentifikasi area pengembangan, serta merancang dan mengimplementasikan rencana perbaikan kinerja individu maupun tim.", "cl": "", "L": ["Memahami pentingnya evaluasi kinerja dan memberikan umpan balik dasar.", "Secara rutin melakukan review kinerja dan mengidentifikasi area yang perlu perbaikan.", "Melakukan analisis mendalam terhadap hasil kinerja, memberikan umpan balik dan merencanakan perbaikan untuk masalah yang ditemukan.", "Mengelola proses evaluasi kinerja secara berkelanjutan, serta merencanakan perbaikan sistematis untuk tim dan individu", "Memimpin budaya perbaikan kinerja secara holistik, mengelola evaluasi dan penyempurnaan kinerja secara menyeluruh di seluruh organisasi."]}, {"c": "Organizational Diagnosis, Design & Analytics", "d": "Combines org diagnostics, structure design, data-driven insights (surveys, attrition, role-level metrics) and workload analysis to recommend structural and resourcing solutions.", "cl": "Organizational Development", "L": ["Can accurately read org charts, collect basic role data and produce simple headcount tables; performs WLA data collection under supervision.", "Conducts structured diagnostics (interviews, surveys), prepares dashboards (turnover, headcount) and runs basic workload analysis to highlight obvious resourcing gaps.", "Synthesizes diagnostic and analytical findings into clear design options; performs role-level workload analysis and proposes resourcing/role changes with quantified impact.", "Leads multi-BU diagnostics combining qualitative and quantitative evidence (including WLA models); designs target operating models and builds business cases for structural or resourcing change.", "Defines enterprise diagnostic standards and analytics strategy; sponsors workforce and WLA frameworks; advises execs on structural redesign and long-term workforce planning."]}, {"c": "Job Architecture & Job Evaluation", "d": "Job nomenclature, role profiling, job descriptions, point-factor/market evaluation, grading/banding, career ladders.", "cl": "", "L": ["Locates and interprets existing JDs and grading; updates JD templates and applies basic nomenclature.", "Drafts role profiles and JDs with manager input; collects data for evaluations and completes evaluation worksheets under guidance.", "Conducts job evaluations, justifies grade proposals with evidence and aligns roles to job families and career ladders.", "Designs grading structures, leads market benchmarking, harmonizes job families and advises on career architectures.", "Owns enterprise job architecture policy, sets evaluation governance and integrates architecture with pay and mobility strategy."]}, {"c": "Change Management", "d": "Stakeholder mapping, sponsor journeys, communications, adoption, resistance management and measurement.", "cl": "", "L": ["Supports comms and event logistics; maintains stakeholder registers and escalates observed resistance.", "Implements communications and adoption activities for local rollouts; monitors basic adoption objectives.", "Designs sponsor journeys and coach kits, defines adoption metrics and coaches managers on resistance management.", "Leads complex cross-functional change programs and embeds measurement into governance; resolves escalations effectively.", "Builds enterprise change capability and governance; secures executive sponsorship and links change outcomes to strategic KPIs."]}, {"c": "Business Process", "d": "Process mapping, SOPs, handovers, value stream mapping, automation opportunities and embedding new ways of working.", "cl": "", "L": ["Maps simple processes, maintains SOPs and records basic bottlenecks.", "Recommends low-complexity improvements, produces swimlane maps and defines local SLAs.", "Leads cross-functional process redesigns, defines controls/SLAs and manages pilot implementation.", "Integrates automation into process redesign, redefines roles & WoW and partners with IT to scale solutions.", "Sets enterprise BPM standards and process architecture; prioritises platform investments and ensures operational resilience."]}, {"c": "Project Management & Governance", "d": "Planning, tracking, risk & issue management, benefits tracking, PMO standards for OD programs.", "cl": "", "L": ["Maintains trackers, updates status and records minutes; flags obvious risks.", "Manages smaller project streams end-to-end with supervision; maintains RAID logs and vendor admin.", "Leads multi-stream OD programs, manages interdependencies and monitors benefits realisation.", "Designs governance forums, enforces programme controls and ensures corrective actions for benefits gaps.", "Defines PMO standards, prioritises OD portfolio investments and secures enterprise funding for strategic programmes."]}, {"c": "Global Employment Law & Labor Compliance", "d": "Kemampuan memahami, menerapkan, dan mengelola kepatuhan terhadap peraturan ketenagakerjaan lintas negara untuk meminimalkan risiko hukum, memastikan praktik kerja yang adil, serta mendukung keberlanjutan dan tata kelola organisasi secara gl", "cl": "Industrial Relation", "L": ["Memahami prinsip dasar peraturan ketenagakerjaan dan kewajiban perusahaan di negara yang berlaku", "Menerapkan ketentuan ketenagakerjaan yang relevan dalam aktivitas kerja sehari-hari sesuai kebijakan dan arahan perusahaan.", "Menginterpretasikan peraturan ketenagakerjaan utama, mengidentifikasi risiko kepatuhan, serta memberikan rekomendasi tindakan yang sesuai konteks bisnis.", "Mengelola kepatuhan ketenagakerjaan lintas negara, menyelaraskan kebijakan internal dengan regulasi lokal, serta memitigasi risiko hukum dan industrial.", "Menetapkan kerangka, standar, dan strategi global employment law & labor compliance sebagai bagian dari tata kelola, keberlanjutan, dan reputasi perusahaan."]}, {"c": "HR Legal Documentation", "d": "Penyusunan dan pengarsipan dokumen hukum/ketenagakerjaan agar tindakan HR punya dasar legal.", "cl": "", "L": ["Menandai, menyimpan, dan mengakses dokumen PP/PKB & WLKP untuk referensi internal.", "Membuat ringkasan isi PP/PKB (tata tertib, jam kerja, SP, sanksi) dan tenggat WLKP; mendokumentasikan timeline & bukti lapor.", "Menyusun/menyunting draft PP/PKB; mengurus pengesahan ke Disnaker; mengarsip WLKP; mendokumentasikan bukti sosialisasi ke karyawan.", "Menyelaraskan PP/PKB dengan komp & benefit, K3, skala upah; membangun kontrol versi & matriks kepatuhan; memonitor registrasi perubahan; membuat laporan audit internal.", "Merancang arsitektur dokumen HR multi-entitas; memimpin negosiasi PKB dengan Serikat; menyusun roadmap compliance & audit readiness; menyampaikan laporan strategis ke manajemen/board."]}, {"c": "Monitoring & Early Detection", "d": "Pemantauan kepatuhan/perilaku untuk menangkap indikasi pelanggaran lebih awal.", "cl": "", "L": ["Mencatat ketidaksesuaian awal kontrak PKWT/PKWTT, jam kerja/lembur, atau pelanggaran disiplin minor.", "Menyusun indikator early warning: insiden disipliner, absenteeism, overtime abuse; mendokumentasikan temuan unit.", "Memantau kepatuhan kontrak kerja, jam kerja, overtime; mencatat insiden disipliner; menyusun laporan unit bulanan dengan bukti dokumentasi.", "Membuat dashboard tren kasus & analisis risiko; menyusun rekomendasi perbaikan prosedur & matriks kepatuhan lintas unit; menyiapkan laporan evaluasi ke manajemen.", "Menetapkan governance monitoring multi-unit; mengaitkan hasil ke strategi retention & workforce planning; menyampaikan rekomendasi strategis ke board."]}, {"c": "Labor Relations", "d": "Membangun, mengelola, dan menjaga hubungan harmonis antara perusahaan, karyawan, dan serikat pekerja.", "cl": "", "L": ["Mengenali peran serikat pekerja & fungsi hubungan industrial.", "Mampu melakukan komunikasi dua arah sederhana dengan karyawan/serikat.", "Mengelola pertemuan rutin dengan serikat pekerja & menyelesaikan isu hubungan kerja tingkat unit.", "Membangun strategi hubungan industrial jangka panjang, menciptakan iklim kerja kondusif, menjaga hubungan kemitraan.", "Menjadi negosiator utama pada tingkat nasional/global, membentuk budaya hubungan industrial yang berkelanjutan & strategis."]}, {"c": "Preventive & Awareness", "d": "Aktivitas pencegahan lewat sosialisasi, policy refresh, dan komunikasi rutin supaya pelanggaran nggak muncul.", "cl": "", "L": ["Mengikuti sosialisasi labor law UU 13/2003 & PP 35/2021; mencatat istilah kunci PKWT/PKWTT, alih daya, jam kerja/lembur, PHK.", "Menyusun ringkasan hak & kewajiban karyawan berdasarkan PP/PKB; mendokumentasikan pertanyaan/isu dari karyawan.", "Menyelenggarakan sesi sosialisasi internal, membagikan materi PP/PKB, mencatat kehadiran, mengumpulkan feedback tertulis dari karyawan.", "Membuat modul sosialisasi berkelanjutan; menyusun dashboard partisipasi & pemahaman; menyiapkan laporan gap awareness unit.", "Menetapkan strategi komunikasi & preventive IR; mengaitkan program sosialisasi dengan KPI disiplin & kepatuhan organisasi; mempresentasikan hasil ke manajemen/top management."]}, {"c": "Labor Dispute Management", "d": "Menangani perselisihan hubungan industrial secara adil, cepat, dan sesuai prosedur hukum.", "cl": "", "L": ["Mengenali jenis-jenis perselisihan hubungan industrial.", "Mampu melakukan dokumentasi dasar kasus & mendukung mediasi internal.", "Menangani langsung perselisihan tingkat perusahaan, menyiapkan berkas hukum & terlibat dalam proses mediasi.", "Memimpin penyelesaian sengketa kompleks, berkolaborasi dengan pengacara, mediator, & lembaga pemerintah.", "Menjadi rujukan nasional dalam penyelesaian perselisihan industrial, berperan dalam arbitrase besar & kebijakan penyelesaian konflik ketenagakerjaan."]}, {"c": "Employee Case Handling", "d": "Penanganan laporan kasus sampai klarifikasi dan BAP sesuai aturan perusahaan.", "cl": "", "L": ["Mengidentifikasi SP 1-3 dan hak karyawan Pasal 156 melalui dokumentasi kasus sebelumnya.", "Menyusun ringkasan dasar hukum SP & PHK; mencatat alasan sah & yang dilarang; mendokumentasikan rekam jejak pelanggaran.", "Melakukan investigasi: membuat BAP, wawancara saksi, memverifikasi bukti, menerbitkan SP sah; menghitung simulasi pesangon/UP/UGH; menyusun surat PHK sesuai PP 35/2021.", "Menangani kasus kompleks: indisipliner berulang, fraud, tindak pidana; menerapkan PIP; mengelola settlement agreement & release & discharge; memonitor implementasi.", "Merancang framework disiplin & kinerja perusahaan; menilai implikasi reputasi & kepatuhan lintas yurisdiksi; menjadi penasihat strategis untuk restrukturisasi / PHK massal; mempresentasikan strategi k"]}, {"c": "Formal Dispute Handling", "d": "Penanganan sengketa resmi (bipartit/mediasi) sesuai UU/PKB.", "cl": "", "L": ["Mencatat tahapan bipartit & mediasi tripartit; menyimpan contoh RISALAH & PB.", "Menyusun checklist timeline, formalia undangan resmi, kuorum, notulen; mendokumentasikan proses mediasi.", "Memfasilitasi perundingan bipartit: menetapkan agenda, notulen, Berita Acara; menyiapkan posisi tawar & bukti; mengajukan mediasi ke Disnaker; menindaklanjuti Anjuran tertulis.", "Menegosiasi & merumuskan PB; mendaftarkan PB ke PPHI; mengelola strategi litigasi/non-litigasi; kalkulasi risiko & biaya; menyimpan dokumentasi lengkap.", "Menjadi lead negotiator kasus kompleks/mass dispute; menyusun playbook perselisihan; memberikan expert opinion ke manajemen/komisaris; membina relasi dengan otoritas ketenagakerjaan secara proaktif."]}, {"c": "Resolution & Settlement", "d": "Penetapan sanksi/keputusan akhir termasuk perhitungan hak-kewajiban.", "cl": "", "L": ["Menyimpan contoh settlement agreement & release & discharge.", "Menyusun ringkasan prosedur settlement; mencatat dampak pada karyawan & organisasi; mendokumentasikan hasil per unit.", "Membuat settlement agreement; memfasilitasi persetujuan pihak terkait; menyimpan dokumentasi final; memastikan bukti tanda tangan lengkap.", "Mengelola resolution kompleks; memastikan semua dokumentasi lengkap; memonitor kepatuhan implementasi; menyusun laporan efektivitas settlement.", "Merancang framework settlement strategis; mengaitkan dengan strategi industrial relations & reputasi organisasi; menyusun laporan strategis dan rekomendasi perbaikan kebijakan untuk manajemen/top boar"]}, {"c": "Post-Incident & Learning", "d": "Evaluasi kasus untuk perbaikan SOP, training ulang, dan pencegahan ulang.", "cl": "", "L": ["Mencatat kasus yang terjadi dan pelajaran awal dari setiap kasus.", "Menyusun laporan root cause sederhana & rekomendasi perbaikan untuk tim/unit; mendokumentasikan langkah follow-up.", "Membuat laporan post-incident; mengidentifikasi root cause; merekomendasikan perubahan prosedur & update PP/PKB; menyimpan dokumentasi bukti tindakan.", "Membuat dashboard learning & preventive action; integrasi ke kebijakan PP/PKB & modul sosialisasi; melacak efektivitas perbaikan & penyebaran modul.", "Menetapkan strategi IR berbasis data; mengaitkan hasil ke talent management, retention, continuous improvement; menyusun rencana strategis untuk manajemen/top board."]}, {"c": "Compensation and Benefit Design", "d": "Kemampuan merancang kompensasi, benefit, dan reward yang kompetitif serta selaras dengan strategi bisnis dan budaya perusahaan.", "cl": "HC services", "L": ["Mengetahui reward philosophy dan prinsip market posture (aggressive, median, conservative). - Mampu menampilkan tabel market benchmarking serta mengenali konsep P50/P75, pay range, midpoint, dan grade", "Mampu melakukan analisis sederhana terhadap struktur gaji dan benefit sesuai regulasi. - Memahami metodologi market benchmarking; mampu membaca data survei serta menghitung compa-ratio, range penetrat", "Mampu merancang struktur kompensasi dan benefit yang kompetitif serta selaras dengan strategi perusahaan. - Melakukan pengumpulan dan analisis data survei pasar, job matching, penyusunan pay structure", "Mampu mengintegrasikan strategi kompensasi dan benefit dengan tujuan jangka panjang perusahaan serta benchmarking eksternal. - Mendesain broadbanding/career stream, melakukan market pricing multi-surv", "Menetapkan arah strategis total reward perusahaan dan memimpin perubahan kebijakan Compensation & Benefit lintas negara atau entitas. - Menetapkan market posture dan pay positioning strategis, memasti"]}, {"c": "Compensation and Benefit Policy & Compliance", "d": "Menyusun kebijakan reward sesuai regulasi dan strategi perusahaan", "cl": "", "L": ["Mengetahui kebijakan reward yang berlaku di perusahaan.", "Mampu melakukan implementasi dasar kebijakan reward sesuai regulasi.", "Menyusun kebijakan reward yang selaras strategi perusahaan dan memastikan kepatuhan hukum.", "Mengelola evaluasi dan perbaikan kebijakan reward berdasarkan kebutuhan bisnis & tren pasar.", "Merumuskan strategi reward global yang inovatif, mengantisipasi perubahan regulasi, dan memengaruhi industri."]}, {"c": "Benefit Scheme Design (Medical, Allowance, Insurance, BPJS)", "d": "Kemampuan untuk merancang dan mengelola skema manfaat karyawan (medical, tunjangan, asuransi, dan BPJS) secara komprehensif agar selaras dengan kebijakan perusahaan, regulasi, dan kebutuhan kesejahteraan karyawan.", "cl": "", "L": ["Menunjukkan jenis benefit (tunjangan, medical, life/PA, BPJS); mengenal istilah co-pay, deductible, limit, waiting period.", "Memahami plan design (IP/OP, dental, maternity), eligibility/vesting, self-insured vs insured, experience rating; membaca utilization & claim ratio.", "Menyusun plan comparison & benefit book; melakukan RFP ke asuransi/TPA; negosiasi rate card; menghitung gross-up PPh21 untuk allowance; menyusun policy & SOP.", "Melakukan actuarial-style projection (trend, IBNR sederhana); plan redesign berbasis utilization & willingness to pay; menerapkan wellbeing program & cost-containment.", "Merumuskan benefit strategy lintas entitas/region; merancang flexible benefits/cafeteria plan; tata kelola compliance (BPJS, syariah, data privacy); kemitraan strategis dengan insurer/TPA."]}, {"c": "People Cost Forecasting", "d": "Kemampuan untuk melakukan pemodelan skenario dan proyeksi biaya total reward, termasuk simulasi kenaikan gaji, bonus, benefit, dan dampaknya terhadap anggaran perusahaan.", "cl": "", "L": ["Mengetahui konsep forecasting & scenario modeling; mengenal cost driver utama (HC, merit, promo, turnover).", "Memahami cara memodelkan beberapa scenario biaya tenaga kerja; membaca sensitivity analysis.", "Membuat scenario cost model untuk merit/promotion/incentive; menghitung impact terhadap budget dan forecast.", "Mengoptimalkan model proyeksi multi-skenario; menyiapkan dashboard monitoring cost & risk; menghubungkan dengan total reward plan.", "Menetapkan framework scenario planning strategis multi-tahun; memberikan advis ke eksekutif terkait impact cost reward pada business strategy & retention."]}, {"c": "Payroll Administration & Taxation Management", "d": "Mengelola gaji, tunjangan dan benefit secara akurat sesuai hukum dan regulasi", "cl": "", "L": ["Mengenali komponen payroll, cut-off, prorate, off-cycle; istilah NPWP/NIK, PTKP, tarif progresif, gross/gross-up/net.", "Memeriksa master data & alur JML; membaca payroll journal; mengecek mapping payroll ke GL; memahami metode hitung PPh21 & gross-up.", "Menjalankan payroll run end-to-end, memasukkan data overtime/allowance; menghitung PPh21/26; menerbitkan payslip & bukti potong 1721 A1/A2; menutup periode di SAP/Talenta; menindaklanjuti exception.", "Mengonfigurasi schema/rules SAP/Talenta; membuat laporan exception & rekonsiliasi; audit off-cycle run; menangani split payroll & gross-up policy.", "Mendesain payroll & tax governance multi-entitas; memimpin UAT/migrasi sistem; integrasi ke FP&A; advis kebijakan kompensasi; memastikan kepatuhan SOX & audit eksternal."]}, {"c": "BPJS & Pension Administration", "d": "Kemampuan mengelola administrasi BPJS Ketenagakerjaan, BPJS Kesehatan, dan program pensiun (DPLK/annuity) secara akurat, patuh regulasi, dan tepat waktu.", "cl": "", "L": ["Mengetahui program BPJS & jenis pensiun; istilah NRA, early/late retirement, iuran employer/employee, opsi lump-sum/annuity.", "Memeriksa eligibility & vesting; memahami batas upah BPJS; memeriksa alur enroll-maintain-claim DPLK; menghitung proyeksi manfaat sederhana.", "Memproses enroll/terminate peserta; update data gaji & masa iur; rekonsiliasi iuran payroll & bank; menghitung estimasi manfaat (JHT/DPLK/JP); membuat benefit quotation & cost sheet; menjelaskan opsi", "Mendesain SOP & kontrol exception; menangani mutasi massal, rate change; memodelkan skenario early/normal retirement & deferment; bridging BPJS Kesehatan; menghitung net payout; meninjau perjanjian an", "Menyusun governance BPJS & pensiun multi-entitas; negosiasi fee & SLA vendor; menyelaraskan strategi pensiun & EVP; memastikan compliance regulasi; menilai adequacy benefit & risiko longevity; advis s"]}, {"c": "Exit Package Administration (Pensiun & PHK)", "d": "Kemampuan mengelola proses pensiun dan pemutusan hubungan kerja (PHK) secara tepat, patuh regulasi, dan berempati.", "cl": "", "L": ["Mengetahui dokumen wajib: SK Pensiun/SK PHK, paklaring, 1721 A1, clearance, BAST, final pay; cut-off payroll; continuity BPJS/medical post-retire.", "Memeriksa keterkaitan exit package dengan Pasal 156, cut-off payroll, benefit continuation; mengecek komponen pesangon/UP/UGH & masa kerja.", "Menyiapkan & memverifikasi exit checklist; menghitung & merekap hak JHT/JP/DPLK & pesangon/UP/UGH; menyiapkan surat SK PHK/pensiun; memastikan payout tepat waktu; mengarsip release & discharge; memoni", "Menstandarkan template & SOP exit; menyusun matrix otorisasi & controls; menangani kasus kompleks (pajak, koreksi masa kerja, retro, PHK massal).", "Menetapkan governance exit multi-entitas; integrasi ke HRIS-DMS-Finance; memastikan audit readiness; menyelaraskan paket dengan policy perusahaan & regulasi; advis strategis manajemen; analisis tren P"]}, {"c": "HR Operations & Services", "d": "Mengelola layanan adminstrasi SDM secara efisien untuk mendukung kebutuhan bisnis", "cl": "", "L": ["Mengetahui layanan administrasi dasar terkait data karyawan.", "Mampu melakukan administrasi personalia & pelayanan dasar HR.", "Mengelola layanan HR administration & service desk secara efisien untuk mendukung bisnis.", "Mengoptimalkan HR operation melalui automasi, analitik, & continuous improvement.", "Menetapkan standar excellence layanan HR global & memimpin transformasi service delivery."]}, {"c": "Offer Letter / Employment Contract", "d": "Dokumen resmi yang berisi kesepakatan kerja antara perusahaan dan karyawan, termasuk posisi, gaji, dan syarat kerja.", "cl": "", "L": ["Menunjukkan dokumen offer letter dan kontrak kerja; mengenali bagian penting kontrak PKWT/PKWTT.", "Menyusun daftar dokumen kontrak per posisi; mencatat tanggal tanda tangan dan persetujuan; memverifikasi dokumen lengkap.", "Menyiapkan, mengirim, dan memastikan kontrak ditandatangani (fisik atau e-signature); menyimpan salinan di folder HRIS yang sesuai.", "Mendesain template kontrak standar per job family; memonitor compliance UU Ketenagakerjaan & PDP; audit periodik dokumen kontrak.", "Menetapkan kebijakan kontrak multi-entitas; menyelaraskan kontrak dengan workforce planning & strategis HR; menjadi advis utama manajemen."]}, {"c": "Preboarding / Onboarding Preparation", "d": "Proses persiapan dan penyambutan karyawan baru sebelum dan setelah masuk kerja, agar adaptasi berjalan lancar.", "cl": "", "L": ["Membaca SOP preboarding/onboarding; mengenal intake form, SLA, RACI, LWD.", "Memverifikasi dependensi lintas fungsi (HRIS, IT, GA, Payroll); membuat checklist provisioning/deprovisioning, KT, clearance.", "Menjalankan preboarding/onboarding: mengi S/HR analytics; review efektivitas probation.", "Menetapkan kebijakan probation & KPI lintas unit; menyelaraskan dengan retention & talent strategy; menyampaikan insight strategis ke manajemen senior."]}, {"c": "Contract Renewal / PKWT Extension", "d": "Proses perpanjangan masa kontrak kerja karyawan berdasarkan evaluasi kinerja dan kebutuhan perusahaan.", "cl": "", "L": ["Menunjukkan dokumen PKWT yang akan habis; mengetahui timeline renewal.", "Membuat reminder renewal & checklist approval; memverifikasi dokumen kontrak.", "Mengeksekusi perpanjangan kontrak PKWT: update HRIS, tanda tangan baru, notifikasi unit terkait.", "Mengotomasi workflow renewal kontrak; memonitor compliance & defect rate; membuat dashboard KPI renewal.", "Merancang kebijakan PKWT multi-unit; mengaitkan perpanjangan kontrak dengan workforce planning & retention strategy; advis strategis manajemen."]}, {"c": "Offboarding Process", "d": "Proses administratif dan komunikasi saat karyawan mengakhiri hubungan kerja, termasuk serah terima aset dan exit interview.", "cl": "", "L": ["Menunjukkan SOP offboarding; mengenal checklist clearance, akses shut-off, knowledge transfer, paklaring.", "Memahami dependensi lintas fungsi: IT/GA/Payroll; menyiapkan dokumen NDAs, final settlement.", "Mengeksekusi offboarding: notifikasi LWD, akses shut-off, knowledge transfer, paklaring, A1/PPh21, final settlement; kolaborasi lintas fungsi.", "Mendesain playbook offboarding standar; memonitor SLA & defect rate; audit compliance; mengelola vendor background check & akses sensitif.", "Menetapkan governance offboarding multi-entitas; integrasi data ke people analytics; memastikan kepatuhan regulasi; memberikan advis strategis manajemen."]}, {"c": "Conflict Resolution - Non-formal & Post-Incident Learning", "d": "Penanganan masalah antar karyawan secara non-formal dan pembelajaran dari insiden untuk mencegah kejadian serupa di masa depan.", "cl": "", "L": ["Mengetahui prosedur dasar penyelesaian konflik interpersonal rin
