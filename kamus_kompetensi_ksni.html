cial listening, koordinasi desain: ukur reach, impressions di dashboard.", "Mengelola A/B testing (thumbnail/copy), asset management, kolaborasi employee advocacy/UGC; optimasi landing page & SEO; jaga SLA response.", "Mendesain annual EB roadmap lintas channel, merancang employee value proposition (EVP) dan talent benchmarking untuk experienced level dan overseas talent (termasuk mengetahui working permit dan rewar"]}, {"c": "Campus / Community Partnership & Lead Attribution", "d": "Kemampuan membangun hubungan strategis dengan institusi pendidikan, komunitas, atau mitra eksternal sebagai sumber pipeline talenta (manager up)", "cl": "", "L": ["Kemampuan membangun hubungan strategis dengan institusi pendidikan, komunitas, atau mitra eksternal sebagai sumber pipeline talenta.", "Menjelaskan benefit/aktivitas (guest lecture, case comp, internship); menyiapkan MoU/LoA dasar.", "Kelola kemitraan: account plan, kalender aktivitas, lead attribution via UTM/QR, CRM tagging; tracking show rate & apply rate dari partner.", "Bangun tiering partner (gold/silver), co-marketing & ambassador program; review ROI per partner; optimasi first/last/multi-touch attribution.", "Rancang ecosystem strategy lintas kampus & komunitas; bangun center of excellence partnership; drive long-term pipeline & reputasi employer di pasar kunci."]}, {"c": "Event / Career Fair Operations", "d": "Kemampuan merencanakan dan melaksanakan kegiatan promosi karier yang memperkuat citra perusahaan dan menghasilkan kandidat potensial dan talent pipeline.", "cl": "", "L": ["Kemampuan merencanakan dan melaksanakan kegiatan promosi karier yang memperkuat citra perusahaan dan menghasilkan kandidat potensial.", "Dapat membuat RACI & checklist logistik; paham lead capture (QR form, consent UU PDP).", "Eksekusi end-to-end: negosiasi vendor, floorplan, training usher, live content; kelola budget vs realisasi; kumpulkan lead ke CRM.", "Optimasi: ops manual, post-mortem, lead scoring, follow-up SLA; integrasi event ke talent pool; pengukuran CPL & kontribusi ke apply.", "Mendesain event portfolio strategy (kampus/komunitas/industry conf); co-create agenda dengan fakultas/komunitas; konsolidasi vendor panel; capai pipeline target untuk role kritikal."]}, {"c": "Data Driven and Optimization from Historical Data", "d": "Kemampuan mengukur dan menganalisis efektivitas aktivitas employer branding terhadap awareness, engagement, dan konversi kandidat.", "cl": "", "L": ["Kemampuan mengukur dan menganalisis efektivitas aktivitas employer branding terhadap awareness, engagement, dan konversi kandidat.", "Mampu menyusun survei brand lift sederhana & membaca GA4/Looker Studio report dasar.", "Mengukur funnel EB ke TA: view ke visit ke join pool ke apply; hitung CR, CPL, CPApply; bikin cohort analysis per kanal/kampanye.", "Bangun measurement framework: definisi north-star, guardrail metrics; model incrementality; kaitkan EB ke time-to-fill & quality-of-hire proxy.", "Memimpin marketing mix modeling/evaluasi atribusi lintas kanal; menstandardisasi OKR EB perusahaan; menginformasikan workforce planning & alokasi budget tahunan. Membuat evaluasi dashboard untuk perse"]}, {"c": "Market / Talent Intelligence", "d": "Kemampuan mengumpulkan dan menganalisis data pasar tenaga kerja (MPN, peta kompetitor, upah, tren keterampilan) untuk memandu strategi rekrutmen", "cl": "", "L": ["Mengambil dan mendokumentasikan data pasar talenta dari sumber terbuka (job board, LinkedIn Insights, salary survey, laporan BPS).", "Menyusun ringkasan supply-demand talenta dan salary band untuk posisi spesifik; menyusun daftar kompetitor perekrut talenta.", "Membuat market map (perusahaan target, lokasi hub, cluster skill) dan heatmap supply-demand; menyampaikan rekomendasi kanal atau wilayah perekrutan berbasis data.", "Mengintegrasikan hasil market intelligence ke workforce plan dan strategi channel; menampilkan tren hiring lewat dashboard (Power BI, Tableau, Looker).", "Memberikan strategic insight untuk entry strategy, lokasi hub, kompensasi kompetitif, serta memberi advis pada kebijakan build-buy-borrow-bot lintas region."]}, {"c": "Channel Strategy & Budgeting", "d": "Kemampuan merancang penggunaan kanal akuisisi talenta beserta alokasi anggaran dan target ROI per kanal agar hiring lebih efisien dan terukur.", "cl": "", "L": ["Mencatat kanal rekrutmen aktif (job board, referral, kampus, komunitas) dan volume traffic pelamar.", "Menyusun posting plan dan alokasi budget sederhana per kanal berdasarkan tipe role dan historical data.", "Menjalankan kampanye multi-kanal dari perencanaan sampai monitoring; menghitung ROI per channel (apply ke hire), cost-per-hire, dan time-to-fill.", "Melakukan A/B testing pada iklan lowongan, mengatur real-time budget reallocation, dan mengelola referral program dengan mekanisme anti-fraud.", "Mendesain strategi kanal tahunan, melakukan negosiasi vendor/job board partnership, serta memprediksi channel yield dan budget melalui forecasting model."]}, {"c": "Head Hunting", "d": "Kemampuan menggunakan operator pencarian secara presisi di job site, mesin pencari, dan platform profesional untuk menemukan, menyaring, dan memetakan kandidat yang tepat secara proaktif.", "cl": "", "L": ["Menyusun query dasar dengan operator Boolean (AND, OR, NOT) di LinkedIn atau Google.", "Menulis dan menjalankan Boolean serta X-Ray search (site:, intitle:, filetype:) untuk menemukan kandidat sesuai skill target.", "Membuat query library per jabatan; mendokumentasikan hasil pencarian di ATS; melacak konversi search ke screen ke interview.", "Menggunakan automation tools (saved search, alerts) untuk pencarian berulang; melakukan calibration hasil dengan user; memantau rasio hasil valid.", "Mendesain dan menstandarkan sourcing framework organisasi; menggabungkan market mapping + talent signals analytics; melatih tim sourcing dan mengaudit kualitas pencarian."]}, {"c": "Talent Pooling & Nurturing", "d": "Kemampuan membangun dan memelihara eksternal talent pool berkualitas & menjaga komunikasi dengan kandidat", "cl": "", "L": ["Menambahkan profil kandidat ke database/CRM dengan tag relevan (role, lokasi, status pipeline).", "Mengelompokkan kandidat ke dalam pool segmentation (skill, senioritas, lokasi) dan menggunakan personalized outreach templates sesuai UU PDP.", "Menetapkan nurture cadence (email/InMail), SLA follow-up, dan menjaga opt-in consent validity; mencatat interaksi dalam ATS.", "Menggunakan lead scoring model (match, engagement, recency); menjalankan kampanye reaktivasi silver medalist; memantau konversi pool ke hire.", "Mendesain talent community strategy (alumni, ambassador, freelancer); mengintegrasikan marketing automation platform (HubSpot, Phenom, Beamery) untuk pipeline readiness."]}, {"c": "Inclusive & Accessible Hiring", "d": "Kemampuan merancang proses rekrutmen yang adil, aksesibel, dan bebas sehingga peluang setara bagi semua kandidat terjaga.", "cl": "", "L": ["Mengidentifikasi bahasa bias (gender, usia, disabilitas) dalam JD/iklan kerja dan memberi catatan koreksi.", "Menulis ulang JD menggunakan inclusive language checklist dan menambahkan elemen aksesibilitas (alt-text, form ramah screen reader).", "Menerapkan structured interview rubric (STAR/anchor level) untuk mengurangi bias; mendokumentasikan accommodations request di ATS.", "Melakukan audit bias funnel (sourcing, screening, interview) berdasarkan data ATS; melatih interviewer tentang bias mitigation; menetapkan double-review policy untuk konsistensi.", "Menetapkan kebijakan & governance inklusi perekrutan perusahaan; menyusun DEI metrics dashboard dan external audit report; bermitra dengan ERG/komunitas disabilitas & diversity hiring network."]}, {"c": "Assessment & Selection", "d": "Menilai kandidat secara objektif melalui tes, interview, tools assessment, dan validasi data agar sesuai kebutuhan peran.", "cl": "", "L": ["Memahami proses dasar seleksi dan jenis tes/interview yang umum digunakan.", "Mampu melakukan screening CV & administrasi seleksi s ngsi dan estetika desain", "Mengidentifikasi pola dan tren desain User Experience untuk mengembangkan strategi UX jangka panjang yang dapat mendukung tujuan bisnis dan memenuhi kebutuhan pengguna di masa depan"]}]}, {"fn": "Global Procurement", "grp": "Non-Manufacture", "comps": [{"c": "Purchasing Cost & Value Analysis", "d": "", "cl": "", "L": ["Basic Knowledge : -Cost of components service -Nabati standard product price and quality", "Understand: -Cost of ownership -Cost of ownership evaluation -Various supplier", "Define: -Total cost of ownership elements -Market fluctuations", "Able to: -Monitor price trends -Cost structure analysis -Recommendations based on trends", "Develop: -All cost drivers -Sound decision -Total cost analysis"]}, {"c": "Purchasing Administration & Tools", "d": "", "cl": "", "L": ["Basic Knowledge : -Purchasing information and system -Database and excel spreadsheet", "Understand : -Purchasing tools -Information system", "Define : -Performing drill- through analysis -Information system applications", "Able to : -Creates customized queries -propose queries", "Develop : -Improvement of existing tools and method -New tools and methods"]}, {"c": "Strategic sourcing", "d": "", "cl": "", "L": ["Basic Knowledge : -Identify supplies and material -Ensure compliance -The use of pre qualification criteria", "Understand : -Source information of supplier database -The use and choice of pre-qualified suppliers, criteria, or processes -Purchase portfolio", "Define : -Present and new projects -Sourcing strategies -Sourcing processes -Supply market research and stakeholders", "Able to : -Anticipate need evolution -Analyse risk management -Manage sourcing strategy -Maintain business relation", "Develop: -Adjust strategies fast moving markets and commodity -Recommend substitute products -Sourcing decision -Market profiles"]}, {"c": "Procurement strategy", "d": "", "cl": "", "L": ["Basic Knowledge : -Factors that affects procurement strategies", "Understand : -Procurement and its function in the broader public sector -Procurement strategies -Development of procurement strategies", "Able to : -Develop procurement system and resources -Understand external policies and impact", "Define and develop : -Procurement system -Leverage the function of procurement -External policies and factors that impact on procurement strategies", "Able to : - Elevates profile of procurement from transactional purchasing to an essential strategic function"]}, {"c": "Purchasing Contracts and Legal", "d": "", "cl": "", "L": ["Basic Knowledge : -Awareness of risk -Purchase transaction", "Understand : - Basic concepts purchasing issues", "Define : -Commercial codes and legal framework", "Able to : -Tactical purchasing specifications -International commercial odes -Leadership role", "Develop : -Concepts of contract -Complex proposals and alternatives"]}, {"c": "Procurement Management", "d": "", "cl": "", "L": ["Basic Knowledge : -Procurement principles, theory and practices -Procurement Stages -Principle of inventory management and stock control", "Understand : -Record supplies usage data in the stock control system -How to review approved suppliers -Policies and procedures for raising a purchase order request", "Able to : -Conduct inventory checks -Identify potential approved supplier for the required goods -Receive goods and goods conformed to technical specification", "Define and develop : -Review the procurement process -Develop technical specifications of items to be purchased -Perform negotiation with suppliers", "Analyse : -Supplier value, pricing and performance reviews -Supplier qualification, selection and approval processes -Company procurement policies and procedures and implement best practices"]}, {"c": "Supplier Performance", "d": "", "cl": "", "L": ["Basic Knowledge : -Key performance indicator for supplier performance -Gather feedback and data to review supplier performance", "Understand : -Identify and document non-compliance issues related to supplier performance -Government legislations, policies and guidelines in relation to supplier management", "Able to : -Assess factors and results to review existing supplier performance -Determine availability and suitability of alternate suppliers", "Define and develop : -Develop and manage cooperative relationships with suppliers -Review suppliers for quality, profitability, services and other relevant performance indicators", "Analyse : -Formulate metrics to evaluate the performance of supplier services -New sources of raw material alternatives -Trends and predictions of markets and consumer trends"]}, {"c": "Purchasing Negotiations", "d": "", "cl": "", "L": ["Basic knowledge : -Suppliers offering -Different negotiation techniques & strategies", "Understand : -Simple request for quote -Internal process and cost model dealing", "Able to: -Negotiation strategies -Gather Supplier information -Negotiation process", "Able to : -Evaluates requirement of specification suppliers cost model -Manages interpersonal or cultural issues", "Define and develop -Negotiate complex contract -Serves subject matters"]}, {"c": "People Development", "d": "", "cl": "", "L": ["Make daily plans of his job/work", "Workload analysis", "1.Competency gap analysis 2.Individual development plan", "Define and set standard of people competency", "1.Create and recommend ideal organization structure 2.Benchmarking people specification"]}]}, {"fn": "GSI", "grp": "Non-Manufacture", "comps": [{"c": "Concept & Opportunity Exploration", "d": "Kemampuan mengidentifikasi, mengeksplorasi, dan memformulasikan peluang inovasi produk melalui pemahaman tren konsumen, dinamika pasar, dan white space strategis sebagai dasar pengembangan ide dan konsep baru.", "cl": "", "L": ["Mengetahui dan mampu menjelaskan konsep dasar tren konsumen, dinamika pasar, serta pengertian white space, namun masih bergantung pada referensi dan arahan dalam membaca insight.", "Memahami pola utama tren dan insight pasar serta mampu menafsirkan relevansinya terhadap kategori produk tertentu dengan bimbingan.", "Secara mandiri mengeksplorasi peluang inovasi, menyusun white space yang terstruktur, dan menarik insight strategis yang dapat digunakan langsung sebagai input pengembangan ide.", "Mengintegrasikan berbagai sumber insight lintas kategori dan pasar menjadi kerangka opportunity mapping yang konsisten dan dapat direplikasi di berbagai proyek.", "Menetapkan metodologi dan standar eksplorasi peluang inovasi yang menjadi rujukan perusahaan dalam menentukan fokus dan arah portofolio inovasi jangka menengah-panjang."]}, {"c": "Idea Compilation & Screening", "d": "Kemampuan mengompilasi, menyaring, dan memprioritaskan ide inovasi secara sistematis melalui pendekatan stage-gate dan kriteria evaluasi yang terstruktur.", "cl": "", "L": ["Mengetahui alur dasar pengumpulan dan penyaringan ide serta memahami tujuan umum dari proses stage-gate.", "Memahami kriteria screening ide dan mampu menerapkannya pada contoh kasus dengan arahan.", "Mampu secara mandiri mengompilasi ide dari berbagai sumber, melakukan screening berbasis kriteria, serta menyusun rekomendasi prioritas ide yang argumentatif.", "Menyempurnakan dan mengintegrasikan kerangka screening ide agar konsisten lintas proyek dan selaras dengan arah strategis perusahaan.", "Menetapkan standar stage-gate dan sistem prioritisasi ide yang digunakan sebagai acuan pengelolaan pipeline inovasi perusahaan."]}, {"c": "Product Concept Development", "d": "Kemampuan menerjemahkan ide terpilih menjadi konsep produk yang terstruktur, relevan dengan pasar, dan siap dievaluasi secara strategis dan bisnis.", "cl": "", "L": ["Mengetahui elemen dasar konsep produk dan format dokumentasi yang digunakan.", "Memahami hubungan antara peluang pasar, value proposition, dan konsep produk serta mampu menyusun konsep sederhana dengan arahan.", "Mampu mengembangkan konsep produk yang komprehensif, koheren, dan relevan dengan target konsumen serta positioning brand.", "Mengintegrasikan perspektif konsumen, brand, dan kelayakan bisnis ke dalam kerangka pengembangan konsep lintas kategori.", "Menetapkan standar dan pendekatan pengembangan konsep produk yang menjadi referensi utama dalam evaluasi dan pengambilan keputusan inovasi."]}, {"c": "Brand Strategy & Architecture Development", "d": "Kemampuan merumuskan strategi dan arsitektur brand untuk mendukung konsep produk dan arah portofolio perusahaan secara konsisten.", "cl": "", "L": ["Mengetahui konsep dasar strategi dan arsitektur brand serta istilah yang digunakan.", "Memahami prinsip brand architecture dan logika portofolio brand serta mampu membaca struktur brand yang ada.", "Mampu menyusun rekomendasi strategi dan arsitektur brand untuk konsep atau kategori tertentu secara argumentatif.", "Mengintegrasikan strategi dan arsitektur brand lintas kategori untuk memastikan konsistensi terhadap arah portofolio.", "Menetapkan prinsip, standar, dan guardrail strategi serta arsitektur brand perusahaan."]}, {"c": "Competitor Communication Analysis", "d": "Kemampuan menganalisis, menginterpretasikan, dan mengevaluasi strategi komunikasi kompetitor secara holistik-mencakup pesan, visual, tone, channel, dan konsistensi brand-untuk mengidentifikasi pola, diferensiasi, white space, serta implikas", "cl": "", "L": ["Mengenali elemen dasar komunikasi kompetitor seperti logo, visual utama, pesan inti, dan channel yang digunakan, serta mampu mendokumentasikan temuan secara deskriptif.", "Menganalisis pola komunikasi kompetitor lintas materi dan channel, memahami perbedaan pesan antar brand, serta menghubungkan pesan kompetitor dengan target konsumen dan konteks kategori.", "Secara mandiri mengevaluasi efektivitas komunikasi kompetitor, mengidentifikasi keunikan, kelemahan, dan white space pesan, serta menerjemahkannya menjadi insight yang relevan untuk pengembangan konse", "Mengintegrasikan analisis komunikasi kompetitor dengan strategi brand, positioning, dan consumer insight untuk membentuk rekomendasi arah komunikasi lintas produk atau kategori.", "Menetapkan standar, metodologi, dan kerangka analisis komunikasi kompetitor sebagai rujukan strategis perusahaan, serta menggunakannya untuk mengarahkan diferensiasi brand dan transformasi komunikasi"]}, {"c": "Brand Identity System Development", "d": "Kemampuan mengembangkan sistem identitas brand yang konsisten sebagai panduan desain dan komunikasi brand.", "cl": "", "L": ["Mengetahui elemen dasar identitas brand dan fungsinya.", "Memahami keterkaitan antara identitas brand dan ekspresi visual serta verbalnya.", "Mampu mengembangkan sistem identitas brand yang aplikatif untuk produk atau kategori tertentu.", "Menyempurnakan dan mengintegrasikan sistem identitas lintas brand atau kategori untuk menjaga konsistensi.", "Menetapkan standar dan prinsip sistem identitas brand perusahaan."]}, {"c": "Design Brief & IP Readiness", "d": "Kemampuan menerjemahkan strategi dan identitas brand menjadi design brief yang jelas", "cl": "", "L": ["Mengetahui elemen dasar design brief dan alur umum proses IP.", "Memahami kebutuhan legal/IP dan mampu menyusun design brief dengan arahan.", "Mampu menyusun design brief yang jelas, komprehensif, dan mendukung proses IP registration.", "Mengintegrasikan design brief dengan strategi brand serta standar legal lintas proyek.", "Menetapkan standar design brief dan IP readiness sebagai acuan perusahaan."]}, {"c": "Brand Visual Design Execution", "d": "Kemampuan menerjemahkan strategi dan identitas brand ke dalam desain visual yang konsisten dan berkualitas.", "cl": "", "L": ["Mengetahui prinsip dasar desain visual dan elemen brand.", "Memahami panduan visual brand dan mampu menerapkannya dalam desain dengan arahan.", "Mampu mengeksekusi desain visual brand yang konsisten, relevan, dan sesuai brief.", "Mengintegrasikan desain visual lintas produk atau kategori untuk menjaga konsistensi brand.", "Menetapkan standar kualitas dan konsistensi desain visual perusahaan."]}, {"c": "Packaging Design Development", "d": "Kemampuan mengembangkan desain kemasan yang fungsional, menarik, dan selaras dengan strategi brand serta regulasi.", "cl": "", "L": ["Mengetahui elemen dasar desain kemasan dan fungsinya.", "Memahami hubungan antara fungsi, visual, dan regulasi dalam desain kemasan.", "Mampu mengembangkan desain kemasan yang siap produksi dan sesuai brief.", "Mengintegrasikan desain kemasan lintas produk dengan konsistensi brand.", "Menjadi rujukan dalam pengembangan standar desain kemasan perusahaan."]}, {"c": "Pre-Press & Print Production Readiness", "d": "Kemampuan memastikan seluruh aset desain siap diproduksi secara teknis dan akurat melalui pengelolaan file, spesifikasi cetak, proofing, dan koordinasi dengan vendor untuk menjamin kualitas visual, konsistensi warna, serta efisiensi produks", "cl": "", "L": ["Memahami konsep dasar pre-press, format file cetak, dan alur produksi, serta mampu menyiapkan file desain sesuai panduan dasar dengan supervisi.", "Menyiapkan file cetak dengan spesifikasi yang tepat, melakukan pengecekan teknis dasar, dan berkoordinasi dengan vendor atau internal team untuk perbaikan minor.", "Secara mandiri mengelola proses pre-press end-to-end, mengidentifikasi potensi risiko cetak, memastikan akurasi warna dan material, serta menyetujui proof sesuai standar.", "Mengintegrasikan pre-press dengan strategi desain, packaging, dan supply chain untuk memastikan efisiensi, konsistensi kualitas lintas produk atau kategori.", "Menetapkan standar, guideline, dan governance pre-press perusahaan, mengelola kompleksitas vendor dan teknologi cetak, serta memastikan kesiapan produksi sebagai bagian dari strategi brand dan operasi"]}, {"c": "Strategic & Ecosystem Planning", "d": "Kemampuan mengidentifikasi tren jangka panjang, perubahan industri, dan sinyal pasar untuk merancang arah strategis dan blueprint ekosistem bisnis berkelanjutan.", "cl": "", "L": ["Mengidentifikasi tren industri, perubahan konsumen, dan sinyal pasar relevan serta memahami potensi dampaknya terhadap bisnis.", "Menganalisis tren dan perubahan ekosistem untuk menjelaskan implikasi strategis terhadap model bisnis dan area pertumbuhan.", "Menerjemahkan foresight menjadi rekomendasi arah ekosistem, peluang kolaborasi, dan tema eksplorasi strategis.", "Merancang blueprint ekosistem jangka menengah-panjang dengan mengintegrasikan foresight, strategi bisnis, dan prioritas investasi.", "Menentukan arah strategis ekosistem perusahaan melalui foresight, memengaruhi keputusan transformasi dan positioning bisnis jangka panjang."]}, {"c": "Consumer Behavior Analysis", "d": "Kemampuan memahami dan menganalisis pola perilaku dan proses pengambilan keputusan konsumen berdasarkan data riset", "cl": "", "L": ["Memahami konsep dasar perilaku konsumen dan mengenali faktor-faktor yang memengaruhi perilaku konsumen", "Mampu mengolah data perilaku konsumen dari hasil riset untuk menemukan pola dasar perilaku konsumen", "Mampu melakukan analisis dengan mengelompokkan konsumen berdasarkan karakteristik dan motivasi", "Mampu menghubungkan perilaku konsumen dengan tren pasar dan strategi komunikasi perusahaan", "Mampu menentukan strategi perusahaan dalam memahami perilaku konsumen serta menerapkan budaya consumer-centric strategy > Create Recommendation"]}, {"c": "Trend Analysis & Insight", "d": "Kemampuan mengidentifikasi, menganalisis, dan menginterpretasikan tren konsumen, pasar, budaya, teknologi, dan industri, serta menerjemahkannya menjadi insight yang relevan dan dapat diimplementasikan untuk pengembangan brand, produk, desai", "cl": "", "L": ["Mengenali tren yang sedang berkembang dari berbagai sumber dan mampu menjelaskan tren tersebut secara deskriptif tanpa analisis mendalam.", "Menganalisis relevansi tren terhadap kategori atau fungsi kerja, serta menghubungkannya dengan kebutuhan konsumen dan konteks pasar.", "Mensintesis berbagai tren menjadi insight yang bermakna, mengidentifikasi peluang dan risiko, serta menerjemahkannya ke dalam ide atau rekomendasi yang aplikatif.", "Mengintegrasikan analisis tren dengan strategi brand, inovasi, dan roadmap pengembangan lintas fungsi atau kategori.", "Menetapkan kerangka kerja, prioritas, dan arah pemanfaatan tren sebagai bagian dari strategic foresight perusahaan, serta mengarahkan transformasi jangka panjang berbasis tren."]}]}, {"fn": "Internal Audit & Risk Management", "grp": "Non-Manufacture", "comps": [{"c": "Internal Auditing Standard & Ethics", "d": "Ability to understand and apply professional standards (e.g., IIA Standards) and a formal code of ethics, ensuring integrity, objectivity, confidentiality, and competency in all audit and risk activities", "cl": "Internal Auditing", "L": ["Has general knowledge of Internal Audit Standards and Code of Ethics. Understands that internal audit must conform to GIAS", "Able to apply standards and code of ethics in daily work (confidentiality, independence, objectivity) without any major non-conformance to internal manual or GIAS.", "Able to guide peers to apply audit standards and code of ethics in audit planning, fielwork, and reporting. Only minor non-conformance occurs for assigned audit engagement.", "Able to designs/updates audit methodology, charter, and procedures to align with GIAS", "Acts as a role model of integrity. Able to shapes organisational ethics initiatives and challenges unethical behaviour at senior levels / board forums"]}, {"c": "Audit Methodology", "d": "Capability to design and execute a systematic audit approach: risk assessment, planning, fieldwork, testing, documentation, reporting, and follow-up, using consistent tools, procedures, and working paper standards", "cl": "Internal Auditing", "L": ["Understands engagement phases (planning, fieldwork, reporting, follow-up) and that risk-based work programs and ratings are used.", "Able to follow audit work program step-by-step on assurance engagement using prescribed tools with supervision.", "Able to independently tailor work programs, supervise junior auditor, and ensure sufficient evidence and documentation to support conclusions on various", "Able to design or refine methodology (templates, risk assessment model, rating scales, agile elements) and trains the team", "Able to shape overall audit delivery model (e.g., agile, continuous assurance); aligns methodology with strategy, risk appetite, regulators, and technology roadmap."]}, {"c": "QAIP", "d": "Skill in designing, implementing, and monitoring a structured program to continuously assess and improve the quality, efficiency, and conformance of audit and risk activities to professional standards and internal policies", "cl": "Internal Auditing", "L": ["Aware that a QAIP exists and that work must follow defined procedures, templates, and review steps.", "Able to demonstrate on going monitoring of internal audit activity's conformance with standards, and code of ethics", "Able to perform periodic self-assessment, follow prescribed testing script with supervision", "Able to plan quality periodic self-assessment, define quality standard, tailor testing script, and monitor remediation of occurring issues across the team", "Able to design whole QAIP aligned with standards, manage esternal assessments, and adjust strategy, structure, or methodology"]}, {"c": "Business Acumen & Operation", "d": "Understanding of the organization’s industry, business model, value chain, financial drivers, and strategic priorities to identify what really matters for risk, controls, and audit focus", "cl": "Cross-functional", "L": ["Understands organizational structure, basic industry terms, and certain key business processes (finance, accounting, HR, supply chain management, and commercial) and core objectives. Recognizes operat", "Understands detail of several business processes. Able to apply business knowledge in audit planning and link risk assessments to operational objectives", "Able to identifies emerging risks and their potential impact on strategic objectives. Align assessment result with business strategy", "Able to advise management on business risks and integrate industry trends and strategic insights into recommendations on controls", "Able to act as a trusted advisor to shape enterprise risk strategy and anticipates future trends with business performance and innovation"]}, {"c": "Enterprise Risk Management", "d": "Competence in identifying, assessing, prioritizing, and monitoring risks across the organization; understanding risk appetite, controls, mitigation strategies, and how risk information supports decision-making", "cl": "Risk Management", "L": ["Understands basic risk concepts and ERM artefacts (risk registers, heatmaps, appetite).", "Able to perform ERM process steps (identify, analyse, and response), align with ISO 31000 principles.", "Able to review and challenge ERM processes as part of assessment supervision. Facilitate risk workshops", "Able to develop risk scenario for strategic planning and advise leadership on risk appetite and tolerance", "Able to shape ERM framework, influence risk culture and board-level risk governance decisions"]}, {"c": "Legal & Compliance", "d": "Knowledge of relevant laws, regulations, internal policies, and regulatory expectations, and the ability to assess compliance, identify breaches, and recommend corrective actions", "cl": "Risk Management", "L": ["Knows main laws, regulations, and internal policies relevant to assigned audits or risk assessments", "Able to conduct risk assessment or compliance controls test with prescribed guideline", "Able to supervise or lead audits and risk assessmets focused on regulatory and policy compliance", "Able to develop compliance risk scenarios for strategic planning and invole in handling complex legal disputes", "Able to design enterprise compliance strategy and strengthen compliance culture globally"]}, {"c": "Fraud Risk Management", "d": "Ability to identify fraud risk scenarios, design and evaluate anti-fraud controls, recognize red flags, and support investigations, including coordination with legal, HR, and other stakeholders", "cl": "Risk Management", "L": ["Understands fraud concepts (fraud triangle, common schemes) and basic anti-fraud controls", "Able to apply professional scepticism, executes basic fraud red-flag procedures, and escalates suspicions", "Able to design targeted fraud risk assessments, anti-fraud testing script, and handle investigation process", "Able to lead complex fraud investigations, coordinating with legal, HR, security, and external parties", "Able to shape anti-fraud strategy, hotline governance, and metrices. Advice board on fraud incidents and trends"]}, {"c": "Business Continuity Management", "d": "Understanding of continuity and recovery principles, including business impact analysis, continuity planning, disaster recovery, and testing to ensure critical operations can continue or recover after disruption", "cl": "Risk Management", "L": ["Understands basic concepts of business continuity, disaster recovery, and crisis management.", "Able to review certain continuity and crisis controls using standard work programs.", "Able to lead and supervise continuity and crisis management review, evaluate recovery capabilities, and design applicable continuity plan in specific areas", "Able to perform and supervise holistic resilience reviews covering crisis, continuity, IT recovery, and supply chain resilience", "Able to influence enterprise resilience strategy and governance, advise executives and board on preparedness for major disruptions."]}, {"c": "Information Technology, Cyber Security, and Data Analytics", "d": "Ability to understand key IT processes and controls, basic cyber security risks and safeguards, and to use data analytics tools and techniques to test controls, detect anomalies, and generate risk insights", "cl": "Cross-functional", "L": ["Understands basic operation of main IT ERP and able to use basic tools to sort, filter, and perform simple calculations", "Have understanding of ITGC and cyber security concepts including relevant policies. Able to integrates analytics into assessment process and use relevant visualisation, aligned to objectives", "Able to perform ITGC and cyber security assessment using predifined procedures and tools. Able to design data-enabled assessment approach (e.g. continuous monitoring dashboard) and train others", "Able to supervise integrated assessments covering IT operation, strategy, and governance, design mitigation for emerging cyber risks, and sponsor tools and use advanced analytics to provide strategic", "Recognised as subject-matter expert on digital transformation and strategic partner on cyber rist mitigation."]}]}, {"fn": "Logistic", "grp": "Non-Manufacture", "comps": [{"c": "Continuous Improvement", "d": "Kemampuan beradaptasi terhadap perubahan/hal-hal baru dan mengembangkan ide/inovasi baru untuk meningkatkan mutu produk, kualitas layanan dan efektvitias serta efisiensi proses/metode kerja dari waktu ke waktu.", "cl": "Logistic", "L": ["Mengidentifikasi ide yang berhubungan dengan program/proses kerja pribadi sebagai dasar dalam membuat program/proses kerja baru", "Menerapkan best practice dari tempat lain untuk mengatasi masalah sehari-hari (adaptasi)", "Melakukan improvement dengan modifikasi internal dari hasil benchmarking yang telah dilakukan sehingga didapatkan solusi baru yang bernilai tambah", "Menciptakan inovasi dengan membuat solusi-solusi baru yang kreatif dan orisinil untuk mengatasi permasalahan yang muncul dalam pekerjaannya.", "Mendorong budaya improvement untuk memperbaharui program/proses kerja baru/mutakhir agar selaras dengan strategi perusahaan (faktor internal dan eksternal) dalam rangka meningkatkan mutu produk, kuali"]}, {"c": "Logistic Direct Operations", "d": "Kemampuan mengelola dan mengontrol alur pergerakan produk dari pabrik hingga sampai ke tangan konsumen, hal ini mencakup Warehouse, Transportasi, Distribusi, dan Pengelolaan Inventori", "cl": "Logistic", "L": ["Memahami konsep dasar alur operasional logistik, serta proses yang terjadi dalam operasional logistik (Warehouse, Adaptation, Transportation)", "Mampu melakukan metode asesmen kebutuhan dasar terkait efisiensi dan perkiraan budget, serta indikator keuangan lainnya (volume, penjualan, biaya operasional)", "Membuat laporan performa dan mengawasi hasil bisnis, serta mengembangkan dan menjaga realisasi rencana yang telah dibuat", "Membuat antisipasi dalam pengaruh bisnis dengan menggunakan manajemen risiko serta membandingkan praktik logistic operasional", "Membuat rencana dan perkiraan kebutuhan operasional logistik untuk menerapkan best practices"]}, {"c": "Inventory Management", "d": "Kemampuan merencanakan, mengendalikan, mengawasi, dan mengelola persediaan bahan baku, barang dalam proses, dan produk jadi agar proses produksi dan distribusi tetap lancar tanpa adanya hambatan", "cl": "Logistic", "L": ["Memahami konsep dasar manajemen inventory, mampu melakukan pencatatan sederhana terkait penerimaan dan pengeluaran barang", "Mampu melakukan monitoring stok sederhana sesuai arahan dan membantu analisis dasar untuk menentukan kebutuhan stok", "Mampu menentukan jadwal pengisian ulang barang berdasarkan ketersediaan stok real-time dengan memperhatikan lead time pemasok", "Menganalisis penyebab utama overstock atau stockout dalam inventory", "Mengembangkan strategi mitigasi yang efektif untuk mengurangi kemungkinan terjadinya risiko inventory"]}, {"c": "International Trade", "d": "Pemahaman aturan, regulasi, dan prosedur yang berkaitan dengan pengiriman internasional dan kemampuan menangani seluruh aspek yang dibutuhkan untuk melakukan pengiriman produk ke pasar internasional", "cl": "Logistic", "L": ["Memahami dasar-dasar dan prosedur terkait pengiriman internasional", "Mampu mempersiapkan dokumen yang dibutuhkan untuk proses pengiriman ke pasar internasional", "Mampu mengelola pengiriman produk ke pasar internasional secara efisien", "Mengawasi regulasi dan kebijakan yang berlaku di pasar internasional untuk mengantisipasi perubahan peraturan", "Merancang strategi inovatif terkait pengiriman produk dalam pasar internasional agar dapat mendukung tujuan bisnis perusahaan di masa depan"]}, {"c": "Project Management", "d": "Kemampuan untuk menganalisa, menyusun rencana dan melaksanakan sebuah project dengan efektif, termasuk di dalamnya merencanakan project, menjalankan project, mengawasi project, dan menyelesaikannya sesuai dengan target yang telah ditentukan", "cl": "Logistic", "L": ["Melaksanakan project sesuai dengan timeline yang diberikan", "Membuat inisiasi project dan memaksimalkan semua sumber daya yang ada untuk memastikan project berjalan dengan efektif", "Memimpin sebuah project. Membuat perencanaan strategis untuk implementasi project berdasarkan data pendukung, strategi/ action plan ketika terjadi hal diluar perencanaan dan membagi tahapan project ke", "Memonitor dan melakukan controlling terhadap komponen project (Cost, Timeline, Resources, Project Quality) dan eksekusi project", "Memberikan inovasi project baru yang dapat meningkatkan efektivitas bisnis sesuai dengan strategi bisnis perusahaan dan memahami bagaimana project yang dilakukan memiliki efek pada business objectives"]}, {"c": "Transportation Management", "d": "Kemampuan mengelola dan mengoptimalkan kegiatan transportasi dalam distribusi produk dari DC hingga lokasi distributor dengan efektif dan efisien", "cl": "Logistic", "L": ["Memahami konsep transportasi dan distribusi, serta mampu membantu proses administrasi sesuai instruksi", "Mampu mengelola laporan terkait pengiriman produk dan memastikan pelaksanaan jadwal yang telah dibuat", "Merencanakan jadwal pengiriman beserta armada kendaraan yang digunakan", "Menganalisis efektivitas data pengiriman untuk mengembangkan strategi yang lebih efisien dalam proses distribusi produk", "Mengembangkan kebijakan internal terkait penggunaan transportasi untuk distribusi produk yang dapat mendukung tujuan bisnis perusahaan di masa depan"]}, {"c": "Logistic Planning", "d": "Kemampuan merencanakan, menjadwalkan, dan mengoptimalkan alur distribusi barang antar DC dan dari DC ke distributor", "cl": "Logistic", "L": ["Mengetahui dan memahami jadwal pengiriman barang", "Mampu mengumpulkan data kebutuhan pengiriman dan menyusun jadwal logistik sesuai instruksi yang diberikan", "Mampu menyusun rencana logistik secara mandiri serta menyesuaikan dengan kapasitas gudang, prioritas produksi, dan lead time", "Mampu menganalisis gap pada alur logistik yang ada serta membuat rekomendasi untuk optimalisasi perencanaan logistik", "Mampu mengembangkan sistem perencanaan logistik yang terintegrasi dengan seluruh fungsi dan strategi supply chain perusahaan"]}, {"c": "Cost Management", "d": "Kemampuan merancang, mengimplementasikan, dan menganalisis penggunaan biaya dalam perusahaan agar penggunaannya lebih efektif dan efisien", "cl": "Logistic", "L": ["Memahami konsep dan pentingnya Cost Management yang efektif", "Menerapkan sistem Cost Management dalam pekerjaan sesuai arahan", "Mengelola cost secara mandiri, serta memastikan cost sesuai dengan rencana finansial perusahaan", "Mengoptimalisasikan cost-structure, serta menginisiasi Cost Management di luar rencana finansial", "Membuat strategi finansial perusahaan serta mengembangkan strategi Cost Management yang lebih komprehensif dan efektif"]}]}, {"fn": "Manufacture Excellence", "grp": "Non-Manufacture", "comps": [{"c": "Continuous Improvement", "d": "Kemampuan menerapkan dan mengelola sistem perbaikan berkelanjutan berbasis Lean dan Six Sigma secara terstruktur.", "cl": "", "L": ["Mengidentifikasi pemborosan dan peluang perbaikan pada proses kerja.", "Menerapkan tools CI dasar untuk menyelesaikan masalah operasional berulang.", "Memimpin proyek CI end-to-end dengan pendekatan data dan metodologi yang tepat.", "Mengintegrasikan CI lintas proses/plant sebagai sistem peningkatan berkelanjutan.", "Menetapkan CI sebagai sistem teknis baku dan referensi improvement perusahaan."]}, {"c": "Manufacturing Performance Analytics & Optimization", "d": "Kemampuan mengukur, menganalisis, dan mengoptimalkan kinerja manufaktur melalui pemanfaatan data operasional.", "cl": "", "L": ["Mengidentifikasi metrik utama kinerja manufaktur dan hubungan dasar antar data.", "Mengelola dan menyajikan data performa secara konsisten serta melakukan analisis dasar deviasi.", "Melakukan analisis menyeluruh untuk mengaitkan losses dengan penyebab teknis utama.", "Mengintegrasikan analisis performa lintas line/plant untuk optimasi sistemik.", "Menetapkan standar analitik dan metodologi optimasi performa manufaktur perusahaan."]}, {"c": "Cost Structure / COGM", "d": "Kemampuan menghitung, menganalisis, dan mengendalikan biaya produksi untuk meningkatkan efisiensi dan profitabilitas.", "cl": "", "L": ["Mengidentifikasi komponen utama biaya produksi dan COGM.", "Melakukan monitoring dan kontrol dasar terhadap komponen COGM.", "Menganalisis variansi dan tren biaya serta keterkaitannya dengan proses produksi.", "Mengevaluasi dampak keputusan teknis terhadap COGM dan gross margin.", "Menetapkan pendekatan pengelolaan cost manufaktur dan rekomendasi strategis P&L."]}, {"c": "Digital Manufacturing & Automation", "d": "Kemampuan menerapkan otomasi dan digitalisasi sistem manufaktur untuk meningkatkan efisiensi, keandalan, dan visibilitas proses.", "cl": "", "L": ["Memahami prinsip dasar otomasi dan digitalisasi mesin produksi.", "Mengoperasikan sistem otomasi dan mendukung troubleshooting teknis sederhana.", "Merancang dan mengimplementasikan solusi otomasi/digitalisasi pada proses tertentu.", "Mengintegrasikan sistem digital manufacturing lintas proses atau plant.", "Menetapkan arah dan standar teknis digital manufacturing & automation perusahaan."]}, {"c": "Process Standardization, Documentation & Governance", "d": "Kemampuan menyusun, menstandarkan, dan mengelola proses manufaktur untuk menjamin konsistensi dan kepatuhan operasional.", "cl": "", "L": ["Memahami struktur, fungsi, dan peran SOP/WI dalam operasi.", "Menyusun dan memperbarui SOP sesuai template dan kebutuhan proses.", "Mengembangkan standar proses lengkap dengan control point dan standard time.", "Melakukan harmonisasi dan governance standar lintas departemen/plant.", "Menetapkan blueprint dan sistem governance standardisasi perusahaan."]}, {"c": "Root Cause Analysis & Technical Problem Solving", "d": "Kemampuan menginvestigasi masalah secara sistematis dan menetapkan solusi teknis yang berkelanjutan.", "cl": "", "L": ["Memahami tools dasar RCA dan konsep tindakan korektif.", "Melakukan RCA untuk masalah sederhana dan mendokumentasikan temuan.", "Menerapkan metode RCA lanjutan untuk masalah kompleks menengah.", "Memimpin investigasi lintas fungsi dan memverifikasi efektivitas solusi.", "Menetapkan framework RCA perusahaan dan menjadi rujukan teknis organisasi."]}, {"c": "System Compliance (Genba, 5R, GMP, Safety, Halal)", "d": "Kemampuan memastikan kepatuhan standar mutu dan regulasi dalam aktivitas manufaktur dan engineering.", "cl": "", "L": ["Memahami prinsip dasar standar mutu dan regulasi manufaktur.", "Menerapkan persyaratan quality dalam aktivitas operasional sehari-hari.", "Mengintegrasikan compliance dalam project, change control, dan risk analysis.", "Mengelola audit, CAPA, dan quality risk lintas area.", "Menetapkan strategi dan governance compliance sebagai otoritas teknis."]}, {"c": "Technical Program & Project Management", "d": "Kemampuan merencanakan, mengeksekusi, dan mengendalikan program/project teknis manufaktur secara end-to-end.", "cl": "", "L": ["Menjalankan tugas project sesuai rencana dan arahan.", "Menginisiasi dan mengelola aktivitas project dengan kontrol dasar.", "Memimpin project teknis dengan perencanaan, mitigasi risiko, dan koordinasi lintas fungsi.", "Mengendalikan cost, timeline, resource, dan kualitas project secara menyeluruh.", "Menginisiasi dan mengarahkan program strategis berdampak tinggi terhadap bisnis."]}]}, {"fn": "Markom & Ecosystem", "grp": "Non-Manufacture", "comps": [{"c": "Digital Growth Enablement", "d": "Kemampuan untuk menetapkan standar & tata kelola pertumbuhan digital lintas kanal-landing readiness, tagging/UTM (Urchin Tracking Module), SEO (Search Engine Optimization) & CRO (Conversion Rate Optimization), serta disiplin eksperimen-untu", "cl": "", "L": ["Menyebut tujuan & istilah inti (CVR, AOV, ROMI, funnel GA4-Google Analytics 4, GTM-Google Tag Manager, Core Web Vitals pada tingkat konsep, A/B vs holdout). Memahami peran tim (Product/IT/Content/Agen", "Menjelaskan bagaimana SEO/CRO/tagging mempengaruhi KPI komersial; membaca dashboard funnel sederhana; mengenali risiko umum (tagging tidak lengkap, landing belum siap, latency berdampak ke CVR); memah", "Menetapkan KPI tree & guardrails untuk CVR/AOV; menyetujui experiment brief dan kriteria sukses; memastikan ada tagging plan (dikerjakan tim/agency) & UTM governance; melakukan landing readiness revie", "Mendesain measurement framework lintas kanal (cadence review, template dashboard, definisi metrik); menetapkan event taxonomy & standard UTM organisasi; memprioritaskan experiment roadmap lintas brand", "Mengarahkan strategi pertumbuhan digital perusahaan; menstandarkan praktik DXG di banyak brand/negara & partner/marketplace (JBP/MDF bila relevan); mensponsori investasi MarTech strategis; menumbuhkan"]}, {"c": "Commercial Trading & Merchandising", "d": "Kemampuan untuk mengelola katalog, harga, promo, dan stok lintas D2C/marketplace untuk memaksimalkan GMV, CVR, AOV dan margin.", "cl": "", "L": ["Menjelaskan istilah GMV, CVR, AOV, take-rate, assortment/bundling, promo mechanics, feed/merchant center.", "Membaca P&L sederhana; mengidentifikasi gap stok/price; membuat promo calendar dasar; memahami aturan konten/listing marketplace.", "Mengelola listing & kualitas konten; membuat bundle & searchandising; menjalankan tes harga/promo; mengoperasikan rating/review ops & feed produk.", "Mengoptimalkan lintas kanal (D2C vs marketplace); memodelkan price elasticity; menyusun JBP/MDF dengan partner; menyeimbangkan pertumbuhan vs GP/take-rate.", "Membangun playbook trading & automasi (rule-based dynamic pricing, promo eligibility); mengintegrasikan OMS/WMS; memimpin forecast & governance komersial lintas channel."]}, {"c": "Integrated Growth Marketing & Channel Strategy", "d": "Kemampuan untuk merancang strategi channel dan campaign 360° (ATL/BTL, Digital, Retail Media, Affiliate) selaras target komersial.", "cl": "", "L": ["Menjelaskan ATL/BTL, GRP/reach/frequency, peran Retail Media & Affiliate, fungsi UTM.", "Menyusun rencana channel, memetakan peran channel terhadap funnel, memahami syarat kreatif per channel.", "Menjalankan kampanye 360°: set UTM, koordinasi influencer/affiliate, aktivasi retail media; melakukan incrementality test dasar & post-mortem.", "Mengalokasikan budget berbasis insight MMM/MTA; mengoptimalkan retail media (audience, bid, placement); menyatukan hasil ke learning agenda lintas brand.", "Menetapkan strategi portofolio & guideline media organisasi; menegosiasikan JBP/MDF strategis; menskalakan framework orkestrasi lintas brand/negara."]}, {"c": "Customer Experience & Service Recovery", "d": "Kemampuan untuk menutup loop keluhan dengan cepat, memulihkan pengalaman, dan menggerakkan perbaikan journey berbasis VOC sehingga NPS/CSAT naik.", "cl": "", "L": ["Menjelaskan metrik NPS/CSAT, konsep VOC, alur CRM/ticketing, SLA, RCA.", "Memetakan alur eskalasi; membaca tren VOC; memahami penyebab umum FCR (First Contact Resolution) rendah.", "Mengoperasikan ticketing/CRM, menjalankan service-recovery playbook, memonitor SLA/FCR; menyusun FAQ/help-center berbasis pertanyaan aktual.", "Menganalisis VOC ke backlog prioritas; mendesain self-service & deflection; menurunkan waktu respons & meningkatkan FCR lintas kanal.", "Mendesain strategi CX omnichannel end-to-end; menerapkan prediksi churn/insiden; mengorkestrasi perubahan proses lintas fungsi (ops, payment, warehouse)."]}, {"c": "Measurement, Analytics & ROMI", "d": "Kemampuan untuk mengaitkan aktivitas marketing/commerce ke outcome (GMV, ROMI, GP) dan mendorong keputusan berbasis data.", "cl": "", "L": ["Menjelaskan GA4/GTM, jenis attribution, cohort/funnel, KPI & guardrails, uplift/holdout.", "Membangun dashboard sederhana (Looker/Power BI/Sheets); menafsirkan perbedaan attribution; membaca funnel & cohort untuk insight aksi.", "Menyusun tagging plan; membuat dashboard operasional; menjalankan holdout/uplift test; menghitung ROMI & kontribusi ke GMV/GP.", "Menetapkan arsitektur KPI & guardrails; melakukan MMM ringan & query SQL untuk analisis; menyatukan temuan ke keputusan alokasi budget.", "Mendesain measurement framework organisasi; governance data end-to-end; menggabungkan MMM + MTA untuk keputusan eksekutif; memimpin budaya keputusan berbasis bukti."]}, {"c": "Commercial Operations & Governance", "d": "Kemampuan untuk menjaga kontrol biaya & kualitas eksekusi melalui budgeting, kontrak, SLA, dan standardisasi proses.", "cl": "", "L": ["Menjelaskan siklus PRF/PO/GR, ERP, RFP/RFQ, SOW, SLA, dasar compliance & SOP.", "Mengikuti SOP; melakukan rekonsiliasi invoice; memahami struktur biaya & baseline vendor.", "Mengelola budget phasing & variance; membuat vendor scorecard; negosiasi kontrak sederhana; memastikan bukti kerja sesuai SOW/SLA.", "Mendesain SOW & rate card; menegakkan audit & compliance; mengelola risiko & perubahan; mengoptimalkan biaya lintas vendor.", "Membangun model governance & automasi proses (procure-to-pay, performance review); memimpin manajemen risiko strategis & continuous improvement lintas organisasi."]}]}, {"fn": "OEM Operational", "grp": "Non-Manufacture", "comps": [{"c": "OEM Partnership Management", "d": "Kemampuan membangun, mengelola, dan mengoptimalkan hubungan kerja sama dengan mitra OEM untuk memastikan kualitas, biaya, dan waktu pengiriman sesuai target.", "cl": "", "L": ["Mengetahui konsep dasar OEM, SLA, dan KPI.", "Memahami prinsip negosiasi kontrak dan service-level agreement (SLA).", "Melaksanakan negosiasi dasar dan komunikasi operasional dengan OEM sesuai SOP.", "Mengelola hubungan strategis dan evaluasi kinerja OEM secara berkala dengan KPI terukur.", "Merancang strategi kolaborasi jangka panjang, mengoptimalkan portofolio OEM, dan memimpin inisiatif co-development."]}, {"c": "Supplier Quality & Compliance Oversight", "d": "Kemampuan mengawasi dan memastikan seluruh mitra OEM memenuhi standar kualitas dan kepatuhan (GMP, HACCP, BRC/IFS), termasuk tindakan korektif dan pencegahan.", "cl": "", "L": ["Mengetahui standar mutu dasar (GMP, HACCP, BRC/IFS).", "Memahami mekanisme audit dan corrective action (CAPA).", "Melaksanakan audit internal atau mendukung audit eksternal OEM site.", "Mengkoordinasi penutupan temuan audit dan memastikan seluruh CAPA selesai tepat waktu.", "Menjadi otoritas sistem mutu OEM global dan menetapkan kebijakan compliance lintas site."]}, {"c": "Supply Chain Synchronization", "d": "Kemampuan menyelaraskan jadwal produksi, pasokan bahan baku, dan distribusi barang jadi antara OEM dan perusahaan untuk menjamin kelancaran rantai pasok.", "cl": "", "L": ["Mengetahui alur dasar inbound-outbound material dan finished goods.", "Memahami prinsip JIT (Just In Time) dan demand forecasting.", "Menyusun jadwal OEM berdasarkan kebutuhan produksi dan demand forecast.", "Mengelola alokasi kapasitas OEM, mitigasi risiko keterlambatan, dan optimasi logistik.", "Mendesain sistem supply chain OEM end-to-end yang terintegrasi dan adaptif terhadap perubahan pasar."]}, {"c": "Cost & Financial Management", "d": "Kemampuan mengendalikan biaya operasi OEM melalui analisis COGS, variansi, dan inisiatif efisiensi untuk mencapai target cost-saving.", "cl": "", "L": ["Mengetahui komponen COGS dan faktor cost driver.", "Memahami metode perhitungan variansi biaya dan rebate mechanism.", "Mengumpulkan dan menganalisis data biaya OEM untuk pelaporan periodik.", "Mengembangkan strategi efisiensi biaya dan melakukan cost-realignment.", "Menjadi pakar analisis keuangan OEM, memimpin strategi global cost optimization dan investasi jangka panjang."]}]}, {"fn": "Overseas", "grp": "Non-Manufacture", "comps": [{"c": "Sales & Go-to-Market Operations", "d": "Kemampuan menjalankan proses, data, dan ritme eksekusi agar strategi penjualan menjadi target & aksi yang konsisten lintas negara/area/channel.", "cl": "", "L": ["Mengenali istilah dasar (WSR, KPI, target, TOP, price list, CRM). Mengisi template dan tracker sesuai arahan.", "Mampu membaca WSR & KPI, menjelaskan gap ke target, menjaga kebersihan data dasar, dan mengeskalasi isu yang berisiko.", "Memimpin WSR mingguan, menyusun rencana penutupan gap, mengeksekusi aturan harga/discount, menutup action tepat waktu, dan menyelaraskan kebutuhan dengan Finance/Supply.", "Mendiagnosis akar masalah penjualan, memperbaiki cakupan & kualitas pipeline, menstandarkan ritme review & SLA, serta menaikkan pencapaian secara berkelanjutan.", "Mendesain model operasi GTM lintas negara (alur kerja, kebijakan harga, integrasi sistem & dashboard), menetapkan KPI baku, mengalokasikan investasi, dan membina kapabilitas tim."]}, {"c": "S&OP & Supply Chain", "d": "Kemampuan menyelaraskan demand-supply melalui proses S&OP agar tingkat layanan tercapai dengan persediaan sehat & biaya terkendali.", "cl": "", "L": ["Mengetahui istilah dasar (forecast, MAPE/WAPE, DOI/DOH, safety stock, OTIF). Mengikuti kalender & cut-off.", "Mampu membaca forecast dan stok, menjelaskan isu layanan, serta memberi sinyal risiko (kekurangan/kelebihan).", "Menyusun forecast area, mengusulkan pemesanan/replenishment, menjalankan daftar pengecualian, melakukan RCA sederhana pada stockout/overstock, dan menyiapkan materi S&OP bulanan.", "Meningkatkan akurasi forecast, mengoptimalkan alokasi antar area/channel, menurunkan kelebihan & usang, menyiapkan readiness peluncuran produk, dan menaikkan OTIF.", "Mendesain proses S&OP/IBP regional, menerapkan sistem peringatan dini, menautkan rencana volume ke rencana keuangan, menetapkan kebijakan persediaan dinamis, dan membimbing tim lintas fungsi."]}, {"c": "AR Performance & Collections", "d": "Kemampuan mengelola piutang untuk memaksimalkan konversi kas dan menekan keterlambatan bayar sesuai syarat pembayaran & kebijakan kredit.", "cl": "", "L": ["Mengetahui konsep AR, aging, DSO, syarat bayar. Mengikuti skrip dasar penagihan dan pencatatan.", "Mampu membaca aging & tren DSO, memetakan prioritas sederhana, mencatat dispute dan mengeskalasi tepat waktu.", "Mengelola portofolio penagihan: menetapkan janji bayar, melakukan rekonsiliasi dasar, menjaga register keterlambatan & rencana pemulihan, menutup dispute sesuai SLA.", "Menurunkan DSO & keterlambatan >90 hari melalui analisis penyebab, menyesuaikan limit dan proses, serta menyelaraskan tindakan dengan Sales & Finance.", "Mendesain kebijakan kredit & penagihan regional, menerapkan prioritisasi berbasis data, menetapkan aturan provisi & penghapusan, menstandarkan proses lintas negara, dan menautkan AR ke proyeksi arus k"]}, {"c": "P&L Analysis", "d": "Kemampuan membangun, membaca, dan menerjemahkan P&L menjadi keputusan: harga, bauran, prioritas pasar/channel, serta kontrol biaya & investasi.", "cl": "", "L": ["Mengetahui istilah dasar (P&L, COGS, SG&A, margin, PVM). Mengikuti format laporan.", "Mampu membaca P&L dan menjelaskan selisih rencana vs realisasi, memahami dampak harga/volume/kurs, serta menilai ROI sederhana.", "Menyusun P&L bulanan, membuat analisis PVM & catatan varians, membuat margin waterfall & skenario sederhana, serta mengusulkan tindakan perbaikan.", "Mengaitkan P&L dengan tuas operasional (harga, bauran, promosi, AR/S&OP), merekomendasikan realokasi biaya/investasi, dan menyelaraskan akun untuk konsolidasi.", "Mendesain arsitektur pelaporan regional & guardrail margin, menjalankan perencanaan skenario jangka panjang, mengelola portofolio profit, mengotomasi pelaporan, dan membina kemampuan anali global yang kompetitif, mengarahkan kebijakan perusahaan, dan menjaga employer value proposition."]}]}, {"fn": "PPIC", "grp": "Non-Manufacture", "comps": [{"c": "Cost Structure / COGM", "d": "Kemampuan untuk menghitung, menganalisis, dan mengendalikan biaya produksi (bahan baku, tenaga kerja langsung, dan overhead)", "cl": "PPIC", "L": ["Mengetahui komponen dari COGM", "Memahami kontribusi RMPM dalam COGM", "Membuat RMPM cost effective dalam COGM dan kalkulasi COGM dari produk", "Menganalisa Cost Trend Effect dalam COGM dan melakukan kalkulasi analiisa COGM yang memengeruhi GP1", "Membuat standard RMPM Cost Trend Effect pada top management level"]}, {"c": "Production Planning", "d": "Kemampuan merencanakan, mengelola, dan mengoordinasikan material dan jadwal produksi agar produk dapat dihasilkan sesuai spesifikasi dan permintaan pasar", "cl": "PPIC", "L": ["Memahami proses end-to-end proses produksi pada perusahaan, serta mampu membuat Rencana Produksi Harian sederhana berdasarkan pengecekan ketersediaan RMPM", "Membuat perencanaan Material Planning Schedule untuk proses produksi dengan minimum pergantian", "Membuat rencana produksi dengan menyeimbangkan ketersediaan stock dan permintaan oleh Plant/DC", "Menganalisis pencapaian ketersediaan terhadap performa perusahaan dan penjualan untuk melihat tren", "Membuat rencana strategis dalam Production Planning berdasarkan data pencapaian produksi dan tren sesuai prediksi kebutuhan perusahaan di masa depan"]}, {"c": "Inventory Management", "d": "Kemampuan merencanakan, mengendalikan, mengawasi, dan mengelola persediaan bahan baku, barang dalam proses, dan produk jadi agar proses produksi tetap lancar tanpa adanya kekurangan", "cl": "PPIC", "L": ["Memahami konsep dasar manajemen inventory, mampu melakukan pencatatan sederhana terkait penerimaan dan pengeluaran barang", "Mampu melakukan monitoring stok sederhana sesuai arahan dan membantu analisis dasar untuk menentukan kebutuhan stok", "Mampu menentukan jadwal pengisian ulang barang berdasarkan ketersediaan stok real-time dengan memperhatikan lead time pemasok", "Menganalisis penyebab utama overstock atau stockout dalam inventory", "Mengembangkan strategi mitigasi yang efektif untuk mengurangi kemungkinan terjadinya risiko inventory"]}, {"c": "Supply Planning", "d": "Kemampuan merencanakan dan mengelola kebutuhan ketersediaan barang / material agar sesuai dengan permintaan pasar", "cl": "PPIC", "L": ["Memahami konsep dasar Demand & Supply Planning, proses distribusi produk jadi, dan Sales & Operation Planning (S&OP)", "Mampu menghitung kapasitas produksi perusahaan serta membuat Material Requirement Planning (MRP)", "Menganalisis penyebab ketidakseimbangan persediaan dan kebutuhan produksi", "Mengembangkan proses S&OP agar dapat menyeimbangkan kembali persediaan barang & material yang ada dan diminta", "Menganalisis tren permintaan pasar dan ketersediaan barang / material serta membuat rencana strategis sesuai prediksi kebutuhan perusahaan di masa depan"]}, {"c": "Material Management", "d": "Kemampuan mengelola proses pengadaan, penyimpanan, dan distribusi bahan baku yang diperlukan agar proses produksi tetap lancar", "cl": "PPIC", "L": ["Mengenali jenis material yang digunakan dalam proses produksi, serta memahami rencana pengelolaan material yang berkaitan dengan jadwal, kualitas, dan Manpower", "Menyusun rencana kebutuhan material berdasarkan jadwal produksi", "Menerapkan prosedur identifikasi material agar sesuai standar, serta menganalisis permasalahan yang sering muncul", "Merancang jadwal perpindahan material, rencana budget, dan strategi mempertahankan kualitas material yang efektif", "Mengevaluasi prosedur yang digunakan saat ini dan memberikan strategi inovatif untuk meningkatkan efisiensi material management"]}, {"c": "Forecasting", "d": "Kemampuan melakukan prediksi kebutuhan terkait kapasitas produksi dan permintaan pasar agar dapat mengelola sumber daya perusahaan secara efisien dan memasatikan kelancaran proses produks an project sesuai dengan timeline yang diberikan", "Membuat inisiasi project dan memaksimalkan semua sumber daya yang ada untuk memastikan project berjalan dengan efektif", "Memimpin sebuah project. Membuat perencanaan strategis untuk implementasi project berdasarkan data pendukung, strategi/ action plan ketika terjadi hal diluar perencanaan dan membagi tahapan project ke", "Memonitor dan melakukan controlling terhadap komponen project (Cost, Timeline, Resources, Project Quality) dan eksekusi project", "Memberikan inovasi project baru yang dapat meningkatkan efektivitas bisnis sesuai dengan strategi bisnis perusahaan dan memahami bagaimana project yang dilakukan memiliki efek pada business objectives"]}, {"c": "Documentation Management", "d": "Kemampuan untuk merancang, mengimplementasikan, dan mengevaluasi sistem manajemen dokumen yang efektif dan efisien bagi perusahaan.", "cl": "Project Engineering", "L": ["Mampu mengikuti arahan atasan dalam mengelola pekerjaan administratif", "Mampu mengelola dokumen menggunakan sistem manajemen dokumen", "Mampu merancang SOP terkait pengelolaan dokumen dan integrasi sistem tersebut dengan sistem lain yang berkaitan", "Menganalisis efektivitas prosedur pengelolaan dokumen yang ada, serta potensi dan risiko yang mungkin muncul kedepannya", "Merancang inovasi sistem pengelolaan dokumen yang lebih efektif untuk diterapkan oleh perusahaan"]}]}, {"fn": "Property (KIEBER)", "grp": "Non-Manufacture", "comps": [{"c": "Building Automation System", "d": "Sistem otomatisasi yang digunakan dalam manajemen bangunan atau fasilitas", "cl": "Property", "L": ["Pemahaman tentang prinsip-prinsip dasar sistem otomasi gedung", "Menggunakan software sistem otomasi gedung", "Merancang, menginstalasi, dan mengkonfigurasi sistem otomasi gedung (membangun sistem otomasi gedung dari awal)", "Memecahkan masalah yang kompleks, melakukan pemeliharaan rutin dan perbaikan pada sistem otomasi gedung. Serta memecahkan masalah yang kompleks, melakukan pemelihara  ptl:{id:'Kamus Kompetensi KSNI',en:'KSNI Competency Dictionary'}, sub:{id:'Kerangka Leveling Competency',en:'Leveling Competency Framework'},

 gMfg:{id:'Manufacture',en:'Manufacture'}, gNon:{id:'Non-Manufacture',en:'Non-Manufacture'},
 comps:{id:'kompetensi',en:'competencies'}, def:{id:'Definisi',en:'Definition'},
 note:{id:'Daftar ini ditarik langsung dari workbook Leveling Competency KSNI per fungsi. Setiap kompetensi memiliki definisi dan deskriptor Level 1 sampai 5. Klik kompetensi untuk membuka level. Konten dipertahankan dalam bahasa aslinya.',en:'This list is taken directly from the KSNI Leveling Competency workbooks per function. Each competency has a definition and Level 1 to 5 descriptors. Click a competency to expand levels. Content is kept in its original language.'},
 noFn:{id:'Pilih fungsi di samping untuk melihat kompetensinya.',en:'Select a function on the left to see its competencies.'},
 noHit:{id:'Tidak ada kompetensi yang cocok dengan pencarian.',en:'No competency matches your search.'},
 lvAll:{id:'Lihat semua level',en:'Expand all levels'}
};
var state={fn:0, q:''};
function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function buildSide(){
 var n=document.getElementById('kside'); if(!n) return;
 var html='';
 ['Manufacture','Non-Manufacture'].forEach(function(g){
  var items=MASTER.map(function(m,i){return {m:m,i:i};}).filter(function(o){return o.m.grp===g;});
  if(!items.length) return;
  html+='<div class="kgrouphd">'+(g==='Manufacture'?tr('gMfg'):tr('gNon'))+'</div>';
  html+=items.map(function(o){
   return '<button class="fnbtn'+(o.i===state.fn?' active':'')+'" data-fn="'+o.i+'">'+escapeHtml(o.m.fn)+'<span class="ct">'+o.m.comps.length+'</span></button>';
  }).join('');
 });
 n.innerHTML=html;
 n.querySelectorAll('[data-fn]').forEach(function(b){ b.addEventListener('click',function(){ state.fn=parseInt(b.getAttribute('data-fn'),10); state.q=''; var qi=document.getElementById('q'); if(qi) qi.value=''; render(); }); });
}
function render(){
 var v=document.getElementById('view'); var m=MASTER[state.fn];
 if(!m){ v.innerHTML='<div class="empty">'+tr('noFn')+'</div>'; return; }
 var q=state.q.toLowerCase();
 var list=m.comps.filter(function(c){ if(!q) return true; return (c.c+' '+c.d+' '+c.cl).toLowerCase().indexOf(q)>=0; });
 var head='<div class="khead"><h1>'+escapeHtml(m.fn)+'</h1><div class="meta"><span class="kpill'+(m.grp==='Manufacture'?' mfg':'')+'">'+(m.grp==='Manufacture'?tr('gMfg'):tr('gNon'))+'</span><span>'+m.comps.length+' '+tr('comps')+'</span></div></div>'+
  '<div class="knote">'+tr('note')+'</div>';
 var body='';
 if(!list.length){ body='<div class="empty">'+tr('noHit')+'</div>'; }
 else { body=list.map(function(c,idx){
   var lv=c.L.map(function(t,i){ if(!t) return ''; return '<div class="lrow"><span class="lk">L'+(i+1)+'</span><span class="lt">'+escapeHtml(t)+'</span></div>'; }).join('');
   var cl=c.cl?('<span class="cl">'+escapeHtml(c.cl)+'</span>'):'';
   return '<div class="ccard" data-card="'+idx+'"><div class="cchead"><div><div class="cn">'+escapeHtml(c.c)+'</div>'+(c.d?'<div class="cd">'+escapeHtml(c.d)+'</div>':'')+'</div>'+cl+'<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M6 9l6 6 6-6"/></svg></div><div class="cclevels">'+(lv||'<div class="lrow"><span class="lt dim">,</span></div>')+'</div></div>';
 }).join(''); }
 v.innerHTML=head+body;
 v.querySelectorAll('[data-card]').forEach(function(card){ card.querySelector('.cchead').addEventListener('click',function(){ card.classList.toggle('open'); }); });
 buildSide();
}
function paint(){
 document.getElementById('ptl').innerHTML=tr('ptl')+'<small>'+tr('sub')+'</small>';
 document.getElementById('q').placeholder=tr('searchPh');
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-lang')===L); });
 render();
}
function setLang(l){ L=l; paint(); }
if(typeof document!=='undefined' && document.querySelector('.kbar')){
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.addEventListener('click',function(){ setLang(b.getAttribute('data-lang')); }); });
 var qi=document.getElementById('q'); if(qi){ qi.addEventListener('input',function(){ state.q=qi.value; render(); }); }
 setLang('id');
}
</script>
</body>
</html>
