<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>One HCMS Learning, Portal Instructor dan Content Author</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#ffffff;--ink:#1F242C;--ink-2:#525a67;--ink-3:#8a93a0;--border:#e4e8ee;--border-strong:#cfd5de;--surface-2:#f7f8fa;--surface-3:#eef1f5;--role:#E1231B;--role-tint:#fdeceb;--role-tint2:#f9dad7;--green:#1f9d57;--green-t:#e7f5ec;--amber:#c47d10;--amber-t:#faeed4;--info:#2563c9;--info-t:#e7effb;--slate:#64748b;--slate-t:#eef1f5;--font-display:"Schibsted Grotesk",system-ui,sans-serif;--font-ui:"Geist",system-ui,sans-serif;--font-num:"Geist Mono","JetBrains Mono",ui-monospace,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--surface-2);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;margin:0}
.dim{color:var(--ink-3)}.muted{color:var(--ink-2)}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}

.topbar{display:flex;align-items:center;gap:16px;padding:11px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);z-index:20}
.topbar::before{content:"";position:absolute;left:0;top:0;right:0;height:3px;background:var(--role)}
.brand{display:flex;align-items:center;gap:10px}.brand img{height:24px}
.brand .ptl{font-family:var(--font-display);font-weight:600;font-size:13.5px;border-left:1px solid var(--border);padding-left:12px;line-height:1.2}
.brand .ptl small{display:block;font-size:10px;color:var(--ink-3);font-weight:400;font-family:var(--font-ui)}
.topbar .spacer{flex:1}
.pswrap{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-3)}
.psel{border:1px solid var(--border);background:var(--surface-2);border-radius:8px;padding:6px 9px;font-family:var(--font-ui);font-size:12.5px;color:var(--ink);cursor:pointer}
.langtog{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.langtog button{border:0;background:#fff;padding:5px 10px;font-size:12px;color:var(--ink-2);cursor:pointer;font-family:var(--font-ui)}
.langtog button.active{background:var(--ink);color:#fff}
.lnk{border:0;background:none;color:var(--role);font-size:12.5px;cursor:pointer;font-family:var(--font-ui)}
.layout{display:flex;min-height:calc(100vh - 49px)}
.side{width:236px;flex:0 0 auto;border-right:1px solid var(--border);background:#fff;padding:14px 10px}
.side .who{padding:6px 10px 12px;border-bottom:1px solid var(--border);margin-bottom:10px}
.side .who .nm{font-family:var(--font-display);font-weight:600;font-size:14px}
.side .who .rl{font-size:11.5px;color:var(--ink-3)}
.navbtn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:none;padding:8px 10px;border-radius:8px;font-family:var(--font-ui);font-size:13px;color:var(--ink-2);font-weight:500;cursor:pointer;transition:.12s}
.navbtn:hover{background:var(--surface-2);color:var(--ink)}
.navbtn.active{background:var(--role-tint);color:var(--role);font-weight:600}
.main{flex:1;min-width:0;overflow-y:auto;padding:20px 26px 60px}
.aibar{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid var(--role-tint2);border-radius:12px;padding:11px 14px;margin-bottom:18px}
.aibar .dot{width:26px;height:26px;border-radius:8px;background:var(--role-tint);color:var(--role);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.aibar .b{font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--role)}
.aibar .tx{font-size:12.5px;color:var(--ink-2)}
.surfhead{display:flex;align-items:flex-end;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.surfhead h2{font-size:20px;letter-spacing:-.01em}
.surfhead p{margin:2px 0 0;font-size:12.5px;color:var(--ink-3)}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--role)}
.kpi.ok::after{background:var(--green)}.kpi.warn::after{background:var(--amber)}.kpi.info::after{background:var(--info)}
.kpi .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)}
.kpi .v{font-family:var(--font-num);font-size:23px;font-weight:600;letter-spacing:-.5px;margin-top:3px}
.kpi .s{font-size:11px;color:var(--ink-3)}
.sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin:22px 0 11px}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{border:0;background:none;padding:9px 14px;font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--role);border-bottom-color:var(--role)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px;margin-bottom:8px}
.cco{background:#fff;border:1px solid var(--border);border-radius:13px;padding:15px;cursor:pointer;transition:.12s}
.cco:hover{border-color:var(--role);box-shadow:0 6px 18px rgba(225,35,27,.06)}
.cco.sel{border-color:var(--role);background:var(--role-tint)}
.cco h4{font-size:14px;margin-bottom:6px}
.cco .mm{font-size:11.5px;color:var(--ink-3);display:flex;gap:10px;flex-wrap:wrap}
.modwrap{background:#fff;border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:8px}
.modwrap .mh{display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--border)}
.modwrap .mh h4{font-size:14px}
.mline{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid var(--surface-3);font-size:13px}
.mline:last-child{border-bottom:0}
.mtype{width:26px;height:26px;border-radius:7px;background:var(--surface-3);color:var(--ink-2);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.mtype.video{background:#fbe9e7;color:#c42b21}.mtype.scorm{background:var(--info-t);color:var(--info)}
.mtype.quiz{background:var(--amber-t);color:var(--amber)}.mtype.doc{background:var(--surface-3);color:var(--ink-2)}.mtype.ilt{background:var(--green-t);color:var(--green)}
.mline .mt{font-weight:600}.mline .ms{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
.pill.ok{background:var(--green-t);color:var(--green)}.pill.warn{background:var(--amber-t);color:var(--amber)}
.pill.info{background:var(--info-t);color:var(--info)}.pill.bad{background:#fbe9e7;color:#c42b21}.pill.mut{background:var(--surface-3);color:var(--ink-3)}
.std{background:#fff;border:1px solid var(--border);border-left:3px solid var(--info);border-radius:12px;padding:15px 16px;margin:8px 0 18px}
.std h4{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.specgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.spec{background:var(--surface-2);border-radius:10px;padding:10px 12px}
.spec .sl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)}
.spec .sv{font-size:13px;font-weight:600;margin-top:3px}
.spec .sv small{display:block;font-weight:400;color:var(--ink-3);font-size:11px}
.upl{border:1.5px dashed var(--border-strong);border-radius:12px;padding:18px;text-align:center;color:var(--ink-3);font-size:12.5px;margin-bottom:16px;background:#fff}
.upl svg{color:var(--ink-3)}
.cpedit{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:11px}
.cpedit .ct{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cpedit .min{font-family:var(--font-num);font-weight:600;background:var(--amber-t);color:var(--amber);border-radius:7px;padding:3px 9px;font-size:12px}
.cpedit .qx{font-size:12.5px;color:var(--ink-2)}
.iltcard{background:#fff;border:1px solid var(--border);border-radius:13px;padding:15px 16px;margin-bottom:11px}
.iltcard .it{font-family:var(--font-display);font-weight:600;font-size:14px;margin-bottom:8px}
.iltgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.iltgrid .cell .cl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);display:flex;gap:5px;align-items:center}
.iltgrid .cell .cv{font-size:12.5px;margin-top:3px;font-weight:600}
.cap{margin-top:10px}
.cap .bar{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden}
.cap .bar i{display:block;height:100%;background:var(--role);border-radius:99px}
.cap .lab{font-size:11px;color:var(--ink-3);margin-top:4px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.btn{border:1px solid var(--border-strong);background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:500;color:var(--ink);cursor:pointer;font-family:var(--font-ui)}
.btn.p{background:var(--role);border-color:var(--role);color:#fff}.btn.sm{padding:5px 10px;font-size:11.5px}
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);padding:10px 13px;border-bottom:1px solid var(--border);font-weight:700}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--surface-3);font-size:12.5px}
.tbl tr:last-child td{border-bottom:0}
.bar2{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden;min-width:90px}
.bar2 i{display:block;height:100%;background:var(--green);border-radius:99px}
.gov{display:flex;gap:9px;align-items:flex-start;background:#fff;border:1px solid var(--border);border-left:3px solid var(--role);border-radius:10px;padding:12px 14px;margin:22px 0 0;font-size:12px;color:var(--ink-2)}
.gov svg{width:15px;height:15px;color:var(--role);flex:0 0 auto;margin-top:1px}

@media(max-width:720px){.side{display:none}.main{padding:16px}}
</style>
</head>

 govPerf:{id:'Performa konten bersifat agregat. Anda melihat individu hanya dalam cohort yang Anda ajar, untuk keperluan penilaian, bukan untuk skor risiko.',en:'Content performance is aggregate. You see individuals only within cohorts you teach, for grading, not for risk scoring.'},
 /* ai */
 aiStudio:{id:'Kursus Lean menunggu tinjauan. Saya bisa buatkan draf ringkasan modul dan kuis bab otomatis.',en:'The Lean course awaits review. I can draft the module summary and chapter quiz automatically.'},
 aiScorm:{id:'Modul AICC lama sebaiknya dimigrasi ke cmi5 agar pelacakan lebih andal di mobile.',en:'The legacy AICC module should migrate to cmi5 for more reliable mobile tracking.'},
 aiAssess:{id:'Kuis tersemat K3 punya 3 titik henti. Saya rekomendasikan satu titik lagi di menit 7 untuk retensi.',en:'The K3 embedded quiz has 3 checkpoints. I recommend one more at minute 7 for retention.'},
 aiIlt:{id:'Workshop Lean hampir penuh, 22 dari 25. Mau saya buka sesi kedua atau tambah kapasitas?',en:'The Lean workshop is nearly full, 22 of 25. Want me to open a second session or add capacity?'},
 aiPerf:{id:'Penuntasan Lean 61 persen, terendah. Titik drop ada di modul simulasi. Saya sarankan pratinjau lebih ringan.',en:'Lean completion is 61 percent, the lowest. The drop is at the simulation module. I suggest a lighter preview.'}
};
var NAV=[['studio','nStudio'],['scorm','nScorm'],['assess','nAssess'],['ilt','nIlt'],['perf','nPerf']];
var ICN={studio:'M4 5h16v14H4zM4 9h16M9 9v10',scorm:'M4 7h16v12H4zM4 7l2-3h6l2 3M9 13l2 2 4-4',assess:'M9 11l2 2 4-4M5 4h14v16l-7-3-7 3z',ilt:'M7 3v4M17 3v4M4 9h16M4 7h16v13H4zM9 13h2M13 13h2M9 16h2',perf:'M4 19V5M4 19h16M8 16V9M12 16v-5M16 16v-8M20 16V7'};
function ic(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" width="17" height="17"><path d="'+p+'"/></svg>';}
function tyIc(t){var m={video:'M8 5v14l11-7z',scorm:'M4 7h16v12H4zM9 13l2 2 4-4',quiz:'M9 11l2 2 4-4M5 4h14v16l-7-3-7 3z',doc:'M7 3h7l4 4v14H7zM14 3v4h4',ilt:'M4 9h16M7 3v4M17 3v4M4 7h16v13H4z'};return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" width="14" height="14"><path d="'+(m[t]||m.doc)+'"/></svg>';}
function govBox(k){return '<div class="gov"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 3l8 4v5c0 4-3.5 7-8 9-4.5-2-8-5-8-9V7z"/></svg><span>'+tr(k)+'</span></div>';}
function ai(k){return '<div class="aibar"><div class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" width="15" height="15"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2 2M16.4 16.4l2 2M18.4 5.6l-2 2M7.6 16.4l-2 2"/></svg></div><div><span class="b">HC AI</span> <span class="tx">'+tr(k)+'</span></div></div>';}
function stPill(s){var m={pub:['pill ok','stPub'],review:['pill info','stReview'],draft:['pill mut','stDraft'],mig:['pill warn','stMig'],ok:['pill ok','valid']};var x=m[s]||m.draft;return '<span class="'+x[0]+'">'+tr(x[1])+'</span>';}

var state={surf:'studio', sel:'c1'};

function renderStudio(){
 var v=document.getElementById('view');
 var cards=COURSES.map(function(c){
  return '<div class="cco'+(state.sel===c.id?' sel':'')+'" data-c="'+c.id+'"><h4>'+nm(c.name)+'</h4><div class="mm"><span>'+c.mods.length+' '+tr('modOf')+'</span>'+stPill(c.st)+'</div></div>';
 }).join('');
 var cur=COURSES.filter(function(c){return c.id===state.sel;})[0]||COURSES[0];
 var tyMap={video:'tyVideo',scorm:'tyScorm',quiz:'tyQuiz',doc:'tyDoc',ilt:'tyIlt'};
 var mods=cur.mods.map(function(m){
  return '<div class="mline"><span class="mtype '+m.ty+'">'+tyIc(m.ty)+'</span><span class="mt">'+nm(m.t)+'</span><span class="dim" style="font-size:11px">'+tr(tyMap[m.ty])+'</span><span class="ms">'+stPill(m.st)+'<button class="btn sm">'+tr('editL')+'</button></span></div>';
 }).join('');
 v.innerHTML=ai('aiStudio')+'<div class="surfhead"><div><h2>'+tr('hStudio')+'</h2><p>'+tr('subStudio')+'</p></div></div>'+
  '<div class="toolbar"><button class="btn p">'+tr('newCourse')+'</button></div>'+
  '<div class="cgrid">'+cards+'</div>'+
  '<div class="sub">'+tr('composeT')+', '+nm(cur.name)+'</div>'+
  '<div class="modwrap"><div class="mh"><h4>'+nm(cur.name)+'</h4>'+stPill(cur.st)+'<span style="margin-left:auto"><button class="btn sm">'+tr('addMod')+'</button></span></div>'+mods+'</div>'+
  govBox('govStudio');
 v.querySelectorAll('[data-c]').forEach(function(b){ b.addEventListener('click',function(){ state.sel=b.getAttribute('data-c'); renderStudio(); }); });
}
function renderScorm(){
 var v=document.getElementById('view');
 var rows=PKG.map(function(p){
  return '<tr><td style="font-weight:600">'+nm(p.n)+'</td><td>'+p.std+'</td><td class="dim">'+nm(p.ver)+'</td><td class="dim">'+p.size+'</td><td>'+stPill(p.st)+'</td></tr>';
 }).join('');
 var specs=[['sFormat','sFormatV','sFormatS'],['sRes','sResV','sResS'],['sFps','sFpsV','sFpsS'],['sBit','sBitV','sBitS'],['sSize','sSizeV','sSizeS'],['sCap','sCapV','sCapS']].map(function(s){
  return '<div class="spec"><div class="sl">'+tr(s[0])+'</div><div class="sv">'+tr(s[1])+'<small>'+tr(s[2])+'</small></div></div>';
 }).join('');
 v.innerHTML=ai('aiScorm')+'<div class="surfhead"><div><h2>'+tr('hScorm')+'</h2><p>'+tr('subScorm')+'</p></div></div>'+
  '<div class="upl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="26" height="26"><path d="M12 16V4M7 9l5-5 5 5M5 20h14"/></svg><div style="margin-top:6px"><b style="color:var(--ink)">'+tr('uplT')+'</b></div><div>'+tr('uplS')+'</div></div>'+
  '<table class="tbl"><thead><tr><th>'+tr('colPkg')+'</th><th>'+tr('colStd')+'</th><th>'+tr('colVer')+'</th><th>'+tr('colSize')+'</th><th>'+tr('colSt')+'</th></tr></thead><tbody>'+rows+'</tbody></table>'+
  '<div class="std"><h4><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" width="15" height="15" style="color:var(--info)"><path d="M8 5v14l11-7z"/></svg>'+tr('vstdT')+'</h4><div class="specgrid">'+specs+'</div></div>';
}
function renderAssess(){
 var v=document.getElementById('view');
 var tyMap={final:'aFinal',cp:'aCp',practice:'aPractice'};
 var rows=ASSESS.map(function(a){
  return '<div class="mline" style="border:1px solid var(--border);border-radius:11px;margin-bottom:9px"><span class="mtype quiz">'+tyIc('quiz')+'</span><span class="mt">'+nm(a.n)+'</span><span class="pill mut">'+tr(tyMap[a.ty])+'</span><span class="ms"><span class="dim" style="font-size:11.5px">'+tr('passL')+' '+a.pass+' . '+a.items+' '+tr('itemsL')+'</span><button class="btn sm">'+tr('editL')+'</button></span></div>';
 }).join('');
 var cps=CPS.map(function(c,i){
  return '<div class="cpedit"><div class="ct"><span class="min">'+c.min+'</span><span class="dim" style="font-size:11px">'+(L==='id'?'titik':'point')+' '+(i+1)+'</span><span style="margin-left:auto"><button class="btn sm">'+tr('editL')+'</button></span></div><div class="qx">'+nm(c.q)+'</div></div>';
 }).join('');
 v.innerHTML=ai('aiAssess')+'<div class="surfhead"><div><h2>'+tr('hAssess')+'</h2><p>'+tr('subAssess')+'</p></div></div>'+
  rows+
  '<div class="sub">'+tr('cpEditT')+'</div><div class="rev" style="display:flex;gap:8px;align-items:flex-start;background:var(--surface-2);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--ink-2);margin-bottom:12px">'+tr('cpEditS')+'</div>'+
  cps+'<button class="btn p sm">'+tr('addCp')+'</button>';
}
function renderIlt(){
 var v=document.getElementById('view');
 var cards=ILT.map(function(s){
  var pct=Math.round(s.reg/s.cap*100);
  var cls=pct>=90?'a':'';
  return '<div class="iltcard"><div class="it">'+nm(s.n)+'</div><div class="iltgrid">'+
   '<div class="cell"><div class="cl">'+tr('lWhen')+'</div><div class="cv">'+s.when+'</div></div>'+
   '<div class="cell"><div class="cl">'+tr('lTrainer')+'</div><div class="cv">'+nm(s.trainer)+'</div></div>'+
   '<div class="cell"><div class="cl">'+tr('lRoom')+'</div><div class="cv">'+nm(s.room)+'</div></div>'+
   '</div><div class="cap"><div class="bar"><i style="width:'+pct+'%;background:'+(pct>=90?'var(--amber)':'var(--role)')+'"></i></div><div class="lab">'+s.reg+' '+tr('regOf')+' '+s.cap+' '+tr('seat')+' ('+pct+'%)</div></div></div>';
 }).join('');
 v.innerHTML=ai('aiIlt')+'<div class="surfhead"><div><h2>'+tr('hIlt')+'</h2><p>'+tr('subIlt')+'</p></div></div>'+
  '<div class="toolbar"><button class="btn p">'+tr('newIlt')+'</button></div>'+cards;
}
function renderPerf(){
 var v=document.getElementById('view');
 var totLearn=PERF.reduce(function(a,b){return a+b.enr;},0);
 var avgComp=Math.round(PERF.reduce(function(a,b){return a+b.comp;},0)/PERF.length);
 var avgRate=(PERF.reduce(function(a,b){return a+parseFloat(b.rate);},0)/PERF.length).toFixed(1);
 var rows=PERF.map(function(p){
  return '<tr><td style="font-weight:600">'+nm(p.n)+'</td><td class="num">'+p.enr+'</td>'+
   '<td><div style="display:flex;align-items:center;gap:8px"><div class="bar2"><i style="width:'+p.comp+'%"></i></div><span class="num" style="font-size:11.5px">'+p.comp+'%</span></div></td>'+
   '<td><span class="num" style="color:var(--amber)">&#9733; '+p.rate+'</span></td><td class="num">'+p.pass+'%</td></tr>';
 }).join('');
 v.innerHTML=ai('aiPerf')+'<div class="surfhead"><div><h2>'+tr('hPerf')+'</h2><p>'+tr('subPerf')+'</p></div></div>'+
  '<div class="kpis">'+
   '<div class="kpi info"><div class="l">'+tr('kCourses')+'</div><div class="v">'+PERF.length+'</div><div class="s">&nbsp;</div></div>'+
   '<div class="kpi"><div class="l">'+tr('kLearners')+'</div><div class="v">'+totLearn+'</div><div class="s">&nbsp;</div></div>'+
   '<div class="kpi '+(avgComp>=80?'ok':'warn')+'"><div class="l">'+tr('kComp')+'</div><div class="v">'+avgComp+'%</div><div class="s">&nbsp;</div></div>'+
   '<div class="kpi ok"><div class="l">'+tr('kRate')+'</div><div class="v">'+avgRate+'</div><div class="s">'+(L==='id'?'dari 5':'of 5')+'</div></div>'+
  '</div>'+
  '<table class="tbl"><thead><tr><th>'+tr('colCourse')+'</th><th>'+tr('colEnr')+'</th><th>'+tr('colComp')+'</th><th>'+tr('colRate')+'</th><th>'+tr('colPass')+'</th></tr></thead><tbody>'+rows+'</tbody></table>'+
  govBox('govPerf');
}
var SURF={studio:renderStudio,scorm:renderScorm,assess:renderAssess,ilt:renderIlt,perf:renderPerf};

function buildNav(){
 var n=document.getElementById('nav'); if(!n) return;
 n.innerHTML=NAV.map(function(x){ return '<button class="navbtn" data-surf="'+x[0]+'">'+ic(ICN[x[0]])+'<span>'+tr(x[1])+'</span></button>'; }).join('');
 n.querySelectorAll('[data-surf]').forEach(function(b){ b.addEventListener('click',function(){ state.surf=b.getAttribute('data-surf'); renderActive(); }); });
}
function renderActive(){
 var fn=SURF[state.surf]; if(fn) fn();
 var n=document.getElementById('nav'); if(n) n.querySelectorAll('[data-surf]').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-surf')===state.surf); });
}
function paintChrome(){
 document.getElementById('ptl').innerHTML=tr('ptl')+'<small>'+tr('ptlSub')+'</small>';
 document.getElementById('btnBack').textContent=tr('back');
 document.getElementById('psLbl').textContent=tr('psLbl');
 document.getElementById('whoNm').textContent=ME.name;
 document.getElementById('whoRl').textContent=nm(ME.role)+' . '+nm(ME.unit);
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-lang')===L); });
 wireSwitch(); buildNav(); renderActive();
}
function setLang(l){ L=l; paintChrome(); }
if(typeof document!=='undefined' && document.querySelector('.topbar')){
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.addEventListener('click',function(){ setLang(b.getAttribute('data-lang')); }); });
 document.getElementById('btnBack').addEventListener('click',function(){ location.href='index.html'; });
 setLang('id');
}
</script>
