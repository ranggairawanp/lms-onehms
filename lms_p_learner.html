<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nabati Learning, Portal Learner</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#ffffff;--ink:#1F242C;--ink-2:#525a67;--ink-3:#8a93a0;--border:#e4e8ee;--border-strong:#cfd5de;--surface-2:#f7f8fa;--surface-3:#eef1f5;--role:#E1231B;--role-tint:#fdeceb;--role-tint2:#f9dad7;--green:#1f9d57;--green-t:#e7f5ec;--amber:#c47d10;--amber-t:#faeed4;--info:#2563c9;--info-t:#e7effb;--slate:#64748b;--slate-t:#eef1f5;--font-display:"Schibsted Grotesk",system-ui,sans-serif;--font-ui:"Geist",system-ui,sans-serif;--font-num:"Geist Mono","JetBrains Mono",ui-monospace,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--surface-2);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:600;margin:0}
.dim{color:var(--ink-3)}.muted{color:var(--ink-2)}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}


/* ===== Coursera-style learner chrome ===== */
body{background:#fff}
.cbar{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--border)}
.cbar::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--role)}
.crow{max-width:1140px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px 24px}
.cbrand{display:flex;align-items:center;gap:10px;flex:0 0 auto}
.cbrand img{height:24px}
.cbrand b{font-family:var(--font-display);font-weight:600;font-size:15px;letter-spacing:-.01em}
.csearch{flex:1;max-width:560px;display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:99px;padding:9px 16px}
.csearch svg{color:var(--ink-3);flex:0 0 auto}
.csearch input{border:0;background:none;outline:none;width:100%;font-family:var(--font-ui);font-size:13.5px;color:var(--ink)}
.cright{display:flex;align-items:center;gap:12px;flex:0 0 auto;margin-left:auto}
.goalpill{font-size:12px;color:var(--ink-2);white-space:nowrap}
.goalpill b{color:var(--role);font-weight:600}
@media(max-width:980px){.goalpill{display:none}}
.langtog{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.langtog button{border:0;background:#fff;padding:5px 9px;font-size:12px;color:var(--ink-2);cursor:pointer;font-family:var(--font-ui)}
.langtog button.active{background:var(--ink);color:#fff}
.psel{border:1px solid var(--border);background:var(--surface-2);border-radius:8px;padding:6px 9px;font-family:var(--font-ui);font-size:12px;color:var(--ink);cursor:pointer;max-width:150px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:13px;flex:0 0 auto}
.subnav{border-top:1px solid var(--border)}
.subwrap{max-width:1140px;margin:0 auto;display:flex;gap:4px;padding:0 24px;overflow-x:auto}
.snav{border:0;background:none;padding:13px 14px;font-family:var(--font-ui);font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.snav:hover{color:var(--ink)}
.snav.active{color:var(--role);border-bottom-color:var(--role)}
.cmain{max-width:1140px;margin:0 auto;padding:26px 24px 70px}
.lnk{border:0;background:none;color:var(--role);font-size:12.5px;cursor:pointer;font-family:var(--font-ui);text-decoration:underline}
/* hero greeting */
.ghero{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:18px}
.ghero h1{font-family:var(--font-display);font-size:30px;letter-spacing:-.02em;font-weight:600}
.ghero .gsub{font-size:14px;color:var(--ink-2);margin-top:5px}
.ghero .gsub b{color:var(--role);font-weight:600}
.ghero .deco{flex:0 0 auto;width:148px;height:96px;border-radius:14px;background:linear-gradient(135deg,var(--role-tint),var(--role-tint2));position:relative;overflow:hidden}
.ghero .deco::after{content:"";position:absolute;right:-20px;bottom:-20px;width:90px;height:90px;border-radius:24px;background:rgba(225,35,27,.16);transform:rotate(18deg)}
.ghero .deco::before{content:"";position:absolute;left:18px;top:20px;width:46px;height:46px;border-radius:50%;border:6px solid rgba(225,35,27,.28)}
@media(max-width:760px){.ghero .deco{display:none}.ghero h1{font-size:24px}}
.aibar{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--role-tint2);border-radius:99px;padding:7px 14px;margin-bottom:18px}
.aibar .dot{width:20px;height:20px;border-radius:50%;background:var(--role-tint);color:var(--role);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.aibar .b{font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--role)}
.aibar .tx{font-size:12.5px;color:var(--ink-2)}
.accom{display:flex;align-items:center;gap:11px;background:var(--info-t);border:1px solid #d3e1f7;border-radius:12px;padding:12px 16px;margin-bottom:22px;font-size:13px;color:var(--ink-2)}
.accom svg{color:var(--info);flex:0 0 auto}
/* up next big card */
.upnext{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:10px;background:#fff}
.upnext .ul{padding:24px}
.upnext .uk{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)}
.upnext h3{font-family:var(--font-display);font-size:21px;letter-spacing:-.01em;margin:8px 0 6px;line-height:1.25}
.upnext .um{font-size:12.5px;color:var(--ink-3);margin-bottom:14px}
.upnext .ubar{height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden;margin-bottom:16px;max-width:340px}
.upnext .ubar i{display:block;height:100%;background:var(--green);border-radius:99px}
.upnext .umedia{background:radial-gradient(circle at 60% 40%,#2a3446,#0e1116);display:flex;align-items:center;justify-content:center;min-height:210px;position:relative}
.upnext .umedia .pl{width:58px;height:58px;border-radius:50%;background:rgba(225,35,27,.94);display:flex;align-items:center;justify-content:center;border:0;cursor:pointer}
.upnext .umedia .tg{position:absolute;left:16px;top:14px;color:#fff;font-size:11px;font-weight:600;background:rgba(0,0,0,.3);padding:3px 9px;border-radius:6px}
@media(max-width:760px){.upnext{grid-template-columns:1fr}.upnext .umedia{min-height:150px}}
.mltabs{display:flex;gap:18px;border-bottom:1px solid var(--border);margin:6px 0 16px}
.mltab{border:0;background:none;padding:9px 0;font-family:var(--font-ui);font-size:13.5px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.mltab.active{color:var(--ink);border-bottom-color:var(--ink)}
/* layout split with right rail */
.hsplit{display:grid;grid-template-columns:1fr 312px;gap:24px;align-items:start}
@media(max-width:920px){.hsplit{grid-template-columns:1fr}}
.sectit{font-family:var(--font-display);font-size:18px;font-weight:600;letter-spacing:-.01em;margin:26px 0 13px}
.sectit.first{margin-top:8px}
.seclink{font-size:12.5px}
/* carousels */
.crowx{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory}
.crowx::-webkit-scrollbar{height:8px}.crowx::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px}
.coursec{flex:0 0 248px;scroll-snap-align:start;background:#fff;border:1px solid var(--border);border-radius:13px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:.12s}
.coursec:hover{box-shadow:0 8px 22px rgba(20,24,30,.08);border-color:var(--border-strong)}
.coursec .thumb{height:132px;display:flex;align-items:flex-end;padding:10px 12px;position:relative}
.coursec .thumb .bdg{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;background:rgba(255,255,255,.95);color:var(--ink);border-radius:6px;padding:2px 8px}
.coursec .thumb .bdg.ai{left:10px;right:auto;color:var(--role)}
.coursec .thumb .ttl{color:#fff;font-family:var(--font-display);font-weight:600;font-size:15px;text-shadow:0 1px 6px rgba(0,0,0,.4);line-height:1.2}
.th0{background:linear-gradient(135deg,#5b2b27,#b5403a)}.th1{background:linear-gradient(135deg,#1f3a5f,#2f6fb0)}
.th2{background:linear-gradient(135deg,#1f5f3a,#2fae6f)}.th3{background:linear-gradient(135deg,#5a4a1f,#c49b2f)}
.th4{background:linear-gradient(135deg,#3a2f5f,#6f5ab0)}.th5{background:linear-gradient(135deg,#2a2a32,#55606e)}
.coursec .cb{padding:12px 13px;display:flex;flex-direction:column;gap:6px;flex:1}
.coursec .prov{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-3)}
.coursec .prov .lg{width:18px;height:18px;border-radius:5px;background:var(--role-tint);color:var(--role);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex:0 0 auto}
.coursec h4{font-size:14px;line-height:1.3;font-weight:600}
.coursec .cm{font-size:11.5px;color:var(--ink-3);display:flex;gap:9px;flex-wrap:wrap;margin-top:auto}
.coursec .cm .star{color:var(--amber);font-weight:600;font-family:var(--font-num)}
.coursec .typ{font-size:11px;color:var(--ink-2)}
/* right rail */
.rrcard{background:#fff;border:1px solid var(--border);border-radius:14px;padding:15px 16px;margin-bottom:16px}
.rrcard h4{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.goals .grow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--surface-3);font-size:13px}
.goals .grow:last-child{border-bottom:0}
.gck{width:20px;height:20px;border-radius:6px;border:2px solid var(--border-strong);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff}
.grow.done .gck{background:var(--green);border-color:var(--green)}
.grow .gp{margin-left:auto;font-size:11px;color:var(--ink-3);font-family:var(--font-num)}
.cal .calhead{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-display);font-weight:600;font-size:13.5px;margin-bottom:9px}
.cal .calhead button{border:0;background:var(--surface-2);border-radius:7px;width:24px;height:24px;cursor:pointer;color:var(--ink-2)}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.calgrid .dow{font-size:10px;color:var(--ink-3);font-weight:700;padding:3px 0}
.calgrid .day{font-size:11.5px;font-family:var(--font-num);padding:6px 0;border-radius:8px;position:relative;color:var(--ink-2)}
.calgrid .day.today{background:var(--role);color:#fff;font-weight:600}
.calgrid .day.dot::after{content:"";position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--role)}
.calgrid .day.today.dot::after{background:#fff}
.skchips{display:flex;gap:8px;flex-wrap:wrap}
.skchip{border:1px solid var(--border-strong);background:#fff;border-radius:99px;padding:7px 13px;font-size:12.5px;color:var(--ink-2);cursor:pointer}
.skchip:hover{border-color:var(--role);color:var(--role)}
.hcai-rr{background:linear-gradient(135deg,var(--role-tint),#fff);border:1px solid var(--role-tint2)}
/* generic surface bits reused */
.surfhead{margin-bottom:16px}
.surfhead h2{font-family:var(--font-display);font-size:24px;letter-spacing:-.02em;font-weight:600}
.surfhead p{margin:5px 0 0;font-size:13px;color:var(--ink-3);max-width:760px}
.surfai{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid var(--role-tint2);border-radius:12px;padding:11px 14px;margin-bottom:18px}
.surfai .dot{width:26px;height:26px;border-radius:8px;background:var(--role-tint);color:var(--role);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.surfai .b{font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--role)}
.surfai .tx{font-size:12.5px;color:var(--ink-2)}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px 15px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--role)}
.kpi.ok::after{background:var(--green)}.kpi.warn::after{background:var(--amber)}.kpi.info::after{background:var(--info)}
.kpi .l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)}
.kpi .v{font-family:var(--font-num);font-size:23px;font-weight:600;letter-spacing:-.5px;margin-top:3px}
.kpi .s{font-size:11px;color:var(--ink-3)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{border:0;background:none;padding:9px 14px;font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--role);border-bottom-color:var(--role)}
.mtx{background:#fff;border:1px solid var(--border);border-radius:13px;padding:6px 2px}
.mrow{display:grid;grid-template-columns:1.4fr 2.2fr auto;gap:14px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--surface-3)}
.mrow:last-child{border-bottom:0}
.mrow .sk{font-weight:600;font-size:13px}
.mrow .sk small{display:block;font-weight:400;color:var(--ink-3);font-size:11px}
.track{position:relative;height:24px;background:var(--surface-3);border-radius:7px;overflow:hidden}
.track .act{position:absolute;left:0;top:0;bottom:0;background:var(--role);border-radius:7px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:10.5px;font-weight:700;font-family:var(--font-num)}
.track .act.g{background:var(--green)}.track .act.a{background:var(--amber)}
.track .std{position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--ink);border-radius:2px}
.track .std::after{content:attr(data-l);position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--ink);white-space:nowrap;font-family:var(--font-num)}
.mrow .verd{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;text-align:center}
.verd.ok{background:var(--green-t);color:var(--green)}.verd.gap{background:var(--amber-t);color:var(--amber)}.verd.big{background:#fbe9e7;color:#c42b21}
.mlegend{display:flex;gap:18px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-3);margin:0 0 14px}
.mlegend span{display:inline-flex;align-items:center;gap:6px}
.mlegend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.mlegend i.std{width:3px;height:14px;border-radius:2px;background:var(--ink)}
.movebar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px}
.movebar select{border:1px solid var(--border-strong);border-radius:8px;padding:8px 10px;font-family:var(--font-ui);font-size:13px;color:var(--ink);background:#fff}
.movebar .arr{color:var(--role);font-weight:700}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.twocol{grid-template-columns:1fr}}
.col h4{font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.col h4 .dotk{width:9px;height:9px;border-radius:50%;display:inline-block}
.itm{background:#fff;border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:9px}
.itm .t{font-weight:600;font-size:12.5px}
.itm .m{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.itm .m b{color:var(--role);font-weight:600}
.bar{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden}
.bar i{display:block;height:100%;background:var(--role);border-radius:99px}
.bar.g i{background:var(--green)}.bar.a i{background:var(--amber)}
.rev{display:flex;gap:8px;align-items:flex-start;background:var(--surface-2);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--ink-2);margin-bottom:14px}
.rev b{color:var(--ink)}
.jpath{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:18px;overflow-x:auto}
.jline{display:flex;align-items:flex-start;gap:0;min-width:560px}
.jnode{flex:1;text-align:center;position:relative}
.jnode::before{content:"";position:absolute;top:15px;left:-50%;width:100%;height:3px;background:var(--surface-3)}
.jnode:first-child::before{display:none}
.jnode.done::before,.jnode.now::before{background:var(--green)}
.jdot{width:32px;height:32px;border-radius:50%;border:3px solid var(--border-strong);background:#fff;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;color:var(--ink-3)}
.jnode.done .jdot{background:var(--green);border-color:var(--green);color:#fff}
.jnode.now .jdot{border-color:var(--role);color:var(--role);box-shadow:0 0 0 4px var(--role-tint)}
.jnode .jt{font-size:11.5px;font-weight:600;line-height:1.3}
.jnode .js{font-size:10.5px;color:var(--ink-3)}
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.badge2{background:#fff;border:1px solid var(--border);border-radius:13px;padding:15px 13px;text-align:center}
.badge2 .bi{width:48px;height:48px;border-radius:14px;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;background:var(--role-tint);color:var(--role)}
.badge2.lock .bi{background:var(--surface-3);color:var(--ink-3)}
.badge2 .bn{font-size:12.5px;font-weight:600}
.badge2 .bd{font-size:10.5px;color:var(--ink-3);margin-top:2px}
.badge2.lock{opacity:.7}
.player{background:#0e1116;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.stage{aspect-ratio:16/9;background:radial-gradient(circle at 50% 40%,#243042,#0e1116);display:flex;align-items:center;justify-content:center;position:relative;color:#fff}
.stage .pl{width:62px;height:62px;border-radius:50%;background:rgba(225,35,27,.92);display:flex;align-items:center;justify-content:center;cursor:pointer;border:0}
.stage .tt{position:absolute;left:16px;top:14px;font-family:var(--font-display);font-weight:600;font-size:14px}
.stage .clock{position:absolute;right:16px;top:14px;font-family:var(--font-num);font-size:12px;color:#c9d2dd}
.scrub{padding:12px 14px;background:#161b22}
.bartrack{position:relative;height:8px;background:#2a323d;border-radius:99px;margin:8px 0 6px}
.barfill{position:absolute;left:0;top:0;bottom:0;background:var(--role);border-radius:99px;width:0}
.cp{position:absolute;top:-3px;width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid var(--amber);transform:translateX(-50%);cursor:pointer}
.cp.passed{border-color:var(--green)}
.ctrls{display:flex;align-items:center;gap:12px;color:#c9d2dd;font-size:12px;font-family:var(--font-num)}
.ctrls button{border:0;background:var(--role);color:#fff;border-radius:8px;padding:6px 12px;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer}
.quizcard{background:#fff;border:1px solid var(--amber-t);border-left:3px solid var(--amber);border-radius:12px;padding:16px;margin-top:14px}
.quizcard .qq{font-weight:600;font-size:13.5px;margin-bottom:10px}
.opt{display:block;width:100%;text-align:left;border:1px solid var(--border-strong);background:#fff;border-radius:9px;padding:10px 12px;margin-bottom:8px;font-family:var(--font-ui);font-size:13px;cursor:pointer}
.opt:hover{border-color:var(--role)}
.opt.right{border-color:var(--green);background:var(--green-t)}
.opt.wrong{border-color:#c42b21;background:#fbe9e7}
.modlist{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.modlist .mh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);padding:11px 14px;border-bottom:1px solid var(--border)}
.lrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--surface-3);font-size:12.5px}
.lrow:last-child{border-bottom:0}
.lrow .ix{width:20px;height:20px;border-radius:50%;background:var(--surface-3);color:var(--ink-3);font-size:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-family:var(--font-num)}
.lrow.done .ix{background:var(--green);color:#fff}.lrow.now{background:var(--role-tint)}.lrow.now .ix{background:var(--role);color:#fff}
.lrow .du{margin-left:auto;color:var(--ink-3);font-size:11px;font-family:var(--font-num)}
.idp{background:#fff;border:1px solid var(--border);border-radius:13px;padding:15px 16px;margin-bottom:12px}
.idp .ih{display:flex;align-items:flex-start;gap:10px;justify-content:space-between;flex-wrap:wrap}
.idp .area{font-family:var(--font-display);font-weight:600;font-size:14px}
.idp .src{font-size:11px;color:var(--ink-3);margin-top:2px}
.idp .grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--surface-3)}
.idp .cell .cl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3)}
.idp .cell .cv{font-size:12.5px;margin-top:3px}
.idp .cell .cv b{font-weight:600}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.search2{flex:1;min-width:200px;border:1px solid var(--border-strong);border-radius:9px;padding:9px 12px;font-family:var(--font-ui);font-size:13px}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{border:1px solid var(--border);background:#fff;border-radius:99px;padding:6px 12px;font-size:12px;color:var(--ink-2);cursor:pointer}
.chip.active{background:var(--role-tint);border-color:var(--role-tint2);color:var(--role);font-weight:600}
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
.pill.ok{background:var(--green-t);color:var(--green)}.pill.warn{background:var(--amber-t);color:var(--amber)}
.pill.info{background:var(--info-t);color:var(--info)}.pill.bad{background:#fbe9e7;color:#c42b21}.pill.mut{background:var(--surface-3);color:var(--ink-3)}
.btn{align-self:flex-start;border:1px solid var(--border-strong);background:#fff;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;font-family:var(--font-ui)}
.btn.p{background:var(--role);border-color:var(--role);color:#fff}
.btn.sm{padding:5px 10px;font-size:11.5px}
.gov{display:flex;gap:9px;align-items:flex-start;background:#fff;border:1px solid var(--border);border-left:3px solid var(--role);border-radius:10px;padding:12px 14px;margin:22px 0 0;font-size:12px;color:var(--ink-2)}
.gov svg{width:15px;height:15px;color:var(--role);flex:0 0 auto;margin-top:1px}
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);padding:10px 13px;border-bottom:1px solid var(--border);font-weight:700}
.tbl td{padding:11px 13px;border-bottom:1px solid var(--surface-3);font-size:12.5px}
.tbl tr:last-child td{border-bottom:0}

</style>
</head>

function verdict(std,act){ if(act>std) return ['verd ok','vOver']; if(act===std) return ['verd ok','vOk']; if(std-act===1) return ['verd gap','vGap']; return ['verd big','vBig']; }
function matrixRows(arr){
 return '<div class="mtx">'+arr.map(function(s){
  var actPct=s.act/5*100, stdPct=s.std/5*100; var cls=s.act>=s.std?'g':(s.std-s.act===1?'a':''); var vd=verdict(s.std,s.act);
  return '<div class="mrow"><div class="sk">'+nm(s.n)+'<small>Level '+s.act+' / '+s.std+'</small></div>'+
   '<div class="track"><div class="act '+cls+'" style="width:'+actPct+'%">'+s.act+'</div><div class="std" style="left:'+stdPct+'%" data-l="'+s.std+'"></div></div>'+
   '<div class="'+vd[0]+'">'+tr(vd[1])+'</div></div>';
 }).join('')+'</div>';
}

 var nodes=JNODES.map(function(n){ var mark=n.s==='done'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><path d="M5 12l4 4 10-10"/></svg>':(n.s==='now'?'<svg viewBox="0 0 24 24" fill="currentColor" width="10" height="10"><circle cx="12" cy="12" r="8"/></svg>':''); return '<div class="jnode '+n.s+'"><div class="jdot">'+mark+'</div><div class="jt">'+nm(n.t)+'</div><div class="js">'+(n.s==='done'?tr('earned'):(n.s==='now'?(L==='id'?'sekarang':'now'):''))+'</div></div>'; }).join('');
 var badges=BADGES.map(function(b){ return '<div class="badge2'+(b.e?'':' lock')+'"><div class="bi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22"><path d="'+b.ic+'"/></svg></div><div class="bn">'+nm(b.n)+'</div><div class="bd">'+nm(b.d)+'</div><div style="margin-top:7px"><span class="pill '+(b.e?'ok':'mut')+'">'+(b.e?tr('earned'):tr('locked'))+'</span></div></div>'; }).join('');
 var certs=[{n:{id:'Operator Forklift',en:'Forklift Operator'}, exp:'10 Sep 2026', st:'warn'},{n:{id:'K3 Dasar',en:'Basic OHS'}, exp:'15 Jan 2027', st:'ok'},{n:{id:'Food Safety Awareness',en:'Food Safety Awareness'}, exp:'01 Des 2026', st:'ok'},{n:{id:'5S Practitioner',en:'5S Practitioner'}, exp:{id:'Tanpa kedaluwarsa',en:'No expiry'}, st:'ok'}].map(function(c){ return '<tr><td style="font-weight:600">'+nm(c.n)+'</td><td class="dim">'+nm(c.exp)+'</td><td><span class="pill '+(c.st==='warn'?'warn':'ok')+'">'+(c.st==='warn'?(L==='id'?'Akan kedaluwarsa':'Expiring soon'):(L==='id'?'Aktif':'Active'))+'</span></td></tr>'; }).join('');
 v.innerHTML=surfAi('aiJourney')+'<div class="surfhead"><h2>'+tr('hJourney')+'</h2><p>'+tr('subJourney')+'</p></div>'+
  '<div class="sectit first">'+tr('jTitle')+'</div><div class="jpath"><div class="jline">'+nodes+'</div></div>'+
  '<div class="sectit">'+tr('badgeTitle')+'</div><div class="badges">'+badges+'</div>'+
  '<div class="sectit">'+tr('certTitle')+'</div><table class="tbl"><tbody>'+certs+'</tbody></table>';
}
function tick(){ if(!state.playing||state.locked) return; state.vt+=5; for(var i=0;i<VIDEO.checkpoints.length;i++){ var c=VIDEO.checkpoints[i]; if(!c.done && state.vt>=c.at){ state.vt=c.at; state.playing=false; state.locked=true; state.curCp=i; break; } } if(state.vt>=VIDEO.total){ state.vt=VIDEO.total; state.playing=false; } paintPlayer(); }
function renderPlayer(){ var v=document.getElementById('view'); v.innerHTML=surfAi('aiPlayer')+'<div class="surfhead"><h2>'+tr('hPlayer')+'</h2><p>'+tr('subPlayer')+'</p></div><div class="hsplit"><div id="pwrap"></div><div><div class="sectit first">'+tr('modulesT')+'</div><div class="modlist" id="mlist"></div></div></div>'; paintPlayer(); }
function paintPlayer(){
 var w=document.getElementById('pwrap'); if(!w) return;
 var pct=state.vt/VIDEO.total*100;
 var cps=VIDEO.checkpoints.map(function(c){ return '<div class="cp'+(c.done?' passed':'')+'" style="left:'+(c.at/VIDEO.total*100)+'%" title="'+mmss(c.at)+'"></div>'; }).join('');
 var cpText=VIDEO.checkpoints.map(function(c){return mmss(c.at);}).join(', ');
 var html='<div class="player"><div class="stage"><span class="tt">'+nm(VIDEO.title)+'</span><span class="clock">'+mmss(state.vt)+' / '+mmss(VIDEO.total)+'</span><button class="pl" id="playBtn"><svg viewBox="0 0 24 24" fill="#fff" width="22" height="22">'+(state.playing?'<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>':'<path d="M8 5v14l11-7z"/>')+'</svg></button></div><div class="scrub"><div class="bartrack"><div class="barfill" style="width:'+pct+'%"></div>'+cps+'</div><div class="ctrls"><button id="playBtn2">'+(state.playing?tr('pause'):tr('play'))+'</button><span>'+tr('cpInfo')+' '+cpText+'</span></div></div></div>';
 if(state.locked && state.curCp>=0){ var c=VIDEO.checkpoints[state.curCp]; html+='<div class="quizcard"><div class="qq">'+mmss(c.at)+' &middot; '+nm(c.q)+'</div>'+c.opts.map(function(o,i){return '<button class="opt" data-opt="'+i+'">'+nm(o)+'</button>';}).join('')+'<div class="dim" style="font-size:11.5px;margin-top:4px" id="qmsg">'+tr('quizLock')+'</div></div>'; }
 else if(state.vt>=VIDEO.total){ html+='<div class="quizcard" style="border-left-color:var(--green);border-color:var(--green-t)"><div class="qq">'+tr('finished')+'</div></div>'; }
 w.innerHTML=html;
 var ml=document.getElementById('mlist');
 if(ml){ ml.innerHTML='<div class="mh">'+nm(VIDEO.title)+'</div>'+MODLIST.map(function(m,i){ return '<div class="lrow '+m.s+'"><span class="ix">'+(m.s==='done'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="9" height="9"><path d="M5 12l4 4 10-10"/></svg>':(i+1))+'</span><span>'+nm(m.t)+'</span><span class="du">'+m.du+'</span></div>'; }).join(''); }
 var pb=document.getElementById('playBtn'), pb2=document.getElementById('playBtn2');
 function toggle(){ if(state.locked) return; state.playing=!state.playing; if(state.playing){ if(state.vt>=VIDEO.total) state.vt=0; if(!state.timer) state.timer=setInterval(tick,300); } paintPlayer(); }
 if(pb) pb.onclick=toggle; if(pb2) pb2.onclick=toggle;
 document.querySelectorAll('[data-opt]').forEach(function(b){ b.onclick=function(){ var i=parseInt(b.getAttribute('data-opt'),10); var c=VIDEO.checkpoints[state.curCp]; var msg=document.getElementById('qmsg'); if(i===c.ans){ b.classList.add('right'); c.done=true; state.locked=false; if(msg){msg.textContent=tr('correct');} setTimeout(function(){ state.curCp=-1; state.playing=true; if(!state.timer) state.timer=setInterval(tick,300); paintPlayer(); },650); } else { b.classList.add('wrong'); if(msg){msg.textContent=tr('tryagain');} } }; });
}
function catName(c){var m={tek:'cTek',lead:'cLead',soft:'cSoft',comp:'cComp'};return tr(m[c]||'cAll');}
function renderCat(){
 var v=document.getElementById('view');
 var chips=[['all','cAll'],['tek','cTek'],['lead','cLead'],['soft','cSoft'],['comp','cComp']].map(function(c){ return '<button class="chip'+(state.cat===c[0]?' active':'')+'" data-cat="'+c[0]+'">'+tr(c[1])+'</button>'; }).join('');
 var q=state.q.toLowerCase();
 var grid=CAT.filter(function(c){ if(state.cat!=='all' && c.cat!==state.cat) return false; if(q && nm(c.name).toLowerCase().indexOf(q)<0) return false; return true; }).map(function(c){ return courseCard(c); }).join('');
 v.innerHTML=surfAi('aiCat')+'<div class="surfhead"><h2>'+tr('hCat')+'</h2><p>'+tr('subCat')+'</p></div>'+
  '<div class="toolbar"><input class="search2" id="q" placeholder="'+tr('searchPh')+'" value="'+state.q.replace(/"/g,'&quot;')+'"><div class="chips">'+chips+'</div><button class="btn" id="extBtn">'+tr('extBtn')+'</button></div>'+
  '<div class="catgrid">'+(grid||'<div class="dim">,</div>')+'</div><div id="extPanel"></div>';
 var qi=document.getElementById('q'); if(qi){ qi.addEventListener('input',function(){ state.q=qi.value; var pos=qi.selectionStart; renderCat(); var n=document.getElementById('q'); if(n){ n.focus(); n.setSelectionRange(pos,pos);} }); }
 v.querySelectorAll('[data-cat]').forEach(function(b){ b.addEventListener('click',function(){ state.cat=b.getAttribute('data-cat'); renderCat(); }); });
 wireGo(v);
 var eb=document.getElementById('extBtn'); if(eb){ eb.addEventListener('click',function(){ document.getElementById('extPanel').innerHTML='<div class="rrcard" style="margin-top:16px"><h4>'+tr('extTitle')+'</h4><p style="font-size:12.5px;color:var(--ink-2);margin:0 0 8px">'+tr('extBody')+'</p><span class="pill info">'+(L==='id'?'Atasan, maker':'Manager, maker')+'</span> <span class="pill mut">'+(L==='id'?'L&D Admin, checker':'L&D Admin, checker')+'</span></div>'; }); }
}
function renderIdp(){
 var v=document.getElementById('view'); var stMap={prog:['pill info','stProg'],todo:['pill warn','stTodo'],done:['pill ok','stDone']};
 var rows=IDP.map(function(d){ var s=stMap[d.st]; return '<div class="idp"><div class="ih"><div><div class="area">'+nm(d.area)+'</div><div class="src">'+tr('clSrc')+', '+nm(d.src)+'</div></div><span class="'+s[0]+'">'+tr(s[1])+'</span></div><div class="grid4"><div class="cell"><div class="cl">'+tr('clAction')+'</div><div class="cv"><b>'+nm(d.action)+'</b></div></div><div class="cell"><div class="cl">'+tr('clTarget')+'</div><div class="cv">'+d.target+'</div></div><div class="cell"><div class="cl">'+tr('clOutput')+'</div><div class="cv">'+nm(d.output)+'</div></div></div></div>'; }).join('');
 v.innerHTML=surfAi('aiIdp')+'<div class="surfhead"><h2>'+tr('hIdp')+'</h2><p>'+tr('subIdp')+'</p></div><div class="rev"><div>'+tr('idpRev')+'</div></div>'+rows;
}
function renderComp(){
 var v=document.getElementById('view'); var map={selesai:['pill ok','sDone'],berlangsung:['pill info','sProg'],belum:['pill warn','sNot']};
 var rows=COMP.map(function(c){ var m=map[c.st]; return '<tr><td style="font-weight:600">'+nm(c.name)+'</td><td class="dim">'+c.due+'</td><td><span class="'+m[0]+'">'+tr(m[1])+'</span></td></tr>'; }).join('');
 v.innerHTML=surfAi('aiComp')+'<div class="surfhead"><h2>'+tr('hComp')+'</h2><p>'+tr('subComp')+'</p></div><table class="tbl"><thead><tr><th>'+tr('colTrain')+'</th><th>'+tr('colDue')+'</th><th>'+tr('colSt')+'</th></tr></thead><tbody>'+rows+'</tbody></table>'+govBox('govComp');
}
var SURF={home:renderHome,skill:renderSkill,journey:renderJourney,player:renderPlayer,cat:renderCat,idp:renderIdp,comp:renderComp};

function wireGo(scope){ scope.querySelectorAll('[data-go]').forEach(function(b){ b.addEventListener('click',function(){ state.surf=b.getAttribute('data-go'); renderActive(); }); }); }
function buildNav(){
 var n=document.getElementById('subnav'); if(!n) return;
 n.innerHTML=NAV.map(function(x){ return '<button class="snav" data-surf="'+x[0]+'">'+tr(x[1])+'</button>'; }).join('');
 n.querySelectorAll('[data-surf]').forEach(function(b){ b.addEventListener('click',function(){ state.surf=b.getAttribute('data-surf'); renderActive(); }); });
}
function renderActive(){
 if(state.surf!=='player'){ state.playing=false; if(state.timer){ clearInterval(state.timer); state.timer=null; } }
 var fn=SURF[state.surf]; if(fn) fn();
 var n=document.getElementById('subnav'); if(n) n.querySelectorAll('[data-surf]').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-surf')===state.surf); });
 try{ window.scrollTo(0,0); }catch(e){}
}
function paintChrome(){
 document.getElementById('brandT').textContent=tr('brandT');
 document.getElementById('topSearch').placeholder=tr('searchTop');
 document.getElementById('goalPill').innerHTML=fmt(tr('goalPill'),{g:nm(ME.next)});
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-lang')===L); });
 wireSwitch(); buildNav(); renderActive();
}
function setLang(l){ L=l; paintChrome(); }
if(typeof document!=='undefined' && document.querySelector('.cbar')){
 document.querySelectorAll('[data-lang]').forEach(function(b){ b.addEventListener('click',function(){ setLang(b.getAttribute('data-lang')); }); });
 var ts=document.getElementById('topSearch');
 if(ts){ ts.addEventListener('keydown',function(e){ if(e.key==='Enter'){ state.q=ts.value; state.surf='cat'; renderActive(); } }); }
 setLang('id');
}
</script>
</body>
</html>
